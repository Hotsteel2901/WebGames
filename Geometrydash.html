            const dt = DT, sp = L.speed, g = A.grav;
            A.ev.length = 0;
            const press = hold && !A.holdPrev;
            A.holdPrev = hold;
            if (press) A.buf = 0.1;
            else if (A.buf > 0) A.buf = Math.max(0, A.buf - dt);
            if (A.flipCd > 0) A.flipCd = Math.max(0, A.flipCd - dt);

            // ------ 模式物理 ------
            const M = A.mode;
            if (M === MODES.CUBE) {
                if (A.onGround && (hold || A.buf > 0)) {
                    A.vy = PHYS.VJ * g; A.onGround = false; A.buf = 0;
                    A.jumps++; A.ev.push('jump');
                }
                A.vy -= PHYS.G * g * dt;
                if (!A.onGround) A.rot += PHYS.ROT * g * dt;
            } else if (M === MODES.SHIP) {
                if (hold) A.vy += PHYS.SHIP_THRUST * g * dt;
                else A.vy -= (A.vy * g > 0 ? PHYS.SHIP_DECEL : PHYS.SHIP_G) * g * dt;
                if (A.vy * g > PHYS.SHIP_VMAX_UP) A.vy = PHYS.SHIP_VMAX_UP * g;
                if (A.vy * g < -PHYS.SHIP_VMAX_DN) A.vy = -PHYS.SHIP_VMAX_DN * g;
            } else if (M === MODES.BALL) {
                if ((hold || A.buf > 0) && A.onGround && A.flipCd <= 0) {
                    A.grav = -A.grav; A.vy = 0; A.onGround = false;
                    A.flipCd = 0.12; A.buf = 0; A.jumps++; A.ev.push('flip');
                }
                A.vy -= PHYS.BALL_G * A.grav * dt;
                A.roll += sp / 0.5 * dt * (A.grav > 0 ? 1 : -1) * 57.3;
            } else if (M === MODES.UFO) {
                if (A.buf > 0) {
                    A.vy = PHYS.UFO_VJ * g; A.buf = 0; A.onGround = false;
                    A.jumps++; A.ev.push('hop');
                }
                A.vy -= PHYS.G * 0.9 * g * dt;
            } else if (M === MODES.WAVE) {
                A.vy = (hold ? 1 : -1) * sp * g;
            }
            const mf = -PHYS.MAXFALL;
            if (M !== MODES.WAVE && A.vy * A.grav < mf) A.vy = mf * A.grav;

            // ------ 位移 ------
            A.x += sp * dt;
            A.y += A.vy * dt;
            const px = A.x, hw = 0.49, hh = 0.49;
            const isWave = M === MODES.WAVE;
            A.onGround = false;

            // ------ 世界地面 / 深渊 / 天花板 ------
            const colL = Math.floor(px - hw), colR = Math.floor(px + hw);
            let overPit = true;
            for (let c = colL; c <= colR; c++) if (!L.pits.has(c)) { overPit = false; break; }
            if (!overPit && A.y - (isWave ? 0.38 : hh) <= 0) {
                if (isWave) { A.dead = true; A.ev.push('die'); return; }
                if (A.grav > 0) {
                    if (A.vy <= 0.02) { A.y = hh; A.vy = 0; A.onGround = true; }
                } else if (A.vy < 0) { A.y = hh; A.vy = 0; }
            }
            if (A.y < -2.5 || A.y > 14.5) { A.dead = true; A.ev.push('die'); return; }
            if (M !== MODES.CUBE && A.y + hh > PHYS.CEIL) {
                A.y = PHYS.CEIL - hh;
                if (A.vy > 0) A.vy = 0;
            }

            // ------ 实体方块碰撞 ------
            let died = false;
            const shw = isWave ? 0.38 : hw, shh = isWave ? 0.38 : hh;
            for (let c = colL; c <= colR && !died; c++) {
                const arr = L.solidCols.get(c);
                if (!arr) continue;
                for (const r of arr) {
                    const top = r.slab ? r.y0 + 0.5 : r.y1;
                    const ox = Math.min(px + shw, r.x1) - Math.max(px - shw, r.x0);
                    const oy = Math.min(A.y + shh, top) - Math.max(A.y - shh, r.y0);
                    if (ox <= 0.001 || oy <= 0.001) continue;
                    if (isWave) { died = true; break; }
                    const penTop = top - (A.y - hh);        // 从上方陷入
                    const penBot = (A.y + hh) - r.y0;       // 从下方陷入
                    const TOL = 0.38;
                    if (A.grav > 0 && A.vy <= 0.02 && penTop > 0 && penTop <= TOL) {
                        A.y = top + hh; A.vy = 0; A.onGround = true;      // 正常着地（边角自动上抬）
                    } else if (A.grav < 0 && A.vy >= -0.02 && penBot > 0 && penBot <= TOL) {
                        A.y = r.y0 - hh; A.vy = 0; A.onGround = true;     // 倒挂着地
                    } else if (M === MODES.BALL && A.vy <= 0 && penTop > 0 && penTop <= TOL) {
                        A.y = top + hh; A.vy = 0; if (A.grav > 0) A.onGround = true;
                    } else if (M === MODES.BALL && A.vy >= 0 && penBot > 0 && penBot <= TOL) {
                        A.y = r.y0 - hh; A.vy = 0; if (A.grav < 0) A.onGround = true;
                    } else if (A.grav > 0 && A.vy > 0 && penBot > 0 && penBot <= TOL && ox > 0.06) {
                        A.y = r.y0 - hh; A.vy = 0;                        // 碰头
                    } else if (A.grav < 0 && A.vy < 0 && penTop > 0 && penTop <= TOL && ox > 0.06) {
                        A.y = top + hh; A.vy = 0;                         // 倒挂碰头
                    } else if (ox < 0.09) {
                        // 蹭角容差：极小水平重叠不判死
                    } else { died = true; break; }                        // 侧面撞击
                }
            }
            if (died) { A.dead = true; A.ev.push('die'); return; }

            // ------ 危险物 ------
            const hz = isWave ? PHYS.WAVE_HAZ : PHYS.HAZ_HALF;
            for (let c = colL - 1; c <= colR + 1; c++) {
                const arr = L.hazCols.get(c);
                if (!arr) continue;
                for (const h of arr) {
                    if (h.t === 'sp') {
                        if (px + hz > h.x0 && px - hz < h.x1 && A.y + hz > h.y0 && A.y - hz < h.y1) {
                            A.dead = true; A.ev.push('die'); return;
                        }
                    } else {
                        const dx = Math.max(Math.abs(px - h.cx) - hz, 0);
                        const dy = Math.max(Math.abs(A.y - h.cy) - hz, 0);
                        if (dx * dx + dy * dy < h.hr * h.hr) {
                            A.dead = true; A.ev.push('die'); return;
                        }
                    }
                }
            }

            // ------ 交互物（传送门 / 垫子 / 球环 / 金币） ------
            A.nearOrb = null;
            for (let c = colL - 1; c <= colR + 1; c++) {
                const arr = L.itemCols.get(c);
                if (!arr) continue;
                for (const it of arr) {
                    if (A.used.has(it.id)) continue;
                    if (it.t === 'portal') {
                        if (Math.abs(px - it.cx) < it.hw + hw && Math.abs(A.y - it.cy) < it.hh + hh) {
                            A.used.add(it.id);
                            if (it.k === 'gravUp') { if (A.grav !== -1) { A.grav = -1; A.vy *= 0.5; } }
                            else if (it.k === 'gravDown') { if (A.grav !== 1) { A.grav = 1; A.vy *= 0.5; } }
                            else {
                                const nm = { cube: MODES.CUBE, ship: MODES.SHIP, ball: MODES.BALL, ufo: MODES.UFO, wave: MODES.WAVE }[it.k];
                                if (nm !== A.mode) { A.mode = nm; A.rot = 0; }
                            }
                            A.ev.push('portal:' + it.k);
                        }
                    } else if (it.t === 'pad') {
                        if (px + hw > it.x0 && px - hw < it.x1 && A.y - hh < it.y1 + 0.1 && A.y + hh > it.y0 - 0.4) {
                            A.used.add(it.id);
                            if (it.k === 'Y') A.vy = PHYS.PAD_Y * A.grav;
                            else if (it.k === 'P') A.vy = PHYS.PAD_P * A.grav;
                            else { A.grav = -A.grav; A.vy = -A.grav * PHYS.PAD_B; }
                            A.onGround = false;
                            A.ev.push('pad');
                        }
                    } else if (it.t === 'orb') {
                        const d2 = (px - it.cx) * (px - it.cx) + (A.y - it.cy) * (A.y - it.cy);
                        if (d2 < it.r * it.r) {
                            A.nearOrb = it;
                            if (A.buf > 0) {
                                A.used.add(it.id); A.buf = 0; A.jumps++;
                                if (it.k === 'Y') A.vy = PHYS.ORB_Y * A.grav;
                                else if (it.k === 'P') A.vy = PHYS.ORB_P * A.grav;
                                else if (it.k === 'B') { A.grav = -A.grav; A.vy = -A.grav * PHYS.ORB_B; }
                                else { A.grav = -A.grav; A.vy = PHYS.ORB_G * A.grav; }
                                A.onGround = false;
                                A.ev.push('orb');
                            }
                        }
                    } else if (it.t === 'coin') {
                        if (!A.coins[it.k]) {
                            const d2 = (px - it.cx) * (px - it.cx) + (A.y - it.cy) * (A.y - it.cy);
                            if (d2 < 1.0) { A.coins[it.k] = true; A.ev.push('coin:' + it.k); }
                        }
                    }
                }
            }

            // ------ 旋转贴合 ------
            if (M === MODES.CUBE && A.onGround) {
                const snap = Math.round(A.rot / 90) * 90;
                A.rot += (snap - A.rot) * Math.min(1, dt * 25);
            }

            // ------ 检查点（练习模式） ------
            for (let i = A.lastChk + 1; i < L.checks.length; i++) {
                if (L.checks[i].x <= A.x) { A.lastChk = i; A.ev.push('chk:' + i); }
                else break;
            }

            A.time += dt;
            if (A.x >= L.length + 2) { A.won = true; A.ev.push('win'); }
        }

        // ============================================================
        //  游戏状态管理
        // ============================================================
        const G = {
            state: 'menu',           // menu | select | play | paused | complete
            li: 0, L: null, A: null, bgm: null,
            practice: false, hold: false, pointers: 0,
            camY: 0, shake: 0, flashT: 0, deathT: 0, winT: 0,
            parts: [], floats: [], trail: [],
            attNum: 0, sessAtt: 0, sessJumps: 0, sessTime: 0,
            beatPulse: 0, lastBeat: -1, dustT: 0, idleT: 0,
            savedCoins: [false, false, false]
        };

        function pct(A, L) { return Math.max(0, Math.min(100, Math.floor(A.x / L.length * 100))); }

        function setOverlay(el) {
            [menuMain, menuSelect, menuPause, menuComplete].forEach(m => m.classList.add('hidden'));
            if (el) el.classList.remove('hidden');
        }

        function spawnFromChk(L, i) {
            if (i < 0 || !L.checks[i]) return null;
            const c = L.checks[i];
            return { x: c.x, y: c.y, mode: c.mode, grav: c.grav };
        }

        function startAttempt(spawn) {
            const L = G.L, sv = save.lv[G.li];
            sv.att++; G.attNum = sv.att; G.sessAtt++;
            const A = newAttempt(L, spawn);
            if (spawn) A.lastChk = L.checks.findIndex(c => c.x === spawn.x);
            G.A = A;
            G.parts.length = 0; G.trail.length = 0;
            G.floats = [{ x: A.x + 2.5, y: 4.6, s: 'Attempt ' + G.attNum, a: 1 }];
            G.camY = 0; G.shake = 0; G.flashT = 0;
            if (!G.practice) { G.bgm.stop(); G.bgm.start(); G.lastBeat = -1; }
            else if (!G.bgm.playing) { G.bgm.start(); G.lastBeat = -1; }
        }

        function startLevel(li, practice) {
            G.li = li; G.L = LEVELS[li];
            G.practice = !!practice;
            G.sessAtt = 0; G.sessJumps = 0; G.sessTime = 0;
            G.savedCoins = save.lv[li].coins.slice();
            if (G.bgm) G.bgm.stop();
            G.bgm = new BGMPlayer(G.L.track);
            sound.resume();
            G.state = 'play';
            setOverlay(null);
            hud.classList.remove('hidden');
            practiceBadge.classList.toggle('hidden', !G.practice);
            startAttempt(null);
            persist();
        }

        function onDeath() {
            sound.die();
            explodeAt(G.A.x, G.A.y);
            G.shake = 1; G.flashT = 0.22;
            const p = pct(G.A, G.L);
            const sv = save.lv[G.li];
            if (!G.practice) { if (p > sv.best) sv.best = p; G.bgm.stop(); }
            else if (p > sv.pbest) sv.pbest = p;
            sv.jumps += G.A.jumps;
            persist();
            G.deathT = G.practice ? 0.55 : 1.0;
        }

        function onWin() {
            sound.win();
            G.bgm.stop();
            confettiAt(G.A.x, 5);
            const sv = save.lv[G.li];
            let firstClear = false;
            if (!G.practice) {
                if (!sv.done) firstClear = true;
                sv.done = true; sv.best = 100;
                G.A.coins.forEach((c, i) => { if (c) sv.coins[i] = true; });
            } else if (sv.pbest < 100) sv.pbest = 100;
            sv.jumps += G.A.jumps;
            persist();
            G.winT = 1.4;
            G._firstClear = firstClear;
        }

        function showComplete() {
            $('cmp-level').textContent = G.L.name + ' · ' + G.L.sub;
            $('cmp-att').textContent = G.sessAtt;
            $('cmp-jumps').textContent = G.sessJumps + G.A.jumps;
            const t = Math.floor(G.sessTime + G.A.time);
            $('cmp-time').textContent = Math.floor(t / 60) + ':' + String(t % 60).padStart(2, '0');
            $('cmp-mode').textContent = G.practice ? 'PRACTICE' : 'NORMAL';
            for (let i = 0; i < 3; i++) {
                const got = G.practice ? G.A.coins[i] : save.lv[G.li].coins[i];
                $('cc' + i).classList.toggle('got', !!got);
            }
            $('cmp-newbest').classList.toggle('hidden', !G._firstClear);
            G.state = 'complete';
            setOverlay(menuComplete);
        }

        function exitToSelect() {
            if (G.bgm) G.bgm.stop();
            sound.resume();
            G.state = 'select';
            hud.classList.add('hidden');
            buildCards();
            setOverlay(menuSelect);
        }

        function togglePause() {
            if (G.state === 'play') {
                G.state = 'paused';
                $('pause-pct').textContent = pct(G.A, G.L) + '%';
                $('pause-att').textContent = G.attNum;
                $('pause-practice').textContent = G.practice ? '退出练习模式' : '进入练习模式';
                sound.suspend();
                setOverlay(menuPause);
            } else if (G.state === 'paused') {
                G.state = 'play';
                sound.resume();
                setOverlay(null);
            }
        }

        // ============================================================
        //  粒子 / 特效
        // ============================================================
        function explodeAt(x, y) {
            const cols = ['#7DFF00', '#00FFFF', '#FFFFFF', '#B4FF57'];
            for (let i = 0; i < 30; i++) {
                const a = Math.random() * Math.PI * 2, v = 4 + Math.random() * 14;
                G.parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
                    life: 0.55 + Math.random() * 0.4, t: 0, sz: 0.12 + Math.random() * 0.22,
                    c: cols[(Math.random() * cols.length) | 0], grav: 18, ring: false });
            }
            G.parts.push({ x, y, t: 0, life: 0.42, ring: true });
        }
        function confettiAt(x, y) {
            const cols = ['#FFD700', '#7DFF00', '#00FFFF', '#FF6BD5', '#FFFFFF'];
            for (let i = 0; i < 40; i++) {
                const a = Math.random() * Math.PI * 2, v = 3 + Math.random() * 12;
                G.parts.push({ x: x + (Math.random() - 0.5) * 4, y: y + Math.random() * 4,
                    vx: Math.cos(a) * v * 0.5, vy: Math.abs(Math.sin(a)) * v,
                    life: 0.9 + Math.random() * 0.7, t: 0, sz: 0.1 + Math.random() * 0.16,
                    c: cols[(Math.random() * cols.length) | 0], grav: 14, ring: false });
            }
        }
        function burstAt(x, y, c, n, spd) {
            for (let i = 0; i < (n || 10); i++) {
                const a = Math.random() * Math.PI * 2, v = (spd || 6) * (0.4 + Math.random());
                G.parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
                    life: 0.3 + Math.random() * 0.25, t: 0, sz: 0.07 + Math.random() * 0.12,
                    c, grav: 4, ring: false });
            }
        }

        // ============================================================
        //  逐帧更新
        // ============================================================
        function handleEvents(A) {
            for (const e of A.ev) {
                if (e === 'jump' || e === 'hop') sound.jump();
                else if (e === 'flip') { sound.jump(); burstAt(A.x, A.y - A.grav * 0.5, '#FF6B35', 6, 4); }
                else if (e === 'orb') { sound.orb(); burstAt(A.x, A.y, '#FFE24A', 12, 7); }
                else if (e === 'pad') { sound.pad(); burstAt(A.x, A.y - 0.4, '#FFE24A', 12, 8); }
                else if (e === 'die') onDeath();
                else if (e === 'win') onWin();
                else if (e.startsWith('portal:')) {
                    sound.portal(); G.flashT = Math.max(G.flashT, 0.12);
                    burstAt(A.x, A.y, '#FFFFFF', 14, 9);
                } else if (e.startsWith('coin:')) {
                    sound.coin();
                    burstAt(A.x, A.y, '#FFD700', 16, 8);
                } else if (e.startsWith('chk:') && G.practice) sound.checkpoint();
            }
        }

        let acc = 0;
        function updatePlay(dt) {
            acc = Math.min(acc + dt, 0.25);
            const A = G.A, L = G.L;
            while (acc >= DT) {
                acc -= DT;
                if (A.dead) {
                    G.deathT -= DT;
                    if (G.deathT <= 0) {
                        G.sessJumps += A.jumps; G.sessTime += A.time;
                        startAttempt(G.practice ? spawnFromChk(L, A.lastChk) : null);
                        break;
                    }
                    continue;
                }
                if (A.won) {
                    G.winT -= DT;
                    A.x += L.speed * DT * 0.6;
                    if (G.winT <= 0) { showComplete(); break; }
                    continue;
                }
                stepAttempt(L, A, G.hold);
                handleEvents(A);
                if (A.dead || A.won) continue;
                // 尾迹与灰尘
                G.trail.push({ x: A.x, y: A.y, m: A.mode, g: A.grav });
                if (G.trail.length > 46) G.trail.shift();
                G.dustT -= DT;
                if (G.dustT <= 0 && A.onGround && (A.mode === MODES.CUBE || A.mode === MODES.BALL)) {
                    G.dustT = 0.028;
                    G.parts.push({ x: A.x - 0.45, y: A.y - A.grav * 0.45, vx: -2 - Math.random() * 2,
                        vy: A.grav * (0.5 + Math.random() * 1.5), life: 0.3, t: 0,
                        sz: 0.06 + Math.random() * 0.1, c: 'rgba(255,255,255,0.5)', grav: 0, ring: false });
                }
                if (A.mode === MODES.SHIP && G.hold) {
                    G.parts.push({ x: A.x - 0.55, y: A.y - 0.25 * A.grav, vx: -6 - Math.random() * 3,
                        vy: (Math.random() - 0.5) * 2, life: 0.22, t: 0,
                        sz: 0.08 + Math.random() * 0.1, c: Math.random() < 0.5 ? '#FFB347' : '#FF6B35', grav: 0, ring: false });
                }
            }
            // 粒子
            for (let i = G.parts.length - 1; i >= 0; i--) {
                const p = G.parts[i];
                p.t += dt;
                if (p.t >= p.life) { G.parts.splice(i, 1); continue; }
                if (!p.ring) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy -= (p.grav || 0) * dt; }
            }
            // 相机
            const tgt = Math.min(5.5, Math.max(0, A.y - 5.2));
            G.camY += (tgt - G.camY) * Math.min(1, dt * 6);
            if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 3);
            if (G.flashT > 0) G.flashT = Math.max(0, G.flashT - dt);
            // 节拍脉冲（读取 BGM 调度进度）
            if (G.bgm && G.bgm.playing && sound.ctx) {
                const stepApprox = G.bgm.step - Math.max(0, (G.bgm.nextT - sound.ctx.currentTime) / G.bgm.stepDur);
                const beat = Math.floor(stepApprox / 4);
                if (beat !== G.lastBeat && beat >= 0) { G.lastBeat = beat; G.beatPulse = 1; }
            }
            G.beatPulse = Math.max(0, G.beatPulse - dt * 2.6);
            if (G.bgm) G.bgm.update();
            // HUD
            const p = A.won ? 100 : pct(A, L);
            progressFill.style.width = p + '%';
            progressPct.textContent = p + '%';
            for (let i = 0; i < 3; i++) {
                hudCoins[i].classList.toggle('got', A.coins[i] || (!G.practice && G.savedCoins[i]));
            }
        }

        // ============================================================
        //  输入
        // ============================================================
        function pressOn() { if (G.state === 'play') G.hold = true; sound.resume(); }
        function pressOff() { G.hold = false; }

        canvas.addEventListener('pointerdown', e => { e.preventDefault(); G.pointers++; pressOn(); });
        window.addEventListener('pointerup', () => { G.pointers = Math.max(0, G.pointers - 1); if (G.pointers === 0) pressOff(); });
        window.addEventListener('pointercancel', () => { G.pointers = 0; pressOff(); });
        window.addEventListener('blur', () => { G.pointers = 0; pressOff(); if (G.state === 'play') togglePause(); });

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                e.preventDefault();
                if (!e.repeat) pressOn(); else if (G.state === 'play') G.hold = true;
            } else if (e.code === 'KeyP' || e.code === 'Escape') {
                e.preventDefault();
                if (G.state === 'play' || G.state === 'paused') togglePause();
            } else if (e.code === 'KeyR' && G.state === 'play') {
                if (!G.A.dead) { G.A.dead = true; onDeath(); G.deathT = 0.3; }
            }
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') pressOff();
        });

        // ============================================================
        //  菜单 / UI 接线
        // ============================================================
        const FACE_COLORS = ['#3FB8F5', '#4FD44F', '#FF8A1F'];
        function faceSVG(d) {
            const c = FACE_COLORS[d];
            const mouth = d === 0 ? 'M16 30 Q23 36 30 30' : d === 1 ? 'M16 31 L30 31' : 'M16 33 Q23 27 30 33';
            const brow = d === 2 ? '<path d="M13 15 L20 19 M33 15 L26 19" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>' : '';
            return '<svg class="face" viewBox="0 0 46 46"><circle cx="23" cy="23" r="21" fill="' + c + '" stroke="#111" stroke-width="2.5"/>' +
                '<circle cx="16" cy="20" r="3.2" fill="#111"/><circle cx="30" cy="20" r="3.2" fill="#111"/>' + brow +
                '<path d="' + mouth + '" stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>';
        }
        const starSVG = '<svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>';
        const noteSVG = '<svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>';
        const crownSVG = '<svg class="crown" viewBox="0 0 24 24"><path fill="#FFD700" stroke="#8a6d00" stroke-width="1" d="M3 8l4.5 4L12 5l4.5 7L21 8l-1.8 11H4.8z"/></svg>';

        function buildCards() {
            const wrap = $('cards');
            wrap.innerHTML = '';
            LEVELS.forEach((L, i) => {
                const sv = save.lv[i];
                const trackName = BGM_TRACKS[L.track].name;
                const card = document.createElement('div');
                card.className = 'card c' + i;
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.innerHTML =
                    (sv.done ? crownSVG : '') +
                    '<div class="card-top">' + faceSVG(i) +
                    '<div><div class="card-name">' + L.name + '</div><div class="card-diff">' + L.sub + '</div></div></div>' +
                    '<div class="stars">' + starSVG + '<span>× ' + L.stars + '</span></div>' +
                    '<div class="song-row">' + noteSVG + '<span>' + trackName + ' · ' + L.bpm + ' BPM</span></div>' +
                    '<div class="pbar-label"><span>NORMAL</span><span>' + sv.best + '%</span></div>' +
                    '<div class="pbar normal"><div style="width:' + sv.best + '%"></div></div>' +
                    '<div class="pbar-label"><span>PRACTICE</span><span>' + sv.pbest + '%</span></div>' +
                    '<div class="pbar practice"><div style="width:' + sv.pbest + '%"></div></div>' +
                    '<div class="card-foot"><div class="card-coins">' +
                    sv.coins.map(c => '<div class="card-coin' + (c ? ' got' : '') + '"></div>').join('') +
                    '</div><div class="card-att">ATT ' + sv.att + '</div></div>';
                card.addEventListener('click', () => { sound.click(); startLevel(i, false); });
                card.addEventListener('keydown', e => {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); sound.click(); startLevel(i, false); }
                });
                wrap.appendChild(card);
            });
        }

        function applyOpt() {
            sound.setBGMEnabled(save.opt.music);
            sound.setSFXEnabled(save.opt.sfx);
            [['tgl-music', 'ptgl-music'], ['tgl-sfx', 'ptgl-sfx']].forEach(function(ids, k) {
                ids.forEach(function(id) {
                    $(id).classList.toggle('off', k === 0 ? !save.opt.music : !save.opt.sfx);
                });
            });
        }
        function wireToggle(id, key) {
            $(id).addEventListener('click', () => {
                save.opt[key] = !save.opt[key];
                applyOpt(); persist(); sound.resume(); sound.click();
            });
        }
        wireToggle('tgl-music', 'music'); wireToggle('ptgl-music', 'music');
        wireToggle('tgl-sfx', 'sfx'); wireToggle('ptgl-sfx', 'sfx');

        $('big-play').addEventListener('click', () => { sound.resume(); sound.click(); G.state = 'select'; buildCards(); setOverlay(menuSelect); });
        $('sel-back').addEventListener('click', () => { sound.click(); G.state = 'menu'; setOverlay(menuMain); });
        $('pause-btn').addEventListener('click', () => { if (G.state === 'play') togglePause(); });
        $('pause-resume').addEventListener('click', () => { sound.click(); togglePause(); });
        $('pause-restart').addEventListener('click', () => {
            sound.click(); sound.resume();
            G.state = 'play'; setOverlay(null);
            startAttempt(null);
        });
        $('pause-practice').addEventListener('click', () => {
            sound.click(); sound.resume();
            G.practice = !G.practice;
            practiceBadge.classList.toggle('hidden', !G.practice);
            G.state = 'play'; setOverlay(null);
            if (G.bgm) G.bgm.stop();
            startAttempt(null);
        });
        $('pause-exit').addEventListener('click', () => { sound.click(); sound.resume(); exitToSelect(); });
        $('cmp-replay').addEventListener('click', () => { sound.click(); startLevel(G.li, G.practice); });
        $('cmp-select').addEventListener('click', () => { sound.click(); exitToSelect(); });

        // ============================================================
        //  渲染器
        // ============================================================
        const COL1 = '#7DFF00', COL2 = '#00FFFF';   // GD 默认玩家配色
        const PORTAL_COLS = { cube: '#7DFF00', ship: '#FF6BD5', ball: '#FF4A1F', ufo: '#FFB01F', wave: '#35C8FF', gravUp: '#FFE24A', gravDown: '#4AA8FF' };

        function levelHue(L, x) {
            const bar = Math.max(0, x / 20), K = L.colorKeys;
            if (bar <= K[0].b) return K[0].h;
            for (let i = 0; i < K.length - 1; i++) {
                if (bar >= K[i].b && bar <= K[i + 1].b) {
                    const t = (bar - K[i].b) / Math.max(0.001, K[i + 1].b - K[i].b);
                    return K[i].h + (K[i + 1].h - K[i].h) * t;
                }
            }
            return K[K.length - 1].h;
        }

        function roundRectPath(c, x, y, w, h, r) {
            r = Math.min(r, w / 2, h / 2);
            c.beginPath();
            c.moveTo(x + r, y);
            c.arcTo(x + w, y, x + w, y + h, r);
            c.arcTo(x + w, y + h, x, y + h, r);
            c.arcTo(x, y + h, x, y, r);
            c.arcTo(x, y, x + w, y, r);
            c.closePath();
        }

        function drawBG(hue, camX, B, pulse) {
            const g = ctx.createLinearGradient(0, 0, 0, H);
            const l1 = 30 + pulse * 4, l2 = 12 + pulse * 2;
            g.addColorStop(0, 'hsl(' + hue + ',56%,' + l1 + '%)');
            g.addColorStop(1, 'hsl(' + hue + ',62%,' + l2 + '%)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
            // 视差方块纹理（两层）
            for (let layer = 0; layer < 2; layer++) {
                const sz = layer ? 3.4 * B : 5.2 * B;
                const off = camX * (layer ? 0.22 : 0.12);
                ctx.strokeStyle = 'rgba(255,255,255,' + (layer ? 0.055 : 0.035) + ')';
                ctx.lineWidth = Math.max(1.5, B * 0.06);
                const x0 = -(off % (sz * 2)) - sz;
                for (let x = x0; x < W + sz; x += sz * 2) {
                    for (let y = -sz * 0.5; y < H; y += sz * 2) {
                        roundRectPath(ctx, x + sz * 0.18, y + sz * 0.18, sz * 0.64, sz * 0.64, sz * 0.12);
                        ctx.stroke();
                    }
                }
            }
        }

        function drawGround(L, hue, camX, B, gy, pulse, vx0, vx1) {
            const gh = H - gy;
            if (gh <= 0) return;
            const c0 = Math.floor(vx0), c1 = Math.ceil(vx1);
            let runStart = null;
            const segs = [];
            for (let c = c0; c <= c1 + 1; c++) {
                const solid = c <= c1 && !L.pits.has(c);
                if (solid && runStart === null) runStart = c;
                if (!solid && runStart !== null) { segs.push([runStart, c]); runStart = null; }
            }
            const gg = ctx.createLinearGradient(0, gy, 0, H);
            gg.addColorStop(0, 'hsl(' + hue + ',48%,' + (22 + pulse * 3) + '%)');
            gg.addColorStop(1, 'hsl(' + hue + ',55%,7%)');
            for (const s of segs) {
                const x0 = s[0] * B - camX, x1 = s[1] * B - camX;
                ctx.fillStyle = gg;
                ctx.fillRect(x0, gy, x1 - x0, gh);
                // 图案
                ctx.save();
                ctx.beginPath(); ctx.rect(x0, gy, x1 - x0, gh); ctx.clip();
                ctx.strokeStyle = 'rgba(255,255,255,0.07)';
                ctx.lineWidth = Math.max(1.5, B * 0.05);
                const ps = 2 * B, poff = camX % ps;
                for (let x = x0 - ps - (x0 - camX % 1) % 1; x < x1 + ps; x += ps) {
                    const gx = Math.floor((x + camX) / ps) * ps - camX;
                    roundRectPath(ctx, gx + ps * 0.12, gy + B * 0.25, ps * 0.76, ps * 0.76, B * 0.1);
                    ctx.stroke();
                }
                ctx.restore();
                // 顶部亮线
                ctx.save();
                ctx.shadowColor = 'rgba(255,255,255,' + (0.5 + pulse * 0.5) + ')';
                ctx.shadowBlur = 6 + pulse * 10;
                ctx.strokeStyle = 'rgba(255,255,255,' + (0.85 + pulse * 0.15) + ')';
                ctx.lineWidth = Math.max(2, B * 0.07);
                ctx.beginPath(); ctx.moveTo(x0, gy); ctx.lineTo(x1, gy); ctx.stroke();
                ctx.restore();
            }
            // 深渊
            for (let i = 0; i < segs.length - 1; i++) {
                const px0 = segs[i][1] * B - camX, px1 = segs[i + 1][0] * B - camX;
                const ag = ctx.createLinearGradient(0, gy, 0, H);
                ag.addColorStop(0, 'rgba(0,0,0,0.55)');
                ag.addColorStop(1, 'rgba(20,0,10,0.9)');
                ctx.fillStyle = ag;
                ctx.fillRect(px0, gy, px1 - px0, gh);
            }
        }

        function drawSolid(r, hue, camX, B, gy) {
            const top = r.slab ? r.y0 + 0.5 : r.y1;
            const x = r.x0 * B - camX, y = gy - top * B;
            const w = (r.x1 - r.x0) * B, h = (top - r.y0) * B;
            ctx.fillStyle = 'rgba(8,10,26,0.94)';
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = 'hsla(' + hue + ',85%,72%,0.5)';
            ctx.lineWidth = Math.max(1, B * 0.045);
            ctx.strokeRect(x + B * 0.11, y + B * 0.11, w - B * 0.22, h - B * 0.22);
            ctx.strokeStyle = 'rgba(255,255,255,0.92)';
            ctx.lineWidth = Math.max(1.6, B * 0.07);
            ctx.strokeRect(x, y, w, h);
        }

        function drawSpike(hz, hue, camX, B, gy) {
            const x = hz.bx * B - camX;
            const yb = gy - hz.by * B;
            ctx.beginPath();
            if (!hz.down) {
                ctx.moveTo(x + B * 0.04, yb);
                ctx.lineTo(x + B * 0.5, yb - B * 0.96);
                ctx.lineTo(x + B * 0.96, yb);
            } else {
                const yt = yb - B;
                ctx.moveTo(x + B * 0.04, yt);
                ctx.lineTo(x + B * 0.5, yt + B * 0.96);
                ctx.lineTo(x + B * 0.96, yt);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(10,10,22,0.95)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = Math.max(1.5, B * 0.06);
            ctx.stroke();
        }

        function drawSaw(hz, camX, B, gy, t) {
            const x = hz.cx * B - camX, y = gy - hz.cy * B, R = hz.r * B;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(t * 5.2);
            ctx.beginPath();
            const teeth = 8;
            for (let i = 0; i < teeth * 2; i++) {
                const a = i * Math.PI / teeth;
                const rr = i % 2 === 0 ? R : R * 0.72;
                ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(12,12,26,0.96)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.85)';
            ctx.lineWidth = Math.max(1.5, B * 0.06);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, R * 0.3, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.stroke();
            ctx.restore();
        }

        function drawPad(it, camX, B, gy, pulse) {
            const col = it.k === 'Y' ? '#FFE24A' : it.k === 'P' ? '#FF6BD5' : '#4AA8FF';
            const x = it.cx * B - camX, y = gy - it.y0 * B;
            ctx.save();
            ctx.shadowColor = col; ctx.shadowBlur = 10 + pulse * 8;
            ctx.fillStyle = col;
            ctx.beginPath();
            ctx.ellipse(x, y, B * 0.44, B * (0.16 + pulse * 0.03), 0, Math.PI, 0);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = Math.max(1, B * 0.05);
            ctx.stroke();
            ctx.restore();
        }

        function drawOrb(it, used, near, camX, B, gy, pulse, t) {
            const col = it.k === 'Y' ? '#FFE24A' : it.k === 'P' ? '#FF6BD5' : it.k === 'B' ? '#4AA8FF' : '#7DFF00';
            const x = it.cx * B - camX, y = gy - it.cy * B;
            const s = 1 + pulse * 0.08 + Math.sin(t * 4 + it.cx) * 0.03;
            ctx.save();
            ctx.globalAlpha = used ? 0.25 : 1;
            ctx.translate(x, y); ctx.scale(s, s);
            ctx.strokeStyle = 'rgba(255,255,255,' + (near ? 0.95 : 0.45) + ')';
            ctx.lineWidth = Math.max(1.5, B * 0.06);
            ctx.beginPath(); ctx.arc(0, 0, B * 0.5, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowColor = col; ctx.shadowBlur = 12;
            const rg = ctx.createRadialGradient(0, 0, B * 0.05, 0, 0, B * 0.34);
            rg.addColorStop(0, '#FFFFFF');
            rg.addColorStop(0.45, col);
            rg.addColorStop(1, 'rgba(0,0,0,0.35)');
            ctx.fillStyle = rg;
            ctx.beginPath(); ctx.arc(0, 0, B * 0.34, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawPortal(it, camX, B, gy, pulse, t) {
            const col = PORTAL_COLS[it.k] || '#FFFFFF';
            const x = it.cx * B - camX, y = gy - it.cy * B;
            const hw = B * 0.46, hh = B * 1.5;
            ctx.save();
            ctx.translate(x, y);
            const s = 1 + pulse * 0.03;
            ctx.scale(s, s);
            ctx.shadowColor = col; ctx.shadowBlur = 16 + pulse * 12;
            // 内部辉光胶囊
            const grad = ctx.createLinearGradient(0, -hh, 0, hh);
            grad.addColorStop(0, 'rgba(255,255,255,0.28)');
            grad.addColorStop(0.5, 'rgba(255,255,255,0.06)');
            grad.addColorStop(1, 'rgba(255,255,255,0.24)');
            roundRectPath(ctx, -hw, -hh, hw * 2, hh * 2, hw);
            ctx.fillStyle = grad; ctx.fill();
            ctx.strokeStyle = col;
            ctx.lineWidth = Math.max(2.5, B * 0.14);
            roundRectPath(ctx, -hw, -hh, hw * 2, hh * 2, hw);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255,255,255,0.55)';
            ctx.lineWidth = Math.max(1, B * 0.05);
            roundRectPath(ctx, -hw * 0.55, -hh * 0.86, hw * 1.1, hh * 1.72, hw * 0.55);
            ctx.stroke();
            ctx.restore();
        }

        function drawCoin(it, got, ghost, camX, B, gy, t) {
            if (got) return;
            const x = it.cx * B - camX, y = gy - it.cy * B;
            const sx = Math.cos(t * 3.4 + it.cx * 0.7);
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(Math.max(0.18, Math.abs(sx)), 1);
            ctx.globalAlpha = ghost ? 0.3 : 1;
            ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 14;
            const rg = ctx.createRadialGradient(-B * 0.1, -B * 0.12, B * 0.05, 0, 0, B * 0.46);
            rg.addColorStop(0, '#FFF6C0');
            rg.addColorStop(0.55, '#FFD700');
            rg.addColorStop(1, '#A8770A');
            ctx.fillStyle = rg;
            ctx.beginPath(); ctx.arc(0, 0, B * 0.44, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(120,80,0,0.9)';
            ctx.lineWidth = Math.max(1.5, B * 0.06);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255,255,255,0.75)';
            ctx.lineWidth = Math.max(1, B * 0.05);
            ctx.beginPath(); ctx.arc(0, 0, B * 0.3, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
        }

        function drawCheck(chk, passed, camX, B, gy, t) {
            const x = chk.x * B - camX, y = gy - (chk.y + 0.9) * B;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 4);
            const s = B * 0.32 * (1 + Math.sin(t * 5) * 0.06);
            ctx.shadowColor = '#3DFF6E'; ctx.shadowBlur = 12;
            ctx.fillStyle = passed ? '#3DFF6E' : 'rgba(61,255,110,0.25)';
            ctx.strokeStyle = '#BFFFD2';
            ctx.lineWidth = Math.max(1.5, B * 0.06);
            ctx.fillRect(-s / 2, -s / 2, s, s);
            ctx.strokeRect(-s / 2, -s / 2, s, s);
            ctx.restore();
        }

        function drawMiniCube(s) {
            roundRectPath(ctx, -s / 2, -s / 2, s, s, s * 0.14);
            ctx.fillStyle = COL1; ctx.fill();
            ctx.strokeStyle = '#0A0A0A';
            ctx.lineWidth = s * 0.11;
            ctx.stroke();
            roundRectPath(ctx, -s * 0.26, -s * 0.26, s * 0.52, s * 0.52, s * 0.1);
            ctx.fillStyle = 'rgba(0,255,255,0.14)'; ctx.fill();
            ctx.strokeStyle = COL2;
            ctx.lineWidth = s * 0.09;
            ctx.stroke();
        }

        function drawPlayer(A, camX, B, gy, t) {
            const x = A.x * B - camX, y = gy - A.y * B;
            const S = B * 0.96;
            ctx.save();
            ctx.translate(x, y);
            if (A.mode === MODES.CUBE) {
                ctx.rotate(A.rot * Math.PI / 180);
                drawMiniCube(S);
            } else if (A.mode === MODES.SHIP) {
                if (A.grav < 0) ctx.scale(1, -1);
                const tilt = Math.max(-0.6, Math.min(0.6, -A.vy * A.grav * 0.032));
                ctx.rotate(tilt);
                // 机身
                ctx.beginPath();
                ctx.ellipse(0, S * 0.16, S * 0.6, S * 0.26, 0, 0, Math.PI * 2);
                ctx.fillStyle = COL1; ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.09; ctx.stroke();
                // 尾翼
                ctx.beginPath();
                ctx.moveTo(-S * 0.52, S * 0.1);
                ctx.lineTo(-S * 0.72, -S * 0.28);
                ctx.lineTo(-S * 0.3, S * 0.0);
                ctx.closePath();
                ctx.fillStyle = COL2; ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.07; ctx.stroke();
                // 座舱
                ctx.beginPath();
                ctx.arc(S * 0.02, S * 0.02, S * 0.3, Math.PI, 0);
                ctx.closePath();
                ctx.fillStyle = 'rgba(0,255,255,0.32)';
                ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.07; ctx.stroke();
                ctx.save(); ctx.translate(S * 0.02, -S * 0.06); drawMiniCube(S * 0.4); ctx.restore();
            } else if (A.mode === MODES.BALL) {
                ctx.rotate(A.roll * Math.PI / 180);
                ctx.beginPath(); ctx.arc(0, 0, S * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = COL1; ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.1; ctx.stroke();
                for (let i = 0; i < 4; i++) {
                    ctx.save(); ctx.rotate(i * Math.PI / 2);
                    ctx.fillStyle = '#0A0A0A';
                    ctx.fillRect(-S * 0.09, -S * 0.52, S * 0.18, S * 0.2);
                    ctx.restore();
                }
                ctx.beginPath(); ctx.arc(0, 0, S * 0.24, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,255,255,0.15)'; ctx.fill();
                ctx.strokeStyle = COL2; ctx.lineWidth = S * 0.08; ctx.stroke();
            } else if (A.mode === MODES.UFO) {
                if (A.grav < 0) ctx.scale(1, -1);
                const tilt = Math.max(-0.35, Math.min(0.35, -A.vy * A.grav * 0.018));
                ctx.rotate(tilt);
                ctx.beginPath();
                ctx.arc(0, -S * 0.04, S * 0.34, Math.PI, 0);
                ctx.closePath();
                ctx.fillStyle = 'rgba(0,255,255,0.3)'; ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.07; ctx.stroke();
                ctx.save(); ctx.translate(0, -S * 0.1); drawMiniCube(S * 0.36); ctx.restore();
                ctx.beginPath();
                ctx.ellipse(0, S * 0.14, S * 0.62, S * 0.24, 0, 0, Math.PI * 2);
                ctx.fillStyle = COL1; ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.09; ctx.stroke();
                for (let i = -1; i <= 1; i++) {
                    ctx.beginPath();
                    ctx.arc(i * S * 0.3, S * 0.3, S * 0.07, 0, Math.PI * 2);
                    ctx.fillStyle = COL2; ctx.fill();
                }
            } else { // WAVE
                const ang = -Math.atan2(A.vy, G.L ? G.L.speed : 10) * 0.999;
                ctx.rotate(ang);
                ctx.beginPath();
                ctx.moveTo(S * 0.6, 0);
                ctx.lineTo(-S * 0.45, S * 0.36);
                ctx.lineTo(-S * 0.2, 0);
                ctx.lineTo(-S * 0.45, -S * 0.36);
                ctx.closePath();
                ctx.fillStyle = COL1; ctx.fill();
                ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = S * 0.08; ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(S * 0.28, 0);
                ctx.lineTo(-S * 0.28, S * 0.18);
                ctx.lineTo(-S * 0.28, -S * 0.18);
                ctx.closePath();
                ctx.fillStyle = COL2; ctx.fill();
            }
            ctx.restore();
        }

        function drawTrailAndParts(A, camX, B, gy) {
            // 波形彩带
            if (G.trail.length > 2) {
                let started = false;
                ctx.save();
                ctx.lineJoin = 'round';
                for (let pass = 0; pass < 2; pass++) {
                    ctx.beginPath(); started = false;
                    for (const p of G.trail) {
                        if (p.m !== MODES.WAVE) { started = false; continue; }
                        const x = p.x * B - camX, y = gy - p.y * B;
                        if (!started) { ctx.moveTo(x, y); started = true; }
                        else ctx.lineTo(x, y);
                    }
                    if (pass === 0) {
                        ctx.strokeStyle = 'rgba(53,200,255,0.45)';
                        ctx.lineWidth = B * 0.5;
                    } else {
                        ctx.strokeStyle = 'rgba(255,255,255,0.75)';
                        ctx.lineWidth = B * 0.14;
                    }
                    ctx.stroke();
                }
                ctx.restore();
            }
            // 粒子
            for (const p of G.parts) {
                if (p.ring) {
                    const pr = (p.t / p.life);
                    ctx.save();
                    ctx.globalAlpha = 1 - pr;
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = B * 0.12 * (1 - pr);
                    ctx.beginPath();
                    ctx.arc(p.x * B - camX, gy - p.y * B, pr * B * 4.4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
                    ctx.fillStyle = p.c;
                    const s = p.sz * B;
                    ctx.fillRect(p.x * B - camX - s / 2, gy - p.y * B - s / 2, s, s);
                    ctx.restore();
                }
            }
        }

        function renderGame(t) {
            const A = G.A, L = G.L;
            const B = Math.min(H / 15.5, W / 19);
            const camX = A.x * B - W * 0.30;
            const gy = H - 2.3 * B + G.camY * B;
            const vx0 = camX / B - 2, vx1 = (camX + W) / B + 2;
            const hue = levelHue(L, A.x);
            const pulse = prefersReducedMotion ? 0 : G.beatPulse;

            ctx.save();
            if (G.shake > 0) {
                ctx.translate((Math.random() - 0.5) * G.shake * 14, (Math.random() - 0.5) * G.shake * 14);
            }
            drawBG(hue, camX, B, pulse * 0.5);
            drawGround(L, hue, camX, B, gy, pulse, vx0, vx1);

            // 终点光柱
            const fx = (L.length + 1.5) * B - camX;
            if (fx < W + 100) {
                const fg = ctx.createLinearGradient(fx - B, 0, fx + B, 0);
                fg.addColorStop(0, 'rgba(255,255,255,0)');
                fg.addColorStop(0.5, 'rgba(255,255,255,' + (0.35 + pulse * 0.2) + ')');
                fg.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = fg;
                ctx.fillRect(fx - B, 0, B * 2, gy);
            }

            for (const r of L.solids) {
                if (r.x1 < vx0 || r.x0 > vx1) continue;
                drawSolid(r, hue, camX, B, gy);
            }
            for (const h of L.hazards) {
                if (h.t === 'sp') {
                    if (h.bx + 1 < vx0 || h.bx > vx1) continue;
                    drawSpike(h, hue, camX, B, gy);
                } else {
                    if (h.cx + h.r < vx0 || h.cx - h.r > vx1) continue;
                    drawSaw(h, camX, B, gy, t);
                }
            }
            for (const it of L.items) {
                if (it.cx + 2 < vx0 || it.cx - 2 > vx1) continue;
                if (it.t === 'pad') drawPad(it, camX, B, gy, pulse);
                else if (it.t === 'orb') drawOrb(it, A.used.has(it.id), A.nearOrb === it, camX, B, gy, pulse, t);
                else if (it.t === 'portal') drawPortal(it, camX, B, gy, pulse, t);
                else if (it.t === 'coin') drawCoin(it, A.coins[it.k], !G.practice && G.savedCoins[it.k], camX, B, gy, t);
            }
            if (G.practice) {
                for (let i = 0; i < L.checks.length; i++) {
                    const c = L.checks[i];
                    if (c.x < vx0 || c.x > vx1) continue;
                    drawCheck(c, i <= A.lastChk, camX, B, gy, t);
                }
            }

            drawTrailAndParts(A, camX, B, gy);
            if (!A.dead) drawPlayer(A, camX, B, gy, t);

            // 世界内文字（Attempt N）
            ctx.save();
            ctx.textAlign = 'center';
            ctx.font = '700 ' + (B * 1.05) + 'px Orbitron, sans-serif';
            for (const f of G.floats) {
                const x = f.x * B - camX;
                if (x < -300 || x > W + 300) continue;
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8;
                ctx.fillText(f.s, x, gy - f.y * B);
            }
            ctx.restore();
            ctx.restore();

            if (G.flashT > 0) {
                ctx.fillStyle = 'rgba(255,255,255,' + (G.flashT * 1.8) + ')';
                ctx.fillRect(0, 0, W, H);
            }
        }

        // 菜单背景动画：滚动场景 + 自动跳跃的方块
        function renderIdle(dt, t) {
            G.idleT += dt;
            const B = Math.min(H / 15.5, W / 19);
            const camX = G.idleT * B * 7;
            const gy = H - 2.3 * B;
            const hue = (G.idleT * 9) % 360;
            drawBG(hue, camX, B, 0);
            const fakeL = { pits: { has: () => false } };
            drawGround(fakeL, hue, camX, B, gy, 0, camX / B - 2, (camX + W) / B + 2);
            // 自动跳跃方块
            const period = 1.05, ph = (G.idleT % period) / period;
            const hop = 4.6 * 1.05 * ph * (1 - ph);
            const y = 0.5 + hop;
            const px = W * 0.30, py = gy - y * B;
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(ph * Math.PI);
            drawMiniCube(B * 0.96);
            ctx.restore();
        }

        // ============================================================
        //  主循环
        // ============================================================
        let lastTs = 0;
        function loop(ts) {
            const dt = Math.min(0.05, lastTs ? (ts - lastTs) / 1000 : 0.016);
            lastTs = ts;
            const t = ts / 1000;
            if (G.state === 'play') {
                updatePlay(dt);
                renderGame(t);
            } else if (G.state === 'paused' || G.state === 'complete') {
                if (G.A) renderGame(t); else renderIdle(dt, t);
            } else {
                renderIdle(dt, t);
            }
            requestAnimationFrame(loop);
        }

        // ============================================================
        //  启动 & 测试钩子
        // ============================================================
        applyOpt();
        buildCards();
        requestAnimationFrame(loop);

        window.__GD_TEST = { LEVELS, LEVEL_DEFS, newAttempt, stepAttempt, PHYS, MODES, DT };
    })();
    </script>
</body>
