<!DOCTYPE html>

<style>
:root{
  --bg:#0A0908; --panel:rgba(255,235,220,0.035); --line:rgba(255,220,200,0.1);
  --text:#F2E9E4; --muted:#95897F;
  --font-d:'Anton',Impact,sans-serif; --font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{
  min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);
  font-family:var(--font-m);display:flex;justify-content:center;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 520px at 12% -8%, rgba(224,69,69,0.12), transparent 60%),
    radial-gradient(880px 520px at 88% 108%, rgba(255,140,50,0.08), transparent 60%),
    repeating-linear-gradient(45deg, rgba(255,235,220,0.012) 0 2px, transparent 2px 26px);
}
.wrap{width:100%;max-width:900px;padding:28px 20px 130px;position:relative;z-index:1}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.h-title{
  font-family:var(--font-d);font-size:clamp(30px,6vw,46px);font-weight:400;letter-spacing:5px;
  background:linear-gradient(100deg,#E04545,#FFB454,#F2E9E4);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.h-sub{color:var(--muted);font-size:12px;letter-spacing:2px;margin-top:6px}
.back{color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--line);
  padding:8px 14px;border-radius:999px;transition:color .2s,border-color .2s}
.back:hover{color:#E04545;border-color:rgba(224,69,69,.45)}
.deck{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.viz-box{position:relative;height:150px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--line)}
canvas#viz{position:absolute;inset:0;width:100%;height:100%;display:block}
.now{
  position:absolute;left:14px;top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  font-size:11px;letter-spacing:1px;color:var(--muted);pointer-events:none
}
.chip{border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:rgba(10,9,8,.6)}
.chip.sec{color:#0A0908;font-weight:700;border:none;background:var(--acc,#E04545)}
.chip.name{color:var(--text)}
.list{list-style:none}
.trk{
  display:grid;grid-template-columns:44px 1fr auto;gap:14px;align-items:center;
  padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;
  transition:background .15s;position:relative
}
.trk:last-child{border-bottom:none}
.trk:hover{background:rgba(255,235,220,.03)}
.trk:focus-visible{outline:2px solid #E04545;outline-offset:-2px}
.trk .no{
  font-family:var(--font-d);font-size:17px;color:var(--muted);
  width:44px;height:44px;border:1px solid var(--line);border-radius:8px;
  display:flex;align-items:center;justify-content:center;transform:skewX(-6deg)
}
.trk.on .no{color:#0A0908;background:var(--acc);border-color:var(--acc);box-shadow:0 0 18px var(--glow)}
.trk .t-name{font-family:var(--font-d);font-size:16px;letter-spacing:1.5px;color:var(--text)}
.trk.on .t-name{color:var(--acc)}
.trk .t-info{margin-top:5px;font-size:11px;color:var(--muted);letter-spacing:.5px;line-height:1.6}
.trk .t-info b{color:var(--acc);font-weight:500}
.trk .t-dur{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px}
.eq{display:none;align-items:flex-end;gap:2px;height:16px}
.trk.on.playing .eq{display:flex}
.eq i{width:3px;background:var(--acc);border-radius:2px;animation:eq .5s ease-in-out infinite}
.eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}
@keyframes eq{0%,100%{height:5px}50%{height:16px}}
.bar{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  width:100%;max-width:900px;z-index:5;padding:0 20px 16px
}
.bar-in{
  background:rgba(16,13,11,.92);backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:16px;padding:12px 16px;
  display:flex;flex-direction:column;gap:9px
}
.seek{position:relative;height:16px;cursor:pointer;display:flex;align-items:center}
.seek .rail{width:100%;height:4px;border-radius:2px;background:rgba(255,235,220,.1);overflow:hidden}
.seek .fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--acc,#E04545),#FFB454)}
.seek .dot{position:absolute;top:50%;left:0%;width:12px;height:12px;border-radius:50%;
  background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--acc,#E04545);opacity:0;transition:opacity .15s}
.seek:hover .dot{opacity:1}
.row{display:flex;align-items:center;gap:14px}
.btn{
  background:none;border:1px solid var(--line);color:var(--text);border-radius:50%;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .1s;touch-action:manipulation;flex:none
}
.btn:hover{border-color:var(--acc,#E04545);box-shadow:0 0 14px var(--glow,rgba(224,69,69,.25))}
.btn:active{transform:scale(.93)}
.btn:focus-visible{outline:2px solid #E04545;outline-offset:3px}
.btn svg{width:16px;height:16px;fill:var(--text)}
.btn.main{width:52px;height:52px;border-width:2px;border-color:var(--acc,#E04545)}
.btn.main svg{width:20px;height:20px;fill:var(--acc,#E04545)}
.meta{flex:1;min-width:0}
.meta .m-name{font-family:var(--font-d);font-size:14px;letter-spacing:1px;color:var(--acc,#E04545);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .m-time{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.vol{display:flex;align-items:center;gap:8px;color:var(--muted)}
.vol svg{width:15px;height:15px;fill:var(--muted);flex:none}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:86px;height:4px;border-radius:2px;
  background:rgba(255,235,220,.14);outline:none;cursor:pointer
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--acc,#E04545);box-shadow:0 0 8px var(--glow,rgba(224,69,69,.4))
}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;background:var(--acc,#E04545)}
.tip{color:var(--muted);font-size:11px;letter-spacing:1px;text-align:center;margin-top:14px}
@media (max-width:560px){
  .vol input{width:56px}
  .trk{grid-template-columns:36px 1fr auto;padding:14px 12px;gap:10px}
  .trk .no{width:36px;height:36px;font-size:14px}
}
@media (prefers-reduced-motion:reduce){ .eq i{animation:none;height:10px} }
</style>

<div class="wrap">

<script>
(function(){
'use strict';
/*ENGINE-START*/
/* ================================================================
   摇滚引擎：Riff 机器 —— 双轨失真吉他 + 蹄声闷音 + 五种鼓手
   数据即乐句：riff 循环铺满段落，事件谱一次编译，前瞻调度。
================================================================ */
var ctx=null, master=null, analyser=null, comp=null, convolver=null, noiseBuf=null;
var shpHeavy=null, shpLight=null;
var B=null, P=null;
var hz=function(m){ return 440*Math.pow(2,(m-69)/12); };
var clamp=function(v,a,b){ return v<a?a:v>b?b:v; };
function rnd(i,salt){ var x=Math.sin(i*127.1+salt*311.7)*43758.5453; return x-Math.floor(x); }
function mkCurve(k){
  var c=new Float32Array(1024);
  for(var i=0;i<1024;i++){ var x=i/511.5-1; c[i]=Math.tanh(k*x); }
  return c;
}
function initAudio(){
  if(ctx){ if(ctx.state==='suspended') ctx.resume(); return; }
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  master=ctx.createGain(); master.gain.value=0.82;
  analyser=ctx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.84;
  comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-12; comp.knee.value=20; comp.ratio.value=3;
  comp.attack.value=0.005; comp.release.value=0.26;
  var eqLo=ctx.createBiquadFilter(); eqLo.type='lowshelf';
  eqLo.frequency.value=90; eqLo.gain.value=-1.5;
  var eqHi=ctx.createBiquadFilter(); eqHi.type='highshelf';
  eqHi.frequency.value=6800; eqHi.gain.value=1.2;
  master.connect(eqLo); eqLo.connect(eqHi); eqHi.connect(analyser);
  analyser.connect(comp); comp.connect(ctx.destination);
  noiseBuf=ctx.createBuffer(1, ctx.sampleRate*1.2, ctx.sampleRate);
  var d=noiseBuf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  convolver=ctx.createConvolver();
  var len=Math.floor(ctx.sampleRate*1.3), ir=ctx.createBuffer(2,len,ctx.sampleRate);
  for(var c2=0;c2<2;c2++){
    var ch=ir.getChannelData(c2);
    for(var j=0;j<len;j++) ch[j]=(Math.random()*2-1)*Math.pow(1-j/len,2.4);
  }
  convolver.buffer=ir;
  var vOut=ctx.createGain(); vOut.gain.value=0.6;
  convolver.connect(vOut); vOut.connect(master);
  shpHeavy=mkCurve(9);
  shpLight=mkCurve(2.6);
  setInterval(schedule,25);
}
function makeBuses(){
  var out=ctx.createGain(); out.connect(master);
  var vb=ctx.createGain(); vb.connect(convolver);
  return {out:out,vb:vb};
}
function send(node,bus,amt){ var g=ctx.createGain(); g.gain.value=amt; node.connect(g); g.connect(bus); }
function toOut(g,p,vb){
  var n=g;
  if(p&&ctx.createStereoPanner){ var s=ctx.createStereoPanner(); s.pan.value=p; g.connect(s); n=s; }
  n.connect(B.out);
  if(vb) send(g,B.vb,vb);
}

/* ---------------- 乐器 ---------------- */
function kickR(t,v){
  if(!v||v<=0.0008) return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(165,t);
  o.frequency.exponentialRampToValueAtTime(46,t+0.05);
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);
  o.connect(g); g.connect(B.out); o.start(t); o.stop(t+0.26);
  var s=ctx.createBufferSource(); s.buffer=noiseBuf;
  var f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=3600;
  var ng=ctx.createGain(); ng.gain.setValueAtTime(v*0.5,t);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+0.014);
  s.connect(f); f.connect(ng); ng.connect(B.out); s.start(t); s.stop(t+0.02);
}
function snareR(t,v){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=0.7;
  var g=ctx.createGain(); g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
  s.connect(bp); bp.connect(g); toOut(g,-0.04,0.2);
  var o=ctx.createOscillator(),og=ctx.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(216,t);
  o.frequency.exponentialRampToValueAtTime(155,t+0.07);
  og.gain.setValueAtTime(v*0.7,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
  o.connect(og); og.connect(B.out);
  s.start(t); s.stop(t+0.22); o.start(t); o.stop(t+0.11);
}
function hatR(t,v,open){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true; s.playbackRate.value=1.35;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
  var g=ctx.createGain(); var d=open?0.34:0.05;
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  s.connect(hp); hp.connect(g); toOut(g,0.2,0);
  s.start(t); s.stop(t+d+0.02);
}
function rideR(t,v){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true; s.playbackRate.value=1.15;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6400;
  var g=ctx.createGain();
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
  s.connect(hp); hp.connect(g); toOut(g,0.24,0.06);
  s.start(t); s.stop(t+0.53);
}
function crashR(t,v){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=4600;
  var g=ctx.createGain(); g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+1.7);
  s.connect(hp); hp.connect(g); toOut(g,0.12,0.22);
  s.start(t); s.stop(t+1.75);
}
function tomR(t,f,v){
  if(!v||v<=0.0008) return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(f,t);
  o.frequency.exponentialRampToValueAtTime(f*0.55,t+0.22);
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);
  o.connect(g); g.connect(B.out); send(g,B.vb,0.12);
  o.start(t); o.stop(t+0.26);
}
function tambR(t,v){
  if(!v||v<=0.0008) return;
  for(var i=0;i<2;i++){
    var s2=ctx.createBufferSource(); s2.buffer=noiseBuf; s2.loop=true; s2.playbackRate.value=1.5;
    var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6200;
    var g=ctx.createGain(); var tt=t+i*0.024;
    g.gain.setValueAtTime(v*(i?0.6:1),tt);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+0.06);
    s2.connect(hp); hp.connect(g); toOut(g,0.3,0);
    s2.start(tt); s2.stop(tt+0.08);
  }
}
function gtrPower(t,root,v,d,o){
  if(!v||v<=0.0008) return; o=o||{};
  var mute=o.m; d=Math.max(mute?0.09:d,0.06);
  var sides=[-0.45,0.45];
  for(var si=0;si<2;si++){
    var pre=ctx.createGain(); pre.gain.value=0.33;
    var ivs=[0,7,12];
    for(var i2=0;i2<ivs.length;i2++){
      var os=ctx.createOscillator(); os.type='sawtooth';
      os.frequency.value=hz(root+ivs[i2]);
      os.detune.value=sides[si]*9+i2*1.7;
      os.connect(pre); os.start(t); os.stop(t+d+0.08);
    }
    var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=70;
    var sh=ctx.createWaveShaper(); sh.curve=shpHeavy;
    var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=0.7;
    lp.frequency.setValueAtTime(mute?720:3400,t);
    if(!mute) lp.frequency.exponentialRampToValueAtTime(2200,t+Math.max(0.2,d));
    var g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(v,t+0.004);
    if(mute){
      g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    } else {
      g.gain.setValueAtTime(v,t+Math.max(0.01,d-0.04));
      g.gain.linearRampToValueAtTime(0.0001,t+d+0.05);
    }
    pre.connect(hp); hp.connect(sh); sh.connect(lp); lp.connect(g);
    toOut(g,sides[si],mute?0.015:0.05);
  }
  var pk=ctx.createBufferSource(); pk.buffer=noiseBuf;
  var pf=ctx.createBiquadFilter(); pf.type='bandpass'; pf.frequency.value=3800; pf.Q.value=1;
  var pg=ctx.createGain(); pg.gain.setValueAtTime(v*0.7,t);
  pg.gain.exponentialRampToValueAtTime(0.0001,t+0.012);
  pk.connect(pf); pf.connect(pg); pg.connect(B.out);
  pk.start(t); pk.stop(t+0.02);
}
function gtrLead(t,n,v,d,o){
  if(!v||v<=0.0008) return; o=o||{};
  var f=hz(n); d=Math.max(d||0.2,0.08);
  var g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v,t+0.006);
  g.gain.setValueAtTime(v,t+Math.max(0.02,d-0.05));
  g.gain.linearRampToValueAtTime(0.0001,t+d+0.06);
  var vib=ctx.createOscillator(); vib.frequency.value=5.6;
  var vg=ctx.createGain(); vg.gain.setValueAtTime(0,t);
  vg.gain.linearRampToValueAtTime(d>0.4?22:9,t+Math.min(0.35,d*0.6));
  vib.connect(vg);
  var pre=ctx.createGain(); pre.gain.value=0.5;
  var dets=[-6,6];
  for(var i=0;i<2;i++){
    var os=ctx.createOscillator(); os.type='sawtooth';
    if(o.b!=null){
      os.frequency.setValueAtTime(hz(o.b),t);
      os.frequency.exponentialRampToValueAtTime(f,t+Math.min(0.12,d*0.5));
    } else os.frequency.value=f;
    if(o.f){
      os.frequency.setValueAtTime(f,t+d*0.55);
      os.frequency.exponentialRampToValueAtTime(f*0.5,t+d);
    }
    os.detune.value=dets[i];
    vg.connect(os.detune);
    os.connect(pre); os.start(t); os.stop(t+d+0.08);
  }
  var sh=ctx.createWaveShaper(); sh.curve=shpHeavy;
  var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2900; lp.Q.value=1;

/* ---------------- 乐句机 ---------------- */
function seqPlay(data,loopBars,meta,o){
  var T=meta.T, span=loopBars*16;
  var reps=Math.ceil(meta.n*16/span);
  var tr=o.tr||0;
  for(var r=0;r<reps;r++){
    for(var i=0;i<data.length;i++){
      var nt=data[i];
      var tick=r*span+nt[0];
      var bar=(tick/16)|0;
      if(bar>=meta.n) continue;
      var frac=tick-bar*16;
      var t=Math.max(0,meta.times[bar]+swT(T,frac)*meta.tks[bar]+(rnd(tick+i,171)-0.5)*0.006);
      var d=nt[2]*meta.tks[bar];
      var vel=o.vol*(0.88+rnd(tick+i,177)*0.24);
      var n=nt[1], fl=nt[3];
      if(o.mode==='power'){
        gp(t,n+tr,vel,d,fl==='m');
      } else if(o.mode==='lead'){
        E(t,gtrLead,n+tr,vel,d,(typeof fl==='object'&&fl)?fl:{});
      } else if(o.mode==='clean'){
        E(t,gtrClean,n+tr,vel,d);
      } else if(o.mode==='funk'){
        if(n===-1) E(t,scratchR,vel*0.5);
        else if(Object.prototype.toString.call(n)==='[object Array]'){
          var ns2=[];
          for(var q=0;q<n.length;q++) ns2.push(n[q]+tr);
          E(t,stabR,ns2,vel,d);
        }
        else E(t,gtrFunk,n+tr,vel,d);
      } else if(o.mode==='bass'){
        E(t,bassR,n+tr,vel,d,{s:fl==='s'});
      } else if(o.mode==='clav'){
        E(t,clavR,n+tr,vel,d);
      }
    }
  }
}
function gp(t,root,v,d,mute){ E(t,gtrPower,root,v,d,{m:mute}); }
function eights(bar,root,dur){
  var out=[];
  for(var i=0;i<8;i++) out.push([bar*16+i*2,root,dur||2]);
  return out;
}
function cat(){
  var out=[];
  for(var i=0;i<arguments.length;i++) out=out.concat(arguments[i]);
  return out;
}
function chugs(bar,root){
  var out=[];
  for(var i=0;i<8;i++) out.push([bar*16+i*2,root,1,'m']);
  return out;
}

          {seq:CLAV_S,loop:2,mode:'clav',vol:0.05,tr:12},
          {seq:SCR_P,loop:1,mode:'funk',vol:0.04}]},

        parts:[
          {seq:RIF_F,loop:2,mode:'funk',vol:0.055},
          {seq:BASS_F,loop:2,mode:'bass',vol:0.105},
          {seq:LB,loop:8,mode:'lead',vol:0.055}]},
      {name:'热线 III', bars:8, dr:'funk', drOpt:{en:1,crash:1},
        parts:[
          {seq:RIF_F,loop:2,mode:'funk',vol:0.052},
          {seq:BASS_F,loop:2,mode:'bass',vol:0.108},
          {seq:STABS,loop:2,mode:'funk',vol:0.052},
          {seq:CLAV,loop:2,mode:'clav',vol:0.04,tr:12},
          {seq:HOOK_L,loop:4,mode:'lead',vol:0.068}]},
      {name:'热线 IV', bars:8, dr:'funk', drOpt:{en:1,crash:1,tamb:1},
        parts:[
          {seq:RIF_F,loop:2,mode:'funk',vol:0.052},
          {seq:BASS_F,loop:2,mode:'bass',vol:0.108},
          {seq:STABS,loop:2,mode:'funk',vol:0.052},
          {seq:CLAV,loop:2,mode:'clav',vol:0.04,tr:12},
          {seq:HOOK_L,loop:4,mode:'lead',vol:0.068},
          {seq:HOOK_L,loop:4,mode:'lead',vol:0.024,tr:12}]},
      {name:'断电终止', bars:2, fill:false, extra:endX,
        stretch:function(b){ return b?1.5:1; }, parts:[]}
    ]
  });
})();
/*UI-START*/

/* ================================================================
   编译器 + 播放调度
================================================================ */
function buildScore(T){
  EVQ=[];
  var spb=60/T.bpm;
  var t=0, gi=0, secsMeta=[];
  for(var si=0;si<T.sections.length;si++){
    var S=T.sections[si];
    var n=S.bars, times=[], tks=[];
    for(var b=0;b<n;b++){
      var f=S.stretch?(S.stretch(b,n)||1):1;
      times.push(t);
      tks.push(spb*f/4);
      t+=spb*4*f;
    }
    var meta={times:times,tks:tks,n:n,T:T};
    for(var b2=0;b2<n;b2++){
      var bc=(function(bi){
        var t0b=times[bi], tkb=tks[bi];
        return {t:t0b,tk:tkb,bi:bi,n:n,gi:gi+bi,T:T,
          at:function(tick){ return t0b+swT(T,tick)*tkb; }};
      })(b2);
      var O=S.drOpt||{};
      if(S.dr&&DRK[S.dr]&&!(O.start&&b2<O.start)){
        DRK[S.dr](bc,{en:O.en,half:O.half,dbl:O.dbl,big:O.big,
          ride:O.ride,wall:O.wall,tamb:O.tamb,
          fill:(b2===n-1)&&S.fill!==false,
          crash:(b2===0)&&!!O.crash});
      }
      if(S.extra) S.extra(bc,meta);
    }
    var ps=S.parts||[];
    for(var pi=0;pi<ps.length;pi++) seqPlay(ps[pi].seq,ps[pi].loop||n,meta,ps[pi]);
    secsMeta.push({name:S.name,t0:times[0],t1:t});
    gi+=n;
  }
  EVQ.sort(function(a,b){ return a.t-b.t; });
  var out={ev:EVQ,dur:t+2.2,secs:secsMeta,bars:gi};
  EVQ=null;
  return out;
}

var SCORES=[];
function scoreOf(i){
  if(!SCORES[i]) SCORES[i]=buildScore(TRACKS[i]);
  return SCORES[i];
}

var cur=-1, playing=false, pausedAt=0;
function schedule(){
  if(!P||!ctx) return;
  var ahead=ctx.currentTime+0.3;
  var sc=P.sc, k=0;
  while(P.idx<sc.ev.length&&P.t0+sc.ev[P.idx].t<ahead&&k<500){
    var x=sc.ev[P.idx];
    var at=P.t0+x.t;
    if(at>=ctx.currentTime-0.03){
      try{ x.fn.apply(null,[at].concat(x.a)); }catch(err){}
    }
    P.idx++; k++;
  }
  if(P.idx>=sc.ev.length) P.done=true;
}
function stopPlay(){
  if(!P) return;
  var old=P; P=null;
  var tt=ctx.currentTime;
  [old.bus.out,old.bus.vb].forEach(function(g){
    try{
      g.gain.cancelScheduledValues(tt);
      g.gain.setValueAtTime(g.gain.value,tt);
      g.gain.linearRampToValueAtTime(0.0001,tt+0.15);
    }catch(err){}
  });
  setTimeout(function(){
    try{ old.bus.out.disconnect(); old.bus.vb.disconnect(); }catch(err){}
  },500);
}
function playTrack(i,off){
  initAudio();
  stopPlay();
  cur=i;
  B=makeBuses();
  var sc=scoreOf(i);
  off=Math.max(0,Math.min(off||0,sc.dur-0.5));
  P={sc:sc,bus:B,idx:0,t0:ctx.currentTime+0.15-off,done:false};
  while(P.idx<sc.ev.length&&sc.ev[P.idx].t<off) P.idx++;
  playing=true;
  updateUI();
  schedule();
}
function togglePlay(){
  if(!ctx||cur<0){ playTrack(0,0); return; }
  if(playing&&P){
    pausedAt=ctx.currentTime-P.t0;
    stopPlay(); playing=false;
  } else {
    playTrack(cur,Math.max(0,Math.min(pausedAt,scoreOf(cur).dur-1)));
  }
  updateUI();
}
function nextTrack(d){
  var i=cur<0?0:(cur+d+TRACKS.length)%TRACKS.length;
  pausedAt=0;
  playTrack(i,0);
}

/* ---------------- UI ---------------- */
var listEl=document.getElementById('list');
var chipNow=document.getElementById('chipNow');
var chipSec=document.getElementById('chipSec');
var chipBpm=document.getElementById('chipBpm');
var mName=document.getElementById('mName');
var mTime=document.getElementById('mTime');
var fillEl=document.getElementById('fill');
var dotEl=document.getElementById('dot');
var seekEl=document.getElementById('seek');
var bPlay=document.getElementById('bPlay');
var iPlay=document.getElementById('iPlay');
var iPause=document.getElementById('iPause');

function fmt(s){
  s=Math.max(0,Math.floor(s));
  return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2);
}
TRACKS.forEach(function(T,i){
  var sc=scoreOf(i);
  var li=document.createElement('li');
  li.className='trk'; li.tabIndex=0;
  li.setAttribute('role','button');
  li.setAttribute('aria-label','播放 '+T.name);
  li.style.setProperty('--acc',T.color);
  li.style.setProperty('--glow',T.glow);
  li.innerHTML=
    '<div class="no">'+(i+1)+'</div>'+
    '<div><div class="t-name">'+T.name+'</div>'+
    '<div class="t-info"><b>'+T.genre+'</b> · '+T.bpm+' BPM · '+T.key+' · '+
    T.sections.length+' 段 · '+sc.bars+' 小节</div></div>'+
    '<div class="t-dur"><span class="eq"><i></i><i></i><i></i></span><span>'+fmt(sc.dur)+'</span></div>';
  li.addEventListener('click',function(){ pausedAt=0; playTrack(i,0); });
  li.addEventListener('keydown',function(ev){
    if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); pausedAt=0; playTrack(i,0); }
  });
  listEl.appendChild(li);
});
var rows=listEl.querySelectorAll('.trk');

function updateUI(){
  rows.forEach(function(r,i){
    r.classList.toggle('on',i===cur);
    r.classList.toggle('playing',i===cur&&playing);
  });
  if(cur>=0){
    var T=TRACKS[cur];
    var barIn=document.querySelector('.bar-in');
    barIn.style.setProperty('--acc',T.color);
    barIn.style.setProperty('--glow',T.glow);
    chipNow.textContent=T.name;
    chipBpm.textContent=T.bpm+' BPM · '+T.key;
    chipBpm.style.display='';
    chipSec.style.background=T.color;
    mName.textContent=T.name;
    mName.style.color=T.color;
  }
  iPlay.style.display=playing?'none':'block';
  iPause.style.display=playing?'block':'none';
  bPlay.setAttribute('aria-label',playing?'暂停':'播放');
}
bPlay.addEventListener('click',togglePlay);
document.getElementById('bPrev').addEventListener('click',function(){ nextTrack(-1); });
document.getElementById('bNext').addEventListener('click',function(){ nextTrack(1); });
document.getElementById('vol').addEventListener('input',function(){
  if(master) master.gain.value=this.value/100;
});
seekEl.addEventListener('pointerdown',function(ev){
  if(cur<0) return;
  var r=seekEl.getBoundingClientRect();
  var frac=clamp((ev.clientX-r.left)/r.width,0,1);
  pausedAt=frac*scoreOf(cur).dur;
  if(playing||!ctx) playTrack(cur,pausedAt);
  else updateUI();
});
document.addEventListener('keydown',function(ev){
  if(ev.repeat) return;
  if(ev.code==='Space'){ ev.preventDefault(); togglePlay(); }
  else if(ev.code==='ArrowRight') nextTrack(1);
  else if(ev.code==='ArrowLeft') nextTrack(-1);
});

/* ---------------- 可视化 ---------------- */
var cv=document.getElementById('viz'), cc=cv.getContext('2d');
var freqData=null, waveData=null;
function resizeViz(){
  var r=cv.parentElement.getBoundingClientRect();
  cv.width=Math.floor(r.width*(window.devicePixelRatio||1));
  cv.height=Math.floor(r.height*(window.devicePixelRatio||1));
}
window.addEventListener('resize',resizeViz);
resizeViz();
function hexA(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function sectionAt(sc,el){
  for(var i=sc.secs.length-1;i>=0;i--)
    if(el>=sc.secs[i].t0) return sc.secs[i];
  return sc.secs[0];
}
function draw(){
  requestAnimationFrame(draw);
  var w=cv.width,h=cv.height;
  cc.clearRect(0,0,w,h);
  var color=cur>=0?TRACKS[cur].color:'#5A3A33';
  if(analyser){
    if(!freqData) freqData=new Uint8Array(analyser.frequencyBinCount);
    if(!waveData) waveData=new Uint8Array(analyser.fftSize);
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(waveData);
    var N=64, gap=Math.max(1,Math.floor(w*0.003));
    var bw=(w-gap*(N-1))/N;
    for(var i=0;i<N;i++){
      var idx=Math.floor(Math.pow(i/N,1.55)*freqData.length*0.65);
      var v=freqData[idx]/255;
      var bh=Math.max(h*0.02,v*v*h*0.85);
      cc.fillStyle=hexA(color,0.3);
      cc.globalAlpha=playing?0.8:0.2;
      cc.fillRect(i*(bw+gap),h-bh,bw,bh);
    }
    cc.globalAlpha=playing?0.9:0.3;
    cc.strokeStyle=hexA(color,0.85);
    cc.lineWidth=Math.max(1.5,h*0.012);
    cc.beginPath();
    var step=Math.max(1,Math.floor(waveData.length/w));
    for(var x=0;x<w;x++){
      var s=waveData[Math.min(waveData.length-1,x*step)]/128-1;
      var y=h*0.5+s*h*0.4;
      if(x===0) cc.moveTo(x,y); else cc.lineTo(x,y);
    }
    cc.stroke();
    cc.globalAlpha=1;
  }
  if(P&&ctx&&cur>=0){
    var sc=scoreOf(cur);
    var el=clamp(ctx.currentTime-P.t0,0,sc.dur);
    var frac=el/sc.dur;
    fillEl.style.width=(frac*100)+'%';
    dotEl.style.left=(frac*100)+'%';
    mTime.textContent=fmt(el)+' / '+fmt(sc.dur);
    seekEl.setAttribute('aria-valuenow',Math.round(frac*100));
    var x=sectionAt(sc,el);
    chipSec.textContent=x.name;
    chipSec.style.display='';
    if(P.done&&ctx.currentTime>P.t0+sc.dur+0.8) nextTrack(1);
  } else if(cur>=0){
    mTime.textContent=fmt(pausedAt)+' / '+fmt(scoreOf(cur).dur);
  }
}
draw();
['pointerdown','touchstart','keydown'].forEach(function(evName){
  document.addEventListener(evName,function(){ if(ctx&&ctx.state==='suspended') ctx.resume(); },{passive:true});
});
})();
</script>
