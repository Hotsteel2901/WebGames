<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7ec8ff">
<title>酷跑英雄 · 致敬天天酷跑</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#7ec8ff;touch-action:none;overscroll-behavior:none;
    font-family:ui-rounded,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;user-select:none;-webkit-user-select:none}
  #c{position:fixed;inset:0;display:block;z-index:0}
  .zone{position:fixed;top:0;bottom:0;width:50%;z-index:5;touch-action:none}
  #zoneL{left:0}#zoneR{right:0}
  .hint{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));z-index:6;pointer-events:none;
    width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.22);border:3px solid rgba(255,255,255,.55);
    color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;
    text-shadow:0 2px 4px rgba(0,0,0,.35);opacity:0;transition:opacity .3s}
  .hint.show{opacity:1}
  #hintL{left:26px}#hintR{right:26px}
  .cbtn{position:fixed;top:calc(12px + env(safe-area-inset-top));z-index:10;width:46px;height:46px;border-radius:14px;
    border:2px solid rgba(255,255,255,.7);background:rgba(0,0,0,.28);color:#fff;font-size:20px;font-weight:700;
    display:none;align-items:center;justify-content:center;cursor:pointer}
  #btnPause{right:14px}#btnSound{right:70px}
  .wrap{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:rgba(20,40,70,.45);backdrop-filter:blur(3px)}
  .hidden{display:none!important}
  .panel{background:linear-gradient(#fffdf5,#ffeecb);border:4px solid #ff9d2e;border-radius:24px;
    padding:26px 34px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.35);max-width:88vw}
  .title{font-size:44px;font-weight:900;color:#ff6a00;letter-spacing:4px;
    text-shadow:0 3px 0 #fff,0 6px 10px rgba(255,106,0,.3)}
  .sub{font-size:14px;color:#a06a2c;margin:6px 0 14px}
  .stats{font-size:16px;color:#7a4a12;margin:8px 0 16px;line-height:1.8}
  .stats b{color:#e5541b;font-size:20px}
  .big{display:inline-block;margin:6px 8px;padding:14px 40px;font-size:22px;font-weight:800;color:#fff;
    background:linear-gradient(#ffb03a,#ff7c1f);border:none;border-radius:999px;cursor:pointer;
    box-shadow:0 5px 0 #d95d00,0 10px 18px rgba(0,0,0,.25);letter-spacing:2px}
  .big:active{transform:translateY(3px);box-shadow:0 2px 0 #d95d00}
  .big.alt{background:linear-gradient(#7fc5ff,#3a8ef0);box-shadow:0 5px 0 #1f5fb8,0 10px 18px rgba(0,0,0,.25)}
  .big.alt:active{box-shadow:0 2px 0 #1f5fb8}
  .howto{font-size:14px;color:#6b4a1e;line-height:2;margin-top:12px;text-align:left}
  .howto span{display:inline-block;background:#ffe3ad;border-radius:8px;padding:1px 8px;margin-right:6px;font-weight:700;color:#c15f00}
  .tip{font-size:12px;color:#b08048;margin-top:10px}
  .go{font-size:34px;font-weight:900;color:#e5401f;letter-spacing:4px;text-shadow:0 2px 0 #fff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="zoneL" class="zone"></div>
<div id="zoneR" class="zone"></div>
<div id="hintL" class="hint">下滑</div>
<div id="hintR" class="hint">跳跃</div>
<button id="btnSound" class="cbtn">♪</button>
<button id="btnPause" class="cbtn">Ⅱ</button>

<div id="menu" class="wrap">
  <div class="panel">
    <div class="title">酷跑英雄</div>
    <div class="sub">—— 致敬《天天酷跑》· 网页跑酷 ——</div>
    <div class="stats">最高分 <b id="mBest">0</b> ｜ 金币库 <b id="mCoins">0</b></div>
    <button id="btnStart" class="big">开始奔跑</button>
    <div class="howto">
      <div><span>跳跃</span>点击屏幕右侧 / 空格 · ↑ · W（再点一次二段跳）</div>
      <div><span>下滑</span>按住屏幕左侧 / ↓ · S（空中按下＝急速下坠）</div>
      <div><span>道具</span>磁铁吸币 · 护盾挡伤 · 巨人化碾碎障碍 · 飞行冲刺</div>
      <div><span>小心</span>尖刺、木箱、巨石、悬浮电球，还有悬崖！</div>
    </div>
    <div class="tip" id="rotTip">手机横屏体验更佳</div>
  </div>
</div>

<div id="over" class="wrap hidden">
  <div class="panel">
    <div class="go">游戏结束</div>
    <div class="stats">
      本局得分 <b id="oScore">0</b><br>
      奔跑距离 <b id="oDist">0m</b> ｜ 金币 <b id="oCoin">0</b><br>
      历史最高 <b id="oBest">0</b> <span id="oNew" style="color:#ff2d55;font-weight:900"></span>
    </div>
    <button id="btnRetry" class="big">再来一局</button>
    <button id="btnHome" class="big alt">主菜单</button>
  </div>
</div>

<div id="paused" class="wrap hidden">
  <div class="panel">
    <div class="go" style="color:#3a8ef0">暂停中</div>
    <div style="height:14px"></div>
    <button id="btnResume" class="big">继续</button>
    <button id="btnRestart" class="big alt">重新开始</button>
  </div>
</div>

<script>
(function(){
'use strict';
var $=function(s){return document.querySelector(s)};
var cvs=$('#c'),ctx=cvs.getContext('2d');
var DPR=1,sc=1,W=1280,H=720,GY=600,PX=280;
var state='menu';
var scrollX=0,menuScroll=0,distM=0,coinN=0,bonus=0,shake=0,comboT=0,comboN=0;
var segs=[],obst=[],coinL=[],powers=[],parts=[],clouds=[];
var genX=0,lastT=0;
var best=+(localStorage.kp_best||0),bank=+(localStorage.kp_coins||0);
var soundOn=(localStorage.kp_snd||'1')==='1';
var G=3000,J1=1150,J2=1000;
var P={};
var slideHeld=false,jumpHeld=false,jumpBuf=0;
var leftIds={},rightIds={};

function resetPlayer(){
  P={h:0,vy:0,jumps:0,grounded:true,wasAir:false,slide:false,flip:0,legT:0,spin:0,
     inv:0,shield:false,magnet:0,fly:0,giant:0,dead:false,deadT:0,coyote:0};
}
resetPlayer();

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  var cw=window.innerWidth,ch=window.innerHeight;
  cvs.width=cw*DPR;cvs.height=ch*DPR;
  cvs.style.width=cw+'px';cvs.style.height=ch+'px';
  sc=Math.min(ch/720,cw/900)*DPR;
  W=cvs.width/sc;H=cvs.height/sc;GY=H-118;
  PX=Math.max(170,W*0.24);
}
window.addEventListener('resize',resize);
resize();

function rand(a,b){return a+Math.random()*(b-a)}
function hash(n){var x=Math.sin(n*127.1+311.7)*43758.5453;return x-Math.floor(x)}
function clamp(v,a,b){return v<a?a:(v>b?b:v)}
function speedNow(){return 400*(1+Math.min(1.15,distM/720))}

var AC=null,mGain=null,musTimer=0,musStep=0,musNext=0,noiseBuf=null;
function unlockAudio(){
  if(!AC){
    try{
      AC=new (window.AudioContext||window.webkitAudioContext)();
      mGain=AC.createGain();mGain.gain.value=soundOn?0.6:0;mGain.connect(AC.destination);
      var len=AC.sampleRate*0.25;noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
      var d=noiseBuf.getChannelData(0);for(var i=0;i<len;i++)d[i]=Math.random()*2-1;
      musNext=AC.currentTime+0.1;
    }catch(e){AC=null}
  }
  if(AC&&AC.state==='suspended')AC.resume();
}
function tone(f,t,dur,type,vol,f2){
  if(!AC)return;
  var o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(f,t);
  if(f2)o.frequency.exponentialRampToValueAtTime(f2,t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(mGain);o.start(t);o.stop(t+dur+0.02);
}
function noise(t,dur,vol,fq){
  if(!AC)return;
  var s=AC.createBufferSource();s.buffer=noiseBuf;s.loop=true;
  var g=AC.createGain(),fl=AC.createBiquadFilter();
  fl.type='lowpass';fl.frequency.value=fq||900;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  s.connect(fl);fl.connect(g);g.connect(mGain);s.start(t);s.stop(t+dur+0.02);
}
function sfx(name){
  if(!AC||!soundOn)return;
  var t=AC.currentTime;
  if(name==='jump')tone(300,t,0.14,'square',0.07,620);
  else if(name==='jump2')tone(420,t,0.15,'square',0.07,900);
  else if(name==='coin'){var p=1+Math.min(comboN,12)*0.06;tone(920*p,t,0.07,'sine',0.09);tone(1350*p,t+0.06,0.12,'sine',0.09)}
  else if(name==='hit'){tone(280,t,0.4,'sawtooth',0.14,55);noise(t,0.3,0.12,600)}
  else if(name==='power'){[523,659,784,1047].forEach(function(f,i){tone(f,t+i*0.07,0.14,'square',0.06)})}
  else if(name==='smash'){tone(160,t,0.2,'square',0.1,45);noise(t,0.22,0.16,1400)}
  else if(name==='pop')tone(760,t,0.18,'triangle',0.1,180);
  else if(name==='land')tone(130,t,0.06,'triangle',0.06,80);
  else if(name==='step')tone(1200,t,0.03,'triangle',0.015);
}
var SCALE=[440,523.25,587.33,659.25,783.99,880,1046.5,1174.7];
var MEL=[0,2,3,2,4,-1,3,2,0,2,3,4,5,4,3,2,0,2,4,5,6,-1,5,4,3,4,3,2,0,-1,-1,-1];
var BASS=[110,110,87.31,87.31,98,98,130.81,123.47];
function musicTick(){
  if(!AC||!soundOn)return;
  var spb=60/138,stepDur=spb/2;
  while(musNext<AC.currentTime+0.25){
    if(state==='play'&&!P.dead){
      var m=MEL[musStep%MEL.length];
      if(m>=0)tone(SCALE[m],musNext,0.16,'square',0.028);
      if(musStep%2===0)tone(BASS[(musStep>>2)%BASS.length],musNext,0.28,'triangle',0.05);
      if(musStep%4===2)noise(musNext,0.04,0.02,6000);
    }
    musNext+=stepDur;musStep++;
  }
  if(musNext<AC.currentTime)musNext=AC.currentTime+0.05;
}

function tryJump(){
  if(P.fly>0||P.dead)return;
  if(P.grounded||P.coyote>0){
    P.vy=J1;P.grounded=false;P.jumps=1;P.coyote=0;jumpBuf=0;P.slide=false;
    dust(PX,GY-P.h,5);sfx('jump');
  }else if(P.jumps<2&&jumpBuf>0){
    P.vy=J2;P.jumps=2;P.flip=0.001;jumpBuf=0;sfx('jump2');
    puff(PX,GY-P.h-30,'#fff',4);
  }
}
function pressJump(){
  unlockAudio();
  if(state!=='play'||P.dead)return;
  jumpHeld=true;
  if(P.fly>0)return;
  jumpBuf=0.12;tryJump();
}
function pressSlide(){
  unlockAudio();
  if(state!=='play'||P.dead)return;
  slideHeld=true;
}

var zL=$('#zoneL'),zR=$('#zoneR');
function zoneDown(side,id){
  if(side==='L'){leftIds[id]=1;pressSlide()}
  else{rightIds[id]=1;pressJump()}
}
function anyRelease(id){
  delete leftIds[id];delete rightIds[id];
  slideHeld=Object.keys(leftIds).length>0||keySlide;
  jumpHeld=Object.keys(rightIds).length>0||keyJump;
}
zL.addEventListener('pointerdown',function(e){e.preventDefault();zoneDown('L',e.pointerId)});
zR.addEventListener('pointerdown',function(e){e.preventDefault();zoneDown('R',e.pointerId)});
window.addEventListener('pointerup',function(e){anyRelease(e.pointerId)});
window.addEventListener('pointercancel',function(e){anyRelease(e.pointerId)});
document.addEventListener('contextmenu',function(e){e.preventDefault()});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});

var keySlide=false,keyJump=false;
window.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){
    e.preventDefault();
    if(e.repeat)return;
    if(state==='menu'){start();return}
    if(state==='over'){start();return}
    keyJump=true;pressJump();jumpHeld=true;
  }else if(e.code==='ArrowDown'||e.code==='KeyS'){
    e.preventDefault();
    keySlide=true;pressSlide();slideHeld=true;
  }else if(e.code==='Escape'||e.code==='KeyP'){
    if(state==='play')pause();else if(state==='pause')resume();
  }
});
window.addEventListener('keyup',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){keyJump=false;jumpHeld=Object.keys(rightIds).length>0}
  if(e.code==='ArrowDown'||e.code==='KeyS'){keySlide=false;slideHeld=Object.keys(leftIds).length>0}
});

function segAt(wx){
  for(var i=0;i<segs.length;i++){
    var s=segs[i];
    if(wx>s.x-6&&wx<s.x+s.w+6)return true;
  }
  return false;
}

function gen(){
  while(genX<scrollX+W+800){
    var w=rand(560,1350);
    var s={x:genX,w:w};
    segs.push(s);
    populate(s);
    var gap=0;
    if(distM>35&&Math.random()<0.6){
      gap=rand(150,Math.min(430,speedNow()*0.7));
      coinArc(genX+w-40,gap+120,150+gap*0.25);
    }
    genX+=w+gap;
  }
  var cut=scrollX-300;
  segs=segs.filter(function(s){return s.x+s.w>cut});
  obst=obst.filter(function(o){return o.x+o.w>cut&&!o.dead});
  coinL=coinL.filter(function(c){return c.x>cut&&!c.dead});
  powers=powers.filter(function(p){return p.x>cut&&!p.dead});
}

function populate(s){
  var cx=s.x+(s.x<900?1000:200);
  var end=s.x+s.w-170;
  while(cx<end){
    var r=Math.random();
    if(r<0.34&&distM>12&&end-cx>200)cx+=addObstacle(cx);
    else if(r<0.62)cx+=coinRow(cx,end);
    else if(r<0.71&&distM>50){addPower(cx);cx+=150}
    else if(r<0.88)cx+=coinWave(cx,end);
    else cx+=130;
    cx+=rand(210,430)+speedNow()*0.18;
  }
}

function addObstacle(cx){
  var pool=['spike','box'];
  if(distM>120)pool.push('rock');
  if(distM>220)pool.push('drone','spike');
  if(distM>420)pool.push('box2','drone');
  var t=pool[Math.floor(Math.random()*pool.length)];
  var o;
  if(t==='spike'){var n=2+Math.floor(Math.random()*3);o={type:'spike',x:cx,w:n*34,h:46,n:n}}
  else if(t==='box'){o={type:'box',x:cx,w:64,h:68}}
  else if(t==='box2'){o={type:'box',x:cx,w:64,h:134}}
  else if(t==='rock'){o={type:'rock',x:cx,w:92,h:60}}
  else{o={type:'drone',x:cx,w:96,bot:58,top:180,t:Math.random()*7}}
  obst.push(o);
  if(o.type!=='drone'&&Math.random()<0.6)coinArc(cx-70,o.w+140,o.h+95);
  return o.w;
}

function coinRow(cx,end){
  var n=4+Math.floor(Math.random()*5);
  var hy=Math.random()<0.5?34:150;
  for(var i=0;i<n;i++){
    var x=cx+i*54;
    if(x>end)break;
    coinL.push({x:x,hy:hy,t:Math.random()*7});
  }
  return n*54;
}
function coinWave(cx,end){
  var n=8;
  for(var i=0;i<n;i++){
    var x=cx+i*52;
    if(x>end)break;
    coinL.push({x:x,hy:60+Math.sin(i/(n-1)*Math.PI*2)*45+45,t:i*0.3});
  }
  return n*52;
}
function coinArc(cx,wd,peak){
  var n=Math.max(5,Math.floor(wd/55));
  for(var i=0;i<=n;i++){
    var u=i/n;
    coinL.push({x:cx+u*wd,hy:20+peak*4*u*(1-u),t:i*0.25});
  }
}
function flyCoins(cx){
  for(var i=0;i<26;i++)
    coinL.push({x:cx+i*70,hy:220+Math.sin(i*0.55)*80,t:i*0.2});
}

function addPower(cx){
  var r=Math.random(),t;
  if(r<0.3)t='magnet';else if(r<0.55)t='shield';else if(r<0.8)t='fly';else t='giant';
  powers.push({x:cx,type:t,t:Math.random()*7});
}
var PCOL={magnet:'#00b7c8',shield:'#3a7bff',fly:'#ff8a00',giant:'#e5401f'};
var PCH={magnet:'磁',shield:'盾',fly:'飞',giant:'巨'};

function dust(x,y,n){
  for(var i=0;i<n;i++)
    parts.push({x:x+rand(-16,16),y:y+rand(-4,2),vx:rand(-140,-30),vy:rand(-90,-10),
      life:rand(0.25,0.5),max:0.5,size:rand(3,7),col:'#c9a06a',grav:200});
}
function puff(x,y,col,n){
  for(var i=0;i<n;i++)
    parts.push({x:x+rand(-10,10),y:y+rand(-10,10),vx:rand(-80,80),vy:rand(-80,80),
      life:rand(0.2,0.4),max:0.4,size:rand(3,6),col:col,grav:0});
}
function boom(x,y,cols){
  for(var i=0;i<16;i++)
    parts.push({x:x,y:y,vx:rand(-320,320),vy:rand(-420,-40),
      life:rand(0.4,0.8),max:0.8,size:rand(4,9),col:cols[i%cols.length],grav:900});
}
function sparkle(x,y){
  for(var i=0;i<6;i++)
    parts.push({x:x,y:y,vx:rand(-120,120),vy:rand(-160,20),
      life:rand(0.25,0.45),max:0.45,size:rand(2,5),col:'#ffd93d',grav:300});
}

for(var ci=0;ci<8;ci++)
  clouds.push({x:rand(0,1600),y:rand(40,240),s:rand(0.6,1.5),f:rand(0.12,0.3)});

function curScore(){return Math.floor(distM*5)+coinN*10+bonus}

function start(){
  state='play';
  scrollX=0;distM=0;coinN=0;bonus=0;shake=0;comboN=0;comboT=0;
  segs=[];obst=[];coinL=[];powers=[];parts=[];
  segs.push({x:-500,w:2100});genX=1600;
  resetPlayer();
  slideHeld=keySlide;jumpHeld=keyJump;
  $('#menu').classList.add('hidden');
  $('#over').classList.add('hidden');
  $('#paused').classList.add('hidden');
  $('#btnPause').style.display='flex';
  $('#btnSound').style.display='flex';
  $('#hintL').classList.add('show');$('#hintR').classList.add('show');
  setTimeout(function(){$('#hintL').classList.remove('show');$('#hintR').classList.remove('show')},3500);
  unlockAudio();
}
function goHome(){
  state='menu';
  $('#over').classList.add('hidden');
  $('#paused').classList.add('hidden');
  $('#menu').classList.remove('hidden');
  $('#btnPause').style.display='none';
  $('#mBest').textContent=best;$('#mCoins').textContent=bank;
}
function pause(){
  if(state!=='play')return;
  state='pause';$('#paused').classList.remove('hidden');
}
function resume(){
  if(state!=='pause')return;
  state='play';$('#paused').classList.add('hidden');lastT=0;
}
function die(hit){
  if(P.dead)return;
  P.dead=true;P.deadT=0;P.slide=false;P.magnet=0;P.giant=0;P.fly=0;
  if(hit){P.vy=880;shake=0.5;sfx('hit')}else{shake=0.2;sfx('hit')}
}
function endGame(){
  state='over';
  var s=curScore();
  var isNew=s>best;
  if(isNew){best=s;localStorage.kp_best=best}
  bank+=coinN;localStorage.kp_coins=bank;
  $('#oScore').textContent=s;
  $('#oDist').textContent=Math.floor(distM)+'m';
  $('#oCoin').textContent=coinN;
  $('#oBest').textContent=best;
  $('#oNew').textContent=isNew?'新纪录!':'';
  $('#over').classList.remove('hidden');
}
function smash(o){
  o.dead=true;bonus+=50;shake=Math.max(shake,0.35);sfx('smash');
  var sx=o.x-scrollX+o.w/2;
  var sy=o.type==='drone'?GY-(o.top+o.bot)/2:GY-o.h/2;
  boom(sx,sy,o.type==='box'?['#b5793a','#8a5a24','#d9a05e']:
       o.type==='drone'?['#9b59d0','#e5e5f0','#5ee0ff']:['#9aa0a8','#6a707a','#c8ccd4']);
}

function pRect(){
  var g=P.giant>0?1.7:1;
  var hg=(P.slide?44:84)*g;
  var wd=40*g;
  return {x:PX-wd/2,y:GY-P.h-hg,w:wd,h:hg-4};
}
function overlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function applyPower(t){
  bonus+=100;sfx('power');
  if(t==='magnet')P.magnet=8;
  else if(t==='shield')P.shield=true;
  else if(t==='fly'){P.fly=5;P.giant=0;P.slide=false;P.vy=420;flyCoins(scrollX+PX+400)}
  else if(t==='giant'){P.giant=6;P.fly=0}
  puff(PX,GY-P.h-50,PCOL[t],10);
}

function update(dt){
  var sp=P.dead?0:speedNow()*(P.fly>0?1.5:1);
  scrollX+=sp*dt;distM=scrollX/60;
  gen();
  if(shake>0)shake-=dt;
  if(comboT>0){comboT-=dt;if(comboT<=0)comboN=0}
  if(P.inv>0)P.inv-=dt;
  if(P.magnet>0)P.magnet-=dt;
  if(P.giant>0){P.giant-=dt;if(P.giant<=0)puff(PX,GY-P.h-40,'#ffb03a',8)}
  if(jumpBuf>0)jumpBuf-=dt;
  if(P.coyote>0)P.coyote-=dt;

  if(P.dead){
    P.deadT+=dt;P.vy-=G*dt;P.h+=P.vy*dt;P.spin+=9*dt;
    if(P.deadT>1.5||P.h<-700)endGame();
  }else if(P.fly>0){
    P.fly-=dt;
    var thrust=jumpHeld||slideHeld;
    P.vy+=(thrust?2800:-2600)*dt;
    P.vy=clamp(P.vy,-640,640);
    P.h+=P.vy*dt;
    var maxH=GY-150;
    if(P.h<12){P.h=12;P.vy=0}
    if(P.h>maxH){P.h=maxH;P.vy=0}
    if(Math.random()<0.7)
      parts.push({x:PX-34,y:GY-P.h-40+rand(-8,8),vx:rand(-380,-260),vy:rand(-30,30),
        life:0.25,max:0.25,size:rand(4,8),col:Math.random()<0.5?'#ff8a00':'#ffd93d',grav:0});
    if(P.fly<=0){P.inv=1.6;P.jumps=1}
  }else{
    var supported=segAt(scrollX+PX);
    var floor=supported?0:-9999;
    P.vy-=G*dt;
    if(slideHeld&&!P.grounded)P.vy-=5200*dt;
    P.h+=P.vy*dt;
    if(P.h<=floor&&P.vy<=0){
      if(P.wasAir){dust(PX,GY,8);sfx('land');if(slideHeld)shake=Math.max(shake,0.12)}
      P.h=floor;P.vy=0;P.grounded=true;P.wasAir=false;P.jumps=0;P.flip=0;P.coyote=0.09;
      if(jumpBuf>0)tryJump();
    }else{
      if(P.grounded){P.grounded=false}
      P.wasAir=true;
    }
    if(P.flip>0){P.flip+=dt*2.6;if(P.flip>=1)P.flip=0}
    P.slide=slideHeld&&P.grounded;
    if(P.grounded){
      P.legT+=sp*dt*0.024;
      if(Math.random()<sp*dt*0.008)dust(PX-14,GY,1);
    }
    if(P.h<-260)die(false);
  }

  if(!P.dead){
    var pr=pRect();
    for(var i=0;i<obst.length;i++){
      var o=obst[i];
      if(o.dead)continue;
      var sx=o.x-scrollX;
      if(sx>W+100||sx+o.w<-100)continue;
      var or;
      if(o.type==='drone')or={x:sx+8,y:GY-o.top,w:o.w-16,h:o.top-o.bot};
      else if(o.type==='spike')or={x:sx+5,y:GY-o.h+12,w:o.w-10,h:o.h-12};
      else or={x:sx+6,y:GY-o.h+4,w:o.w-12,h:o.h-4};
      if(overlap(pr,or)){
        if(P.fly>0||P.giant>0){smash(o)}
        else if(P.inv>0){}
        else if(P.shield){P.shield=false;smash(o);P.inv=1.2;sfx('pop')}
        else die(true);
      }
    }
    var pcx=PX,pcy=GY-P.h-(P.slide?22:42)*(P.giant>0?1.7:1);
    for(var j=0;j<coinL.length;j++){
      var c=coinL[j];
      if(c.dead)continue;
      var csx=c.x-scrollX,csy=GY-c.hy;
      if(csx>W+80||csx<-80)continue;
      c.t+=dt*6;
      var dx=pcx-csx,dy=pcy-csy,d2=dx*dx+dy*dy;
      if(P.magnet>0&&d2<300*300)c.pull=true;
      if(c.pull){
        var d=Math.sqrt(d2)||1,pv=(900+distM)*dt;
        c.x+=dx/d*pv;c.hy-=dy/d*pv;
      }
      if(d2<(P.giant>0?70:46)*(P.giant>0?70:46)){
        c.dead=true;coinN++;comboN++;comboT=1;
        sparkle(csx,csy);sfx('coin');
      }
    }
    for(var k=0;k<powers.length;k++){
      var pw=powers[k];
      if(pw.dead)continue;
      var psx=pw.x-scrollX;
      if(psx>W+80||psx<-80)continue;
      pw.t+=dt*3;
      var pdy=GY-(126+Math.sin(pw.t)*12)-pcy,pdx=psx-pcx;
      if(pdx*pdx+pdy*pdy<72*72){pw.dead=true;applyPower(pw.type)}
    }
  }

  for(var n=parts.length-1;n>=0;n--){
    var pa=parts[n];
    pa.life-=dt;
    if(pa.life<=0){parts.splice(n,1);continue}
    pa.vy+=pa.grav*dt;
    pa.x+=(pa.vx-(P.dead?0:sp))*dt;
    pa.y+=pa.vy*dt;
  }
  musicTick();
}

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawSky(eff){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#5db4ff');g.addColorStop(0.55,'#9fd8ff');g.addColorStop(1,'#e8f7ff');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,240,180,0.9)';
  ctx.beginPath();ctx.arc(W-140,110,52,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,240,180,0.28)';
  ctx.beginPath();ctx.arc(W-140,110,86,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.92)';
  for(var i=0;i<clouds.length;i++){
    var c=clouds[i];
    var cx=((c.x-eff*c.f)%(W+400)+W+400)%(W+400)-200;
    ctx.beginPath();
    ctx.arc(cx,c.y,26*c.s,0,7);
    ctx.arc(cx+30*c.s,c.y-12*c.s,20*c.s,0,7);
    ctx.arc(cx+58*c.s,c.y,24*c.s,0,7);
    ctx.fill();
  }
  var per=560,f=0.32,off=eff*f,i0=Math.floor(off/per)-1;
  ctx.fillStyle='#7fb8de';
  for(var m=i0;m<i0+W/per+3;m++){
    var mx=m*per-off,mh=130+hash(m)*170;
    ctx.beginPath();
    ctx.moveTo(mx-per*0.6,GY);
    ctx.lineTo(mx,GY-mh);
    ctx.lineTo(mx+per*0.6,GY);
    ctx.closePath();ctx.fill();
  }
  per=250;f=0.58;off=eff*f;i0=Math.floor(off/per)-1;
  for(var b=i0;b<i0+W/per+3;b++){
    var bx=b*per-off,bh=90+hash(b*3.7)*160,bw=per*0.72;
    ctx.fillStyle=hash(b*9.1)<0.5?'#a9c9e8':'#93bade';
    ctx.fillRect(bx,GY-bh,bw,bh+4);
    ctx.fillStyle='rgba(255,255,255,0.55)';
    for(var wy=GY-bh+14;wy<GY-16;wy+=26)
      for(var wx2=bx+10;wx2<bx+bw-14;wx2+=30)
        if(hash(b*13+wy*0.7+wx2)<0.7)ctx.fillRect(wx2,wy,12,12);
  }
}

function drawGroundSeg(sx,w){
  ctx.fillStyle='#8a5a34';
  ctx.fillRect(sx,GY,w,H-GY);
  ctx.fillStyle='#6e4526';
  ctx.fillRect(sx,GY,10,H-GY);
  ctx.fillRect(sx+w-10,GY,10,H-GY);
  ctx.fillStyle='#58c24f';
  rr(sx-2,GY-8,w+4,26,8);ctx.fill();

  ctx.fillStyle='rgba(60,35,15,0.35)';

    var lx=wx-scrollX;
    if(lx>sx+8&&lx<sx+w-12)
      ctx.fillRect(lx,GY+34+hash(wx)*60,10+hash(wx*3)*14,7);
  }
  ctx.fillStyle='#3f9c38';
  var g0=Math.ceil((scrollX+sx)/110)*110;
  for(var gx=g0;gx<scrollX+sx+w;gx+=110){

    if(tx>sx+14&&tx<sx+w-20){
      ctx.beginPath();
      ctx.moveTo(tx,GY-6);ctx.lineTo(tx+4,GY-20-hash(gx*7)*10);ctx.lineTo(tx+8,GY-6);
      ctx.closePath();ctx.fill();

  }
}

function drawObstacle(o){
  var sx=o.x-scrollX;
  if(o.type==='spike'){
    for(var i=0;i<o.n;i++){
      var tx=sx+i*34;
      ctx.fillStyle='#aab2bc';
      ctx.beginPath();
      ctx.moveTo(tx,GY);ctx.lineTo(tx+17,GY-o.h);ctx.lineTo(tx+34,GY);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#7d8590';
      ctx.beginPath();
      ctx.moveTo(tx+17,GY-o.h);ctx.lineTo(tx+34,GY);ctx.lineTo(tx+22,GY);
      ctx.closePath();ctx.fill();
    }
  }else if(o.type==='box'){
    var boxes=o.h>100?2:1;
    for(var b2=0;b2<boxes;b2++){
      var by=GY-(b2+1)*66-b2*2;
      ctx.fillStyle='#b5793a';rr(sx,by,64,64,6);ctx.fill();
      ctx.strokeStyle='#8a5a24';ctx.lineWidth=4;
      rr(sx+3,by+3,58,58,4);ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sx+5,by+5);ctx.lineTo(sx+59,by+59);
      ctx.moveTo(sx+59,by+5);ctx.lineTo(sx+5,by+59);
      ctx.stroke();
    }
  }else if(o.type==='rock'){
    ctx.fillStyle='#9aa0a8';
    ctx.beginPath();
    ctx.moveTo(sx,GY);
    ctx.quadraticCurveTo(sx+8,GY-o.h,sx+40,GY-o.h);
    ctx.quadraticCurveTo(sx+84,GY-o.h+4,sx+o.w,GY);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#7d848e';
    ctx.beginPath();
    ctx.moveTo(sx+44,GY-o.h+2);
    ctx.quadraticCurveTo(sx+84,GY-o.h+6,sx+o.w,GY);
    ctx.lineTo(sx+48,GY);ctx.closePath();ctx.fill();
  }else if(o.type==='drone'){
    var cy=GY-(o.top+o.bot)/2+Math.sin(o.t+performance.now()*0.003)*5;
    var r=(o.top-o.bot)/2;
    ctx.strokeStyle='rgba(94,224,255,0.5)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(sx+o.w/2,cy,r+6,0,7);ctx.stroke();
    ctx.fillStyle='#9b59d0';
    ctx.beginPath();ctx.arc(sx+o.w/2,cy,r-6,0,7);ctx.fill();
    ctx.fillStyle='#5ee0ff';
    var a0=performance.now()*0.006;
    for(var s5=0;s5<8;s5++){
      var an=a0+s5*Math.PI/4;
      ctx.beginPath();
      ctx.arc(sx+o.w/2+Math.cos(an)*(r-4),cy+Math.sin(an)*(r-4),6,0,7);
      ctx.fill();
    }
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx+o.w/2-8,cy-8,7,0,7);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(sx+o.w/2-6,cy-8,3.5,0,7);ctx.fill();
  }
}

function drawCoin(c){
  var sx=c.x-scrollX,sy=GY-c.hy;
  var sq=Math.abs(Math.cos(c.t));
  ctx.save();ctx.translate(sx,sy);ctx.scale(Math.max(0.15,sq),1);
  ctx.fillStyle='#f5b400';
  ctx.beginPath();ctx.arc(0,0,13,0,7);ctx.fill();
  ctx.fillStyle='#ffd93d';
  ctx.beginPath();ctx.arc(0,0,9,0,7);ctx.fill();
  ctx.fillStyle='#f5b400';
  ctx.fillRect(-2.5,-6,5,12);
  ctx.restore();
}

function badge(x,y,r,type){
  ctx.fillStyle='rgba(255,255,255,0.9)';

function drawPlayer(dt){
  var gs=P.giant>0?1.7:1;
  if(P.giant>0&&P.giant<0.8)gs=1+(P.giant/0.8)*0.7;
  ctx.save();
  ctx.translate(PX,GY-P.h);
  if(P.dead)ctx.rotate(P.spin);
  else if(P.flip>0){ctx.translate(0,-42*gs);ctx.rotate(-P.flip*Math.PI*2);ctx.translate(0,42*gs)}
  else if(P.fly>0)ctx.rotate(-0.12);
  ctx.scale(gs,gs);

  if(P.slide){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath();ctx.ellipse(0,-2,42,7,0,0,7);ctx.fill();
    ctx.fillStyle='#ff7c1f';
    rr(-36,-38,58,26,12);ctx.fill();
    ctx.fillStyle='#ffcf9e';
    ctx.beginPath();ctx.arc(32,-32,20,0,7);ctx.fill();
    ctx.fillStyle='#7a4520';
    ctx.beginPath();ctx.arc(26,-44,13,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(39,-33,3,0,7);ctx.fill();
    ctx.fillStyle='#e5401f';
    rr(-52,-34,18,9,4);ctx.fill();
    ctx.fillStyle='#3a56c0';
    rr(-30,-16,20,10,4);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-58,-30);ctx.lineTo(-80,-30);
    ctx.moveTo(-52,-16);ctx.lineTo(-72,-16);ctx.stroke();
  }else{

      ctx.beginPath();ctx.ellipse(0,-P.h>-2?-2:-2,26,5,0,0,7);ctx.fill();
    }else{
      ctx.fillStyle='rgba(0,0,0,0.18)';
      ctx.beginPath();ctx.ellipse(0,-2,28,6,0,0,7);ctx.fill();
    }
    ctx.strokeStyle='#3a56c0';ctx.lineWidth=9;ctx.lineCap='round';
    if(run){
      ctx.beginPath();ctx.moveTo(-2,-34);ctx.lineTo(-4+a*16,-14+Math.max(0,-a)*6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(2,-34);ctx.lineTo(4+b*16,-14+Math.max(0,-b)*6);ctx.stroke();
      ctx.fillStyle='#e5401f';
      ctx.beginPath();ctx.ellipse(-4+a*16,-8+Math.max(0,-a)*4,10,6,0,0,7);ctx.fill();
      ctx.beginPath();ctx.ellipse(4+b*16,-8+Math.max(0,-b)*4,10,6,0,0,7);ctx.fill();
    }else{
      ctx.beginPath();ctx.moveTo(-2,-34);ctx.lineTo(-12,-18);ctx.stroke();
      ctx.beginPath();ctx.moveTo(2,-34);ctx.lineTo(10,-24);ctx.stroke();
      ctx.fillStyle='#e5401f';
      ctx.beginPath();ctx.ellipse(-14,-14,10,6,-0.4,0,7);ctx.fill();
      ctx.beginPath();ctx.ellipse(10,-20,10,6,-0.4,0,7);ctx.fill();
    }
    ctx.fillStyle='#ff7c1f';
    rr(-19,-66,38,36,12);ctx.fill();
    ctx.fillStyle='#e56410';
    rr(-19,-44,38,10,5);ctx.fill();
    ctx.strokeStyle='#ffcf9e';ctx.lineWidth=8;
    var arm=run?Math.sin(P.legT+Math.PI)*14:10;
    ctx.beginPath();ctx.moveTo(10,-58);ctx.lineTo(16+arm*0.5,-46+(run?arm*0.3:-14));ctx.stroke();
    ctx.fillStyle='#e5401f';
    ctx.beginPath();
    ctx.moveTo(-16,-62);
    ctx.quadraticCurveTo(-42,-58+Math.sin(performance.now()*0.02)*5,-58,-46+Math.sin(performance.now()*0.016)*8);
    ctx.lineTo(-54,-38+Math.sin(performance.now()*0.016)*8);
    ctx.quadraticCurveTo(-38,-48,-16,-52);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#ffcf9e';
    ctx.beginPath();ctx.arc(2,-90,25,0,7);ctx.fill();
    ctx.fillStyle='#7a4520';
    ctx.beginPath();ctx.arc(-3,-98,23,Math.PI*0.95,Math.PI*2.02);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-24,-96);ctx.lineTo(-32,-112);ctx.lineTo(-16,-106);
    ctx.lineTo(-12,-122);ctx.lineTo(-2,-108);ctx.lineTo(8,-120);ctx.lineTo(12,-104);
    ctx.lineTo(24,-110);ctx.lineTo(18,-95);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';

      ctx.arc(PX+Math.cos(an2)*54*gs,GY-P.h-42*gs+Math.sin(an2)*54*gs,4,0,7);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function render(dt){
  ctx.setTransform(sc,0,0,sc,0,0);
  var eff=state==='menu'?menuScroll:scrollX;
  if(shake>0){
    ctx.translate(rand(-1,1)*shake*14,rand(-1,1)*shake*14);
  }
  drawSky(eff);
  if(state==='menu'){
    drawGroundSeg(-20,W+40);
    var t=performance.now()*0.001;
    P.legT=t*14;P.grounded=true;P.slide=false;P.dead=false;P.h=0;
    drawPlayer(dt);
  }else{
    for(var i=0;i<segs.length;i++){
      var s=segs[i],sx=s.x-scrollX;
      if(sx>W||sx+s.w<0)continue;
      drawGroundSeg(sx,s.w);
    }
    for(var j=0;j<obst.length;j++){
      var o=obst[j];
      if(o.dead)continue;
      var ox=o.x-scrollX;
      if(ox>W+120||ox+o.w<-120)continue;
      drawObstacle(o);
    }
    for(var k=0;k<coinL.length;k++){
      var c=coinL[k];
      if(c.dead)continue;
      var cx2=c.x-scrollX;
      if(cx2>W+60||cx2<-60)continue;
      drawCoin(c);
    }
    for(var p2=0;p2<powers.length;p2++){
      if(powers[p2].dead)continue;
      var px2=powers[p2].x-scrollX;
      if(px2>W+80||px2<-80)continue;
      drawPower(powers[p2]);
    }
    drawPlayer(dt);
    for(var n=0;n<parts.length;n++){
      var pa=parts[n];
      ctx.globalAlpha=Math.max(0,pa.life/pa.max);
      ctx.fillStyle=pa.col;
      ctx.beginPath();ctx.arc(pa.x,pa.y,pa.size,0,7);ctx.fill();
    }
    ctx.globalAlpha=1;
    if(P.fly>0){
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=3;
      for(var l=0;l<6;l++){
        var ly=hash(l+Math.floor(performance.now()*0.02))*H;
        var lx=hash(l*7+Math.floor(performance.now()*0.03))*W;
        ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx-90,ly);ctx.stroke();
      }
    }
    if(P.giant>0){
      ctx.fillStyle='rgba(255,120,20,0.08)';
      ctx.fillRect(0,0,W,H);
    }
    drawHUD();
  }
}

function frame(t){
  requestAnimationFrame(frame);
  if(!lastT)lastT=t;
  var dt=Math.min(0.033,(t-lastT)/1000);
  lastT=t;
  if(state==='play')update(dt);
  else if(state==='menu')menuScroll+=180*dt;
  if(state!=='play'){
    for(var n=parts.length-1;n>=0;n--){
      parts[n].life-=dt;
      if(parts[n].life<=0)parts.splice(n,1);
    }
  }
  render(dt);
}
requestAnimationFrame(frame);

$('#btnStart').addEventListener('click',function(){unlockAudio();start()});
$('#btnRetry').addEventListener('click',function(){unlockAudio();start()});
$('#btnHome').addEventListener('click',goHome);
$('#btnResume').addEventListener('click',resume);
$('#btnRestart').addEventListener('click',start);
$('#btnPause').addEventListener('click',function(){
  if(state==='play')pause();else if(state==='pause')resume();
});
$('#btnSound').addEventListener('click',function(){
  soundOn=!soundOn;
  localStorage.kp_snd=soundOn?'1':'0';
  if(mGain)mGain.gain.value=soundOn?0.6:0;
  this.style.opacity=soundOn?'1':'0.4';
  unlockAudio();
});
$('#btnSound').style.opacity=soundOn?'1':'0.4';
$('#btnSound').style.display='flex';
document.addEventListener('visibilitychange',function(){
  if(document.hidden&&state==='play')pause();
});
$('#mBest').textContent=best;
$('#mCoins').textContent=bank;
if(window.innerWidth>window.innerHeight)$('#rotTip').style.display='none';
})();
</script>
