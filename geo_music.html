<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0A1A">
    <title>Geometry Dash BGM Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A1A;
            --surface: rgba(255,255,255,0.04);
            --player: #00FFCC;
            --purple: #A855F7;
            --orange: #FF6B35;
            --text: #FFFFFF;
            --muted: #A0A0B8;
            --font-display: 'Orbitron', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { color-scheme: dark; }
        body {
            min-height: 100vh; min-height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .container {
            width: 100%; max-width: 480px;
            padding: 32px 24px;
            display: flex; flex-direction: column; align-items: center; gap: 32px;
        }
        .header { text-align: center; }
        .title {
            font-family: var(--font-display);
            font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, #00FFCC, #A855F7, #FF6B35);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px; text-transform: uppercase;
        }
        .subtitle {
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 12px; letter-spacing: 2px; margin-top: 6px;
        }
        .back-link {
            font-family: var(--font-mono);
            font-size: 12px; color: var(--muted);
            text-decoration: none; transition: color 0.2s;
            display: inline-flex; align-items: center; gap: 6px; margin-top: 4px;
        }
        .back-link:hover { color: var(--player); }
        .back-link:focus-visible { outline: 2px solid var(--player); outline-offset: 4px; }

        .player-card {
            width: 100%; background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            padding: 32px 28px; display: flex; flex-direction: column; gap: 28px;
        }
        .track-info { text-align: center; }
        .track-label {
            font-family: var(--font-display);
            font-size: 16px; font-weight: 700; letter-spacing: 2px;
            color: var(--player); text-transform: uppercase; transition: color 0.3s;
        }
        .track-bpm {
            font-family: var(--font-mono);
            font-size: 13px; color: var(--muted); margin-top: 4px;
        }
        .track-sec {
            font-family: var(--font-mono);
            font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px;
            min-height: 14px;
        }
        .track-selector { display: flex; gap: 10px; justify-content: center; }
        .track-btn {
            flex: 1; max-width: 140px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--muted);
            font-family: var(--font-display);
            font-size: 13px; font-weight: 700;
            padding: 12px 16px; border-radius: 10px;
            cursor: pointer; letter-spacing: 1px;
            transition: border-color 0.2s, color 0.2s, background-color 0.2s, box-shadow 0.2s;
            text-transform: uppercase; touch-action: manipulation;
        }
        .track-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
        .track-btn:focus-visible { outline: 2px solid var(--player); outline-offset: 2px; }
        .track-btn.active-0 { border-color: var(--player); color: var(--player); box-shadow: 0 0 16px rgba(0,255,204,0.2); background: rgba(0,255,204,0.08); }
        .track-btn.active-1 { border-color: var(--purple); color: var(--purple); box-shadow: 0 0 16px rgba(168,85,247,0.2); background: rgba(168,85,247,0.08); }
        .track-btn.active-2 { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 16px rgba(255,107,53,0.2); background: rgba(255,107,53,0.08); }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .play-btn {
            width: 72px; height: 72px; border-radius: 50%;
            border: 2px solid var(--player); background: rgba(0,255,204,0.08);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s, transform 0.2s;
            touch-action: manipulation;
        }
        .play-btn:hover { background: rgba(0,255,204,0.15); box-shadow: 0 0 28px rgba(0,255,204,0.25); }
        .play-btn:active { transform: scale(0.94); }
        .play-btn:focus-visible { outline: 2px solid var(--player); outline-offset: 4px; }
        .play-btn svg { width: 28px; height: 28px; fill: var(--player); }
        .play-btn.playing { border-color: var(--purple); background: rgba(168,85,247,0.08); }
        .play-btn.playing:hover { box-shadow: 0 0 28px rgba(168,85,247,0.25); }
        .play-btn.playing svg { fill: var(--purple); }

        .viz {
            width: 100%; height: 48px;
            display: flex; align-items: flex-end; justify-content: center; gap: 3px;
        }
        .viz-bar {
            width: 6px; border-radius: 3px; background: var(--player);
            transition: height 0.1s ease-out, opacity 0.3s;
        }

        @media (prefers-reduced-motion: reduce) {
            .viz-bar { transition: none; }
            .play-btn { transition: none; }
        }
        @media (max-width: 400px) {
            .container { padding: 20px 16px; gap: 24px; }
            .player-card { padding: 24px 18px; gap: 22px; }
            .play-btn { width: 60px; height: 60px; }
            .play-btn svg { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">BGM Player</div>
            <div class="subtitle">Geometry Dash · 3 Original Tracks</div>
            <a href="Geometrydash.html" class="back-link">&larr; Back to Game</a>
        </div>
        <div class="player-card">
            <div class="track-info">
                <div class="track-label" id="trackLabel">NEON RUNNER</div>
                <div class="track-bpm" id="trackBpm">Normal &middot; 128 BPM</div>
                <div class="track-sec" id="trackSec"></div>
            </div>
            <div class="track-selector" role="radiogroup" aria-label="Track selection">
                <button class="track-btn" data-diff="0" role="radio" aria-checked="false">Easy</button>
                <button class="track-btn active-1" data-diff="1" role="radio" aria-checked="true">Normal</button>
                <button class="track-btn" data-diff="2" role="radio" aria-checked="false">Hard</button>
            </div>
            <div class="controls">
                <button class="play-btn" id="playBtn" aria-label="Play music">
                    <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
                    <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
                </button>
            </div>
            <div class="viz" id="viz"></div>
        </div>
    </div>
    <script>
    (function() {
        'use strict';
        var soundMuted = false;
        var sound = { ctx: null, masterGain: null, bgmEnabled: true };
        function initCtx() {
            if (sound.ctx) return;
            try {
                sound.ctx = new (window.AudioContext || window.webkitAudioContext)();
                sound.masterGain = sound.ctx.createGain();
                sound.masterGain.gain.value = 0.5;
                sound.masterGain.connect(sound.ctx.destination);
            } catch (_) {}
        }

        const BGM_HZ = m => 440 * Math.pow(2, (m - 69) / 12);

        const bsyn = {
            ready: false,
            init() {
                if (this.ready || !sound.ctx) return;
                const c = sound.ctx;
                this.bus = c.createGain(); this.bus.gain.value = 0.5;
                this.bus.connect(sound.masterGain);
                this.duck = c.createGain(); this.duck.connect(this.bus);
                this.dl = c.createDelay(1.2);
                this.fb = c.createGain(); this.fb.gain.value = 0.32;
                this.dlp = c.createBiquadFilter(); this.dlp.type = 'lowpass'; this.dlp.frequency.value = 3000;
                const dOut = c.createGain(); dOut.gain.value = 0.5;
                this.dlIn = c.createGain();
                this.dlIn.connect(this.dl); this.dl.connect(this.dlp);
                this.dlp.connect(this.fb); this.fb.connect(this.dl);
                this.dlp.connect(dOut); dOut.connect(this.bus);
                this.nb = c.createBuffer(1, c.sampleRate * 0.6, c.sampleRate);
                const d = this.nb.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
                this.ready = true;
            },
            setTempo(bpm) { if (this.ready) this.dl.delayTime.value = 0.75 * 60 / bpm; },
            ok() { return this.ready && sound.bgmEnabled && !soundMuted; },
            send(node, amt) {
                const g = sound.ctx.createGain(); g.gain.value = amt;
                node.connect(g); g.connect(this.dlIn);
            },
            kick(t, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const o = c.createOscillator(), g = c.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(150, t);
                o.frequency.exponentialRampToValueAtTime(44, t + 0.08);
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
                o.connect(g); g.connect(this.bus);
                o.start(t); o.stop(t + 0.24);
                this.duck.gain.cancelScheduledValues(t);
                this.duck.gain.setValueAtTime(0.5, t);
                this.duck.gain.linearRampToValueAtTime(1, t + 0.2);
            },
            snare(t, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const n = c.createBufferSource(); n.buffer = this.nb; n.loop = true;
                const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1700;
                const g = c.createGain();
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
                n.connect(hp); hp.connect(g); g.connect(this.bus);
                n.start(t); n.stop(t + 0.15);
                const o = c.createOscillator(), og = c.createGain();
                o.type = 'triangle';
                o.frequency.setValueAtTime(195, t);
                o.frequency.exponentialRampToValueAtTime(150, t + 0.06);
                og.gain.setValueAtTime(v * 0.6, t);
                og.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
                o.connect(og); og.connect(this.bus);
                o.start(t); o.stop(t + 0.09);
            },
            clap(t, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                for (let i = 0; i < 2; i++) {
                    const tt = t + i * 0.012;
                    const n = c.createBufferSource(); n.buffer = this.nb; n.loop = true;
                    const bp = c.createBiquadFilter(); bp.type = 'bandpass';
                    bp.frequency.value = 1400; bp.Q.value = 1.1;
                    const g = c.createGain();
                    g.gain.setValueAtTime(v * (i ? 1 : 0.5), tt);
                    g.gain.exponentialRampToValueAtTime(0.0001, tt + (i ? 0.16 : 0.03));
                    n.connect(bp); bp.connect(g); g.connect(this.bus);
                    n.start(tt); n.stop(tt + 0.18);
                }
            },
            hat(t, v, open) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const n = c.createBufferSource(); n.buffer = this.nb; n.loop = true;
                n.playbackRate.value = 1.3;
                const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 8200;
                const g = c.createGain(); const d = open ? 0.22 : 0.04;
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + d);
                n.connect(hp); hp.connect(g); g.connect(this.bus);
                n.start(t); n.stop(t + d + 0.02);
            },
            crash(t, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const n = c.createBufferSource(); n.buffer = this.nb; n.loop = true;
                const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 5000;
                const g = c.createGain();
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + 1.1);
                n.connect(hp); hp.connect(g); g.connect(this.bus);
                n.start(t); n.stop(t + 1.15);
            },
            sub(t, m, d, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const o = c.createOscillator(), g = c.createGain();
                o.type = 'sine'; o.frequency.value = BGM_HZ(m);
                g.gain.setValueAtTime(0.0001, t);
                g.gain.linearRampToValueAtTime(v, t + 0.015);
                g.gain.setValueAtTime(v, t + Math.max(0.02, d - 0.06));
                g.gain.exponentialRampToValueAtTime(0.0001, t + d);
                o.connect(g); g.connect(this.duck);
                o.start(t); o.stop(t + d + 0.02);
            },
            bass(t, m, d, v, acc) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 2;
                lp.frequency.setValueAtTime(acc ? 2300 : 1300, t);
                lp.frequency.exponentialRampToValueAtTime(240, t + Math.min(0.22, d));
                const g = c.createGain();
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + d);
                const o1 = c.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = BGM_HZ(m);
                const o2 = c.createOscillator(); o2.type = 'square'; o2.frequency.value = BGM_HZ(m - 12);
                const g2 = c.createGain(); g2.gain.value = 0.45;
                o1.connect(lp); o2.connect(g2); g2.connect(lp);
                lp.connect(g); g.connect(this.duck);
                o1.start(t); o2.start(t);
                o1.stop(t + d + 0.03); o2.stop(t + d + 0.03);
            },
            pluck(t, m, d, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 1;
                lp.frequency.setValueAtTime(4500, t);
                lp.frequency.exponentialRampToValueAtTime(380, t + Math.min(0.3, d));
                const g = c.createGain();
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + d);
                const o1 = c.createOscillator(); o1.type = 'triangle'; o1.frequency.value = BGM_HZ(m);
                const o2 = c.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = BGM_HZ(m);
                const g2 = c.createGain(); g2.gain.value = 0.4;
                o1.connect(lp); o2.connect(g2); g2.connect(lp);
                lp.connect(g); g.connect(this.duck);
                this.send(g, 0.16);
                o1.start(t); o2.start(t);
                o1.stop(t + d + 0.02); o2.stop(t + d + 0.02);
            },
            stab(t, ms, d, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 1.4;
                lp.frequency.setValueAtTime(2600, t);
                lp.frequency.exponentialRampToValueAtTime(500, t + d);
                const g = c.createGain();
                g.gain.setValueAtTime(v, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + d);
                ms.forEach(m => {
                    [-7, 7].forEach(det => {
                        const o = c.createOscillator(); o.type = 'sawtooth';
                        o.frequency.value = BGM_HZ(m); o.detune.value = det;
                        o.connect(lp); o.start(t); o.stop(t + d + 0.02);
                    });
                });
                lp.connect(g); g.connect(this.duck);
                this.send(g, 0.1);
            },
            lead(t, m, d, v, hard) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const lp = c.createBiquadFilter(); lp.type = 'lowpass';
                lp.frequency.value = hard ? 3600 : 2900; lp.Q.value = 0.8;
                const g = c.createGain();
                g.gain.setValueAtTime(0.0001, t);
                g.gain.linearRampToValueAtTime(v, t + 0.012);
                g.gain.setValueAtTime(v, t + Math.max(0.02, d - 0.05));
                g.gain.exponentialRampToValueAtTime(0.0001, t + d + 0.08);
                const vib = c.createOscillator(); vib.frequency.value = 5.4;
                const vg = c.createGain(); vg.gain.setValueAtTime(0, t);
                vg.gain.linearRampToValueAtTime(d > 0.3 ? 9 : 4, t + Math.min(0.3, d * 0.6));
                vib.connect(vg);
                [-7, 7].forEach(det => {
                    const o = c.createOscillator(); o.type = 'sawtooth';
                    o.frequency.value = BGM_HZ(m); o.detune.value = det;
                    vg.connect(o.detune);
                    o.connect(lp); o.start(t); o.stop(t + d + 0.1);
                });
                vib.start(t); vib.stop(t + d + 0.1);
                lp.connect(g); g.connect(this.duck);
                this.send(g, 0.28);
            },
            pad(t, ms, d, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const lp = c.createBiquadFilter(); lp.type = 'lowpass';
                lp.frequency.value = 1150; lp.Q.value = 0.5;
                const g = c.createGain();
                const att = Math.min(0.6, d * 0.3);
                g.gain.setValueAtTime(0.0001, t);
                g.gain.linearRampToValueAtTime(v, t + att);
                g.gain.setValueAtTime(v, t + Math.max(att, d - 0.2));
                g.gain.linearRampToValueAtTime(0.0001, t + d + 0.4);
                ms.forEach(m => {
                    [-8, 8].forEach(det => {
                        const o = c.createOscillator(); o.type = 'sawtooth';
                        o.frequency.value = BGM_HZ(m); o.detune.value = det;
                        o.connect(lp); o.start(t); o.stop(t + d + 0.45);
                    });
                });
                lp.connect(g); g.connect(this.duck);
            },
            riser(t, d, v) {
                if (!this.ok() || !v) return; const c = sound.ctx;
                const n = c.createBufferSource(); n.buffer = this.nb; n.loop = true;
                const hp = c.createBiquadFilter(); hp.type = 'highpass';
                hp.frequency.setValueAtTime(420, t);
                hp.frequency.exponentialRampToValueAtTime(5200, t + d);
                const g = c.createGain();
                g.gain.setValueAtTime(0.0001, t);
                g.gain.exponentialRampToValueAtTime(v, t + d);
                g.gain.linearRampToValueAtTime(0.0001, t + d + 0.05);
                n.connect(hp); hp.connect(g); g.connect(this.bus);
                n.start(t); n.stop(t + d + 0.08);
            }
        };

        const BGM_TRACKS = [
            (function() {
                const CH = [[57,60,64],[53,57,60],[60,64,67],[55,59,62]];
                const RT = [33,29,36,31];
                const P1 = [[0,76,3],[4,72,2],[6,74,2],[8,72,7],[16,72,3],[20,69,2],[22,67,2],[24,69,7]];
                const P2 = [[0,67,3],[4,72,2],[6,74,2],[8,76,7],[16,74,3],[20,71,2],[22,67,2],[24,74,7]];
                const ARP = [0,1,2,1];
                return { name:'SKYLINE CRUISE 云端巡航', sub:'Easy', bpm:100, loop:32,
                    secs:['铺垫','主题','主题·高八度','余韵'], fn(e) {
                    const b=e.b, s=e.s, ci=b%4, ch=CH[ci], sec=b>>3;
                    if (s===0) bsyn.kick(e.t, 0.4);
                    if (s===8 && sec>0) bsyn.kick(e.t, 0.34);
                    if (s===8) bsyn.clap(e.t, 0.15);
                    if (s%2===0) bsyn.hat(e.t, s%4===0?0.032:0.018);
                    if (sec>0 && s%4===2) bsyn.hat(e.t, 0.04, true);
                    if (b%8===7) { if (s===12) bsyn.clap(e.t,0.07); if (s===14) bsyn.clap(e.t,0.09); }
                    if (s===0) bsyn.sub(e.t, RT[ci], e.sd*10, 0.07);
                    if (s===0) bsyn.bass(e.t, RT[ci]+12, e.sd*3, 0.05);
                    if (s===10) bsyn.bass(e.t, RT[ci]+12, e.sd*2, 0.04);
                    if (s===0) bsyn.pad(e.t, ch.map(x=>x+12), e.sd*15, sec===3?0.034:0.022);
                    if (s%2===0 && sec!==3) bsyn.pluck(e.t, ch[ARP[(s>>1)&3]]+24, e.sd*1.6, sec===0?0.028:0.034);
                    if (sec===3 && s===0) bsyn.pluck(e.t, ch[2]+24, e.sd*8, 0.042);
                    if (sec===1 || sec===2) {
                        const mel = (ci<2)?P1:P2, pos=(b%2)*16+s;
                        for (const nt of mel) if (nt[0]===pos) {
                            bsyn.lead(e.t, nt[1]+(sec===2?12:0), nt[2]*e.sd, sec===2?0.032:0.048);
                            if (sec===2) bsyn.pluck(e.t, nt[1], nt[2]*e.sd, 0.028);
                        }
                    }
                }};
            })(),
            (function() {
                const CH = [[64,67,71],[60,64,67],[62,67,71],[62,66,69]];
                const RT = [40,36,43,38];
                const P1 = [[0,76,3],[6,79,3],[12,76,2],[16,79,3],[22,76,3],[28,72,3]];
                const P2 = [[0,74,3],[6,79,3],[12,74,2],[16,78,3],[22,74,3],[28,69,3]];
                const AP = [0,2,1,2];
                return { name:'NEON RUNNER 霓虹奔跑者', sub:'Normal', bpm:128, loop:32,
                    secs:['律动','主题','间奏','爬升','高潮'], fn(e) {
                    const b=e.b, s=e.s, ci=b%4, ch=CH[ci];
                    const brk=b>=16&&b<20, bld=b>=20&&b<24, big=b>=24;
                    if (!brk) { if (s%4===0) bsyn.kick(e.t, 0.44); }
                    else if (b===16 && s===0) bsyn.kick(e.t, 0.38);
                    if (!brk && (s===4||s===12)) bsyn.snare(e.t, big?0.19:0.16);
                    if (!brk && s%4===2) bsyn.hat(e.t, big?0.055:0.04, big&&s===14);
                    if (!brk && s%2===1 && (big||b>=8)) bsyn.hat(e.t, 0.015);
                    if (bld && b===23 && s%2===0) bsyn.snare(e.t, 0.09+s*0.008);
                    else if (!brk && b%8===7 && s>=12 && s%2===0) bsyn.snare(e.t, 0.11);
                    if (big && b%4===0 && s===0) bsyn.crash(e.t, 0.11);
                    if (!brk) {
                        if (s===0) bsyn.sub(e.t, RT[ci]-12, e.sd*3.5, 0.075);
                        if (s%4===2) bsyn.bass(e.t, RT[ci], e.sd*1.8, 0.08);
                    } else if (s===0) bsyn.sub(e.t, RT[ci]-12, e.sd*15, 0.065);
                    if (s%2===(big?0:1)) bsyn.pluck(e.t, ch[AP[(s>>2)&3]]+12, e.sd*1.4, brk?0.028:0.024);
                    if ((brk||big) && s===0) bsyn.pad(e.t, ch, e.sd*15, brk?0.03:0.018);
                    if (b===22 && s===0) bsyn.riser(e.t, e.sd*32, 0.05);
                    if ((b>=8&&b<16) || big) {
                        const mel = ci<2?P1:P2, pos=(b%2)*16+s;
                        for (const nt of mel) if (nt[0]===pos) {
                            bsyn.lead(e.t, nt[1], nt[2]*e.sd, 0.05);
                            if (big) bsyn.lead(e.t, nt[1]+12, nt[2]*e.sd, 0.018);
                        }
                    }
                }};
            })(),
            (function() {
                const CH = [[57,60,64],[53,57,60],[55,59,62],[52,56,59]];
                const RT = [33,29,31,28];
                const MEL = [
                    [[0,81,2],[4,79,2],[6,81,2],[10,84,3]],
                    [[0,81,2],[4,77,2],[6,79,2],[10,81,3]],
                    [[0,79,2],[4,83,2],[6,79,2],[10,74,3]],
                    [[0,80,2],[4,83,2],[6,80,2],[10,76,4]],
                ];
                const ACC = [1,0,0,0.6,0,0,1,0, 0,0.6,1,0,0,0.6,0,0];
                return { name:'OVERDRIVE PROTOCOL 过载协议', sub:'Hard', bpm:150, loop:32,
                    secs:['驱动','尖啸主题','半拍重压','蓄力','峰值'], fn(e) {
                    const b=e.b, s=e.s, ci=b%4, ch=CH[ci], r=RT[ci];
                    const half=b>=16&&b<20, bld=b>=20&&b<24, peak=b>=24;
                    if (half) {
                        if (s===0) bsyn.kick(e.t, 0.44);
                        if (s===8) bsyn.snare(e.t, 0.22);
                        if (s%4===2) bsyn.hat(e.t, 0.045, true);
                    } else {
                        if (s%4===0) bsyn.kick(e.t, 0.44);
                        if (peak && s===14 && b%2===1) bsyn.kick(e.t, 0.28);
                        if (s===4||s===12) bsyn.snare(e.t, peak?0.21:0.18);
                        bsyn.hat(e.t, s%2?(peak?0.028:0.016):(s%4===0?0.045:0.03), peak&&s===10);
                        if (b%4===3 && s>=12) bsyn.snare(e.t, 0.07+(s-12)*0.032);
                    }
                    if (bld) {
                        if (s%2===0) bsyn.snare(e.t, 0.05+(b-20)*0.028+s*0.004);
                        if (b===20 && s===0) bsyn.riser(e.t, e.sd*64, 0.05);
                    }
                    if (s===0 && b%4===0 && (peak||b%8===0)) bsyn.crash(e.t, 0.12);
                    if (!half) {
                        const a = ACC[s];
                        if (a) bsyn.bass(e.t, r+12+(s===6?12:(s===10?7:0)), e.sd*(a===1?1.6:1.1), 0.07*a+0.018, a===1);
                        if (s===0) bsyn.sub(e.t, r, e.sd*3.5, 0.068);
                    } else {
                        if (s===0) { bsyn.sub(e.t, r, e.sd*14, 0.075); bsyn.bass(e.t, r+12, e.sd*12, 0.045); }
                        if (s===11) bsyn.pluck(e.t, r+25, e.sd*2, 0.038);
                    }
                    if (!half && (s===3||s===11)) bsyn.stab(e.t, ch.map(x=>x+12), e.sd*1.5, peak?0.042:0.032);
                    if ((b>=8&&b<16) || peak) {
                        for (const nt of MEL[ci]) if (nt[0]===s) {
                            bsyn.lead(e.t, nt[1], nt[2]*e.sd, 0.05, true);
                            if (peak) bsyn.lead(e.t, nt[1]-12, nt[2]*e.sd, 0.02, true);
                        }
                    }
                    if (half && s===0) bsyn.pad(e.t, ch, e.sd*15, 0.032);
                }};
            })(),
        ];

        let diff = 1, playing = false;
        let step = 0, nextT = 0, startT = 0, rid = null;
        const playBtn = document.getElementById('playBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const trackLabel = document.getElementById('trackLabel');
        const trackBpm = document.getElementById('trackBpm');
        const trackSec = document.getElementById('trackSec');
        const viz = document.getElementById('viz');
        const COLORS = ['#00FFCC', '#A855F7', '#FF6B35'];

        for (let i = 0; i < 32; i++) {
            const bEl = document.createElement('div');
            bEl.className = 'viz-bar';
            bEl.style.height = '4px'; bEl.style.opacity = '0.3';
            viz.appendChild(bEl);
        }
        const vizBars = viz.querySelectorAll('.viz-bar');

        document.querySelectorAll('.track-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const d = parseInt(btn.dataset.diff, 10);
                if (d === diff) return;
                document.querySelectorAll('.track-btn').forEach(bt => {
                    bt.className = 'track-btn';
                    bt.setAttribute('aria-checked', 'false');
                });
                btn.classList.add('active-' + d);
                btn.setAttribute('aria-checked', 'true');
                diff = d;
                if (playing) { stop(); start(); }
                updateUI();
            });
        });

        function updateUI() {
            const c = BGM_TRACKS[diff];
            trackLabel.textContent = c.name;
            trackLabel.style.color = COLORS[diff];
            trackBpm.textContent = c.sub + ' \\u00B7 ' + c.bpm + ' BPM';
            playBtn.className = 'play-btn' + (playing ? ' playing' : '');
            if (!playing) trackSec.textContent = '';
            for (let i = 0; i < vizBars.length; i++) vizBars[i].style.background = COLORS[diff];
        }

        playBtn.addEventListener('click', () => {
            initCtx();
            if (sound.ctx && sound.ctx.state === 'suspended') sound.ctx.resume().catch(() => {});
            playing ? stop() : start();
        });

        function start() {
            initCtx();
            if (!sound.ctx) return;
            bsyn.init();
            bsyn.setTempo(BGM_TRACKS[diff].bpm);
            playing = true;
            step = 0;
            nextT = sound.ctx.currentTime + 0.1;
            startT = nextT;
            iconPlay.style.display = 'none'; iconPause.style.display = 'block';
            playBtn.setAttribute('aria-label', 'Pause music');
            updateUI();
            tick();
        }
        function stop() {
            playing = false;
            if (rid) cancelAnimationFrame(rid);
            rid = null;
            iconPlay.style.display = 'block'; iconPause.style.display = 'none';
            playBtn.setAttribute('aria-label', 'Play music');
            for (let i = 0; i < vizBars.length; i++) {
                vizBars[i].style.height = '4px'; vizBars[i].style.opacity = '0.3';
            }
            updateUI();
        }

        function tick() {
            if (!playing) return;
            rid = requestAnimationFrame(tick);
            const c = BGM_TRACKS[diff];
            const sd = 60 / c.bpm / 4;
            const ct = sound.ctx.currentTime;
            if (nextT < ct - 0.12) nextT = ct + 0.02;
            let n = 0;
            while (nextT < ct + 0.16 && n < 64) {
                const s = step & 15, b = (step >> 4) % c.loop;
                try { c.fn({ t: nextT, s: s, b: b, sd: sd }); } catch (_) {}
                step++; nextT += sd; n++;
            }
            const cur = Math.max(0, Math.floor((ct - startT) / sd));
            const cs = cur & 15, cb = (cur >> 4) % c.loop;
            const secIdx = Math.min(c.secs.length - 1, cb >> 3);
            trackSec.textContent = '\\u7B2C ' + (cb + 1) + '/' + c.loop + ' \\u5C0F\\u8282 \\u00B7 ' + c.secs[secIdx];
            for (let i = 0; i < vizBars.length; i++) {
                const on = (i % 16) === cs;
                const strong = cs % 4 === 0;
                const h = on ? (strong ? 42 : 26) + Math.random() * 6 : Math.max(4, 18 - Math.abs((i % 16) - cs) * 3);
                vizBars[i].style.height = h + 'px';
                vizBars[i].style.opacity = on ? '1' : '0.4';
            }
        }

        document.addEventListener('click', () => {
            if (sound.ctx && sound.ctx.state === 'suspended') sound.ctx.resume().catch(() => {});
        });
        updateUI();
    })();
    </script>
</body>
