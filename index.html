<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0A0F">
    <title>WebGames Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-root: #0A0A0F;
            --bg-elevated: rgba(255, 255, 255, 0.03);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(255, 255, 255, 0.12);
            --accent-blue: #3B82F6;
            --accent-cyan: #06B6D4;
            --accent-purple: #8B5CF6;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --font-display: 'Plus Jakarta Sans', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { color-scheme: dark; }

        body {
            font-family: var(--font-body);
            background: var(--bg-root);
            color: var(--text-primary);
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: orb-drift 20s ease-in-out infinite;
        }

        .ambient-orb:nth-child(1) {
            width: 600px; height: 600px;
            background: var(--accent-blue);
            top: -20%; left: -15%;
            animation-delay: 0s;
        }

        .ambient-orb:nth-child(2) {
            width: 500px; height: 500px;
            background: var(--accent-purple);
            bottom: -15%; right: -10%;
            animation-delay: -7s;
        }

        .ambient-orb:nth-child(3) {
            width: 400px; height: 400px;
            background: var(--accent-cyan);
            top: 40%; left: 50%;
            animation-delay: -14s;
        }

        @keyframes orb-drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(5%, -3%) scale(1.08); }
            50%  { transform: translate(-2%, 4%) scale(0.94); }
            75%  { transform: translate(-4%, -2%) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
        }

        .header {
            margin-bottom: 3rem;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin-bottom: 1.25rem;
        }

        .logo-mark svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent-cyan);
            fill: none;
            stroke-width: 2;
        }

        .title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text-primary);
        }

        .title-accent {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            margin-top: 0.75rem;
            font-weight: 400;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .game-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem 1.75rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: border-color 250ms ease, box-shadow 250ms ease, transform 250ms ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .game-card:focus-visible {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.35);
        }

        .game-card:active {
            transform: scale(0.985);
            transition: transform 80ms ease;
        }

        .game-card-accent {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            margin-bottom: 1.25rem;
        }

        .game-card.geometrydash .game-card-accent {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
        }

        .game-card.webcraft .game-card-accent {
            background: linear-gradient(90deg, var(--accent-purple), #A78BFA);
        }

        .game-icon-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .game-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
        }

        .game-icon svg {
            width: 22px;
            height: 22px;
        }

        .game-card.geometrydash .game-icon svg { color: var(--accent-cyan); }
        .game-card.webcraft .game-icon svg { color: var(--accent-purple); }

        .game-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .game-desc {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.55;
            margin-bottom: 1.25rem;
        }

        .game-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .game-badge {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.3rem 0.65rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }

        .game-arrow {
            margin-top: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 250ms ease, transform 250ms ease;
        }

        .game-card:hover .game-arrow { opacity: 1; transform: translateX(0); }
        .game-card.geometrydash:hover .game-arrow { color: var(--accent-cyan); }
        .game-card.webcraft:hover .game-arrow { color: var(--accent-purple); }

        .game-arrow svg { width: 14px; height: 14px; }

        .footer {
            font-family: var(--font-body);
            font-size: 0.7rem;
            color: rgba(148, 163, 184, 0.25);
            margin-top: 3rem;
            letter-spacing: 0.06em;
        }

        @media (prefers-reduced-motion: reduce) {
            .ambient { display: none; }
            .game-card { transition: none; }
            .game-card:hover { transform: none; }
            .game-arrow { transition: none; }
            .game-card:active { transform: none; }
        }

        @media (max-width: 640px) {
            .container { padding: 1.25rem; }
            .games { grid-template-columns: 1fr; gap: 1rem; }
            .game-card { padding: 1.5rem 1.25rem; border-radius: 16px; }
            .header { margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <div class="ambient" aria-hidden="true">
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
                    <line x1="12" y1="22" x2="12" y2="15.5"/>
                    <polyline points="22 8.5 12 15.5 2 8.5"/>
                </svg>
            </div>
            <h1 class="title">
                <span class="title-accent">Web</span>Games
            </h1>
            <p class="subtitle">选择一个游戏开始</p>
        </header>

        <div class="games">
            <a href="Geometrydash.html"
               class="game-card geometrydash"
               aria-label="开始 Geometry Dash - Neon Edition 节奏平台跳跃游戏">
                <div class="game-card-accent"></div>
                <div class="game-icon-row">
                    <div class="game-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                    </div>
                    <div class="game-title">Geometry Dash</div>
                </div>
                <div class="game-desc">Neon Edition — 节奏平台跳跃，跟随电音律动穿越霓虹障碍</div>
                <div class="game-meta">
                    <span class="game-badge">节奏游戏</span>
                    <span class="game-badge">平台跳跃</span>
                </div>
                <div class="game-arrow">
                    进入游戏
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </a>

            <a href="webmc.html"
               class="game-card webcraft"
               aria-label="开始 Hotsteel's Webcraft - Ultimate 体素沙盒世界">
                <div class="game-card-accent"></div>
                <div class="game-icon-row">
                    <div class="game-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                    </div>
                    <div class="game-title">Webcraft</div>
                </div>
                <div class="game-desc">Ultimate — 体素沙盒世界，自由挖掘与建造</div>
                <div class="game-meta">
                    <span class="game-badge">体素沙盒</span>
                    <span class="game-badge">3D 建造</span>
                </div>
                <div class="game-arrow">
                    进入游戏
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
            </a>
        </div>

        <footer class="footer">HOTSTEEL PRESENTS</footer>
    </main>

    <script>
        (function() {
            var audioCtx = null;

            function getCtx() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            }

            function playHover() {
                var ctx = getCtx();
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.025, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.06);
            }

            function playClick(cardEl) {
                var ctx = getCtx();
                var now = ctx.currentTime;

                var osc1 = ctx.createOscillator();
                var osc2 = ctx.createOscillator();
                var gain1 = ctx.createGain();
                var gain2 = ctx.createGain();

                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);

                var isGD = cardEl.classList.contains('geometrydash');
                var freq1 = isGD ? 800 : 600;
                var freq2 = isGD ? 1400 : 1100;

                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(freq1, now);
                osc1.frequency.exponentialRampToValueAtTime(freq1 * 1.4, now + 0.15);

                gain1.gain.setValueAtTime(0.05, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(freq2, now + 0.04);
                osc2.frequency.exponentialRampToValueAtTime(freq2 * 0.6, now + 0.15);

                gain2.gain.setValueAtTime(0.035, now + 0.04);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

                osc1.start(now);
                osc1.stop(now + 0.2);
                osc2.start(now + 0.04);
                osc2.stop(now + 0.15);
            }

            var cards = document.querySelectorAll('.game-card');

            for (var i = 0; i < cards.length; i++) {
                (function(card) {
                    card.addEventListener('mouseenter', function() { playHover(); });
                    card.addEventListener('focus', function() { playHover(); });
                    card.addEventListener('click', function(e) { playClick(card); });
                })(cards[i]);
            }
        })();
    </script>
</body>
</html>
