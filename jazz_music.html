<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0A07">
<title>Jazz Lounge · 5 Original Jazz Pieces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#0D0A07; --panel:rgba(255,240,214,0.035); --line:rgba(255,235,200,0.1);
  --text:#F4ECDD; --muted:#9C8F78;
  --font-d:'Playfair Display',Georgia,serif; --font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{
  min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);
  font-family:var(--font-m);display:flex;justify-content:center;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 520px at 12% -8%, rgba(233,180,76,0.10), transparent 60%),
    radial-gradient(880px 520px at 88% 108%, rgba(140,60,40,0.12), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,235,200,0.016) 0 1px, transparent 1px 44px);
}
.wrap{width:100%;max-width:900px;padding:28px 20px 130px;position:relative;z-index:1}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.h-title{
  font-family:var(--font-d);font-size:clamp(28px,6vw,42px);font-weight:900;letter-spacing:3px;
  background:linear-gradient(100deg,#E9B44C,#F4ECDD,#C97B4A);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.h-sub{color:var(--muted);font-size:12px;letter-spacing:2px;margin-top:6px}
.back{color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--line);
  padding:8px 14px;border-radius:999px;transition:color .2s,border-color .2s}
.back:hover{color:#E9B44C;border-color:rgba(233,180,76,.45)}
.deck{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.viz-box{position:relative;height:150px;background:rgba(0,0,0,.28);border-bottom:1px solid var(--line)}
canvas#viz{position:absolute;inset:0;width:100%;height:100%;display:block}
.now{
  position:absolute;left:14px;top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  font-size:11px;letter-spacing:1px;color:var(--muted);pointer-events:none
}
.chip{border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:rgba(13,10,7,.6)}
.chip.sec{color:#0D0A07;font-weight:700;border:none;background:var(--acc,#E9B44C)}
.chip.name{color:var(--text)}
.list{list-style:none}
.trk{
  display:grid;grid-template-columns:44px 1fr auto;gap:14px;align-items:center;
  padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;
  transition:background .15s;position:relative
}
.trk:last-child{border-bottom:none}
.trk:hover{background:rgba(255,240,214,.03)}
.trk:focus-visible{outline:2px solid #E9B44C;outline-offset:-2px}
.trk .no{
  font-family:var(--font-d);font-weight:700;font-size:16px;color:var(--muted);
  width:44px;height:44px;border:1px solid var(--line);border-radius:50%;
  display:flex;align-items:center;justify-content:center
}
.trk.on .no{color:#0D0A07;background:var(--acc);border-color:var(--acc);box-shadow:0 0 18px var(--glow)}
.trk .t-name{font-family:var(--font-d);font-size:16px;font-weight:700;letter-spacing:1px;color:var(--text)}
.trk.on .t-name{color:var(--acc)}
.trk .t-info{margin-top:5px;font-size:11px;color:var(--muted);letter-spacing:.5px;line-height:1.6}
.trk .t-info b{color:var(--acc);font-weight:500}
.trk .t-dur{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px}
.eq{display:none;align-items:flex-end;gap:2px;height:16px}
.trk.on.playing .eq{display:flex}
.eq i{width:3px;background:var(--acc);border-radius:2px;animation:eq 1.1s ease-in-out infinite}
.eq i:nth-child(2){animation-delay:.3s}.eq i:nth-child(3){animation-delay:.6s}
@keyframes eq{0%,100%{height:4px}50%{height:16px}}
.bar{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  width:100%;max-width:900px;z-index:5;padding:0 20px 16px
}
.bar-in{
  background:rgba(20,15,10,.9);backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:16px;padding:12px 16px;
  display:flex;flex-direction:column;gap:9px
}
.seek{position:relative;height:16px;cursor:pointer;display:flex;align-items:center}
.seek .rail{width:100%;height:4px;border-radius:2px;background:rgba(255,240,214,.1);overflow:hidden}
.seek .fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--acc,#E9B44C),#C97B4A)}
.seek .dot{position:absolute;top:50%;left:0%;width:12px;height:12px;border-radius:50%;
  background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--acc,#E9B44C);opacity:0;transition:opacity .15s}
.seek:hover .dot{opacity:1}
.row{display:flex;align-items:center;gap:14px}
.btn{
  background:none;border:1px solid var(--line);color:var(--text);border-radius:50%;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .1s;touch-action:manipulation;flex:none
}
.btn:hover{border-color:var(--acc,#E9B44C);box-shadow:0 0 14px var(--glow,rgba(233,180,76,.25))}
.btn:active{transform:scale(.93)}
.btn:focus-visible{outline:2px solid #E9B44C;outline-offset:3px}
.btn svg{width:16px;height:16px;fill:var(--text)}
.btn.main{width:52px;height:52px;border-width:2px;border-color:var(--acc,#E9B44C)}
.btn.main svg{width:20px;height:20px;fill:var(--acc,#E9B44C)}
.meta{flex:1;min-width:0}
.meta .m-name{font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:1px;color:var(--acc,#E9B44C);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .m-time{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.vol{display:flex;align-items:center;gap:8px;color:var(--muted)}
.vol svg{width:15px;height:15px;fill:var(--muted);flex:none}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:86px;height:4px;border-radius:2px;
  background:rgba(255,240,214,.14);outline:none;cursor:pointer
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--acc,#E9B44C);box-shadow:0 0 8px var(--glow,rgba(233,180,76,.4))
}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;background:var(--acc,#E9B44C)}
.tip{color:var(--muted);font-size:11px;letter-spacing:1px;text-align:center;margin-top:14px}
@media (max-width:560px){
  .vol input{width:56px}
  .trk{grid-template-columns:36px 1fr auto;padding:14px 12px;gap:10px}
  .trk .no{width:36px;height:36px;font-size:14px}
}
@media (prefers-reduced-motion:reduce){ .eq i{animation:none;height:10px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="h-title">JAZZ LOUNGE</div>
      <div class="h-sub">5 ORIGINAL JAZZ PIECES · CHART-DRIVEN VIRTUAL QUINTET</div>
    </div>
    <a class="back" href="index.html">&larr; 返回大厅</a>
  </div>
  <div class="deck">
    <div class="viz-box">
      <canvas id="viz"></canvas>
      <div class="now">
        <span class="chip sec" id="chipSec" style="display:none"></span>
        <span class="chip name" id="chipNow">待机 · 点击下方曲目开演</span>
        <span class="chip" id="chipBpm" style="display:none"></span>
      </div>
    </div>
    <ul class="list" id="list"></ul>
  </div>
  <div class="tip">SPACE 播放/暂停 · &larr;/&rarr; 切曲 · 点击进度条跳转 · 每次演奏由和弦谱即时生成</div>
</div>
<div class="bar">
  <div class="bar-in">
    <div class="seek" id="seek" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="rail"><div class="fill" id="fill"></div></div>
      <div class="dot" id="dot"></div>
    </div>
    <div class="row">
      <button class="btn" id="bPrev" aria-label="上一首"><svg viewBox="0 0 24 24"><path d="M6 5h2v14H6zM20 5v14L9.5 12z"/></svg></button>
      <button class="btn main" id="bPlay" aria-label="播放">
        <svg id="iPlay" viewBox="0 0 24 24"><polygon points="7,4 21,12 7,20"/></svg>
        <svg id="iPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="5" height="16"/><rect x="14" y="4" width="5" height="16"/></svg>
      </button>
      <button class="btn" id="bNext" aria-label="下一首"><svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2zM4 5v14l10.5-7z"/></svg></button>
      <div class="meta">
        <div class="m-name" id="mName">JAZZ LOUNGE</div>
        <div class="m-time" id="mTime">--:-- / --:--</div>
      </div>
      <div class="vol">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1a9 9 0 0 0 0-17.6z"/></svg>
        <input type="range" id="vol" min="0" max="100" value="80" aria-label="音量">
      </div>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';
/*ENGINE-START*/
/* ================================================================
   爵士引擎：和弦谱(Chart) -> 事件谱(Score)编译 -> 前瞻调度
   走位贝斯 / 语音连接无根音和声 / 摇摆量化 / 分风格鼓手
   与电音页的 16 步循环回调是完全不同的体系。
================================================================ */
var ctx=null, master=null, analyser=null, comp=null, convolver=null, noiseBuf=null;
var B=null, P=null;
var hz=function(m){ return 440*Math.pow(2,(m-69)/12); };
var clamp=function(v,a,b){ return v<a?a:v>b?b:v; };
function rnd(i,salt){ var x=Math.sin(i*127.1+salt*311.7)*43758.5453; return x-Math.floor(x); }

function initAudio(){
  if(ctx){ if(ctx.state==='suspended') ctx.resume(); return; }
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  master=ctx.createGain(); master.gain.value=0.85;
  analyser=ctx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.85;
  comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-11; comp.knee.value=22; comp.ratio.value=2.8;
  comp.attack.value=0.006; comp.release.value=0.3;
  var eqLo=ctx.createBiquadFilter(); eqLo.type='lowshelf';
  eqLo.frequency.value=95; eqLo.gain.value=-3.5;
  var eqHi=ctx.createBiquadFilter(); eqHi.type='highshelf';
  eqHi.frequency.value=7200; eqHi.gain.value=1.5;
  master.connect(eqLo); eqLo.connect(eqHi); eqHi.connect(analyser);
  analyser.connect(comp); comp.connect(ctx.destination);
  noiseBuf=ctx.createBuffer(1, ctx.sampleRate*1.2, ctx.sampleRate);
  var d=noiseBuf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  convolver=ctx.createConvolver();
  var len=Math.floor(ctx.sampleRate*1.9), ir=ctx.createBuffer(2,len,ctx.sampleRate);
  for(var c=0;c<2;c++){
    var ch=ir.getChannelData(c), y=0;
    for(var j=0;j<len;j++){
      var x=(Math.random()*2-1)*Math.pow(1-j/len,2.1);
      y+=(x-y)*0.22; ch[j]=y*2.2;
    }
  }
  convolver.buffer=ir;
  var vOut=ctx.createGain(); vOut.gain.value=0.85;
  convolver.connect(vOut); vOut.connect(master);
  setInterval(schedule,25);
}
function makeBuses(){
  var out=ctx.createGain(); out.connect(master);
  var vb=ctx.createGain(); vb.connect(convolver);
  return {out:out,vb:vb};
}
function send(node,bus,amt){ var g=ctx.createGain(); g.gain.value=amt; node.connect(g); g.connect(bus); }
function toOut(g,p,vb){
  var n=g;
  if(p&&ctx.createStereoPanner){ var s=ctx.createStereoPanner(); s.pan.value=p; g.connect(s); n=s; }
  n.connect(B.out);
  if(vb) send(g,B.vb,vb);
}

/* ---------------- 乐器 ---------------- */
function piano(t,n,v,d){
  if(!v||v<=0.0008) return;
  var f=hz(n); d=Math.max(d||0.3,0.12);
  var sc=v*Math.pow(261/f,0.28);
  var g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(sc,t+0.004);
  g.gain.exponentialRampToValueAtTime(Math.max(sc*0.22,0.0002),t+0.32);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d+0.6);
  var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=0.4;
  lp.frequency.setValueAtTime(Math.min(9000,f*7),t);
  lp.frequency.exponentialRampToValueAtTime(Math.max(900,f*2.4),t+0.9);
  var o1=ctx.createOscillator(); o1.type='triangle'; o1.frequency.value=f;
  var o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=f*2;
  var g2=ctx.createGain(); g2.gain.setValueAtTime(0.35,t);
  g2.gain.exponentialRampToValueAtTime(0.02,t+0.5);
  var o3=ctx.createOscillator(); o3.type='triangle'; o3.frequency.value=f; o3.detune.value=3.5;
  o1.connect(lp); o3.connect(lp); o2.connect(g2); g2.connect(lp);
  lp.connect(g); toOut(g,-0.12,0.15);
  var hm=ctx.createBufferSource(); hm.buffer=noiseBuf;
  var hf=ctx.createBiquadFilter(); hf.type='bandpass'; hf.frequency.value=3200; hf.Q.value=0.8;
  var hg=ctx.createGain(); hg.gain.setValueAtTime(sc*0.45,t);
  hg.gain.exponentialRampToValueAtTime(0.0001,t+0.014);
  hm.connect(hf); hf.connect(hg); hg.connect(B.out);
  o1.start(t); o2.start(t); o3.start(t); hm.start(t);
  var te=t+d+0.7; o1.stop(te); o2.stop(te); o3.stop(te); hm.stop(t+0.02);
}
function pianoRoll(t,ns,v,d,ms){
  for(var i=0;i<ns.length;i++) piano(t+i*(ms||0.012),ns[i],v*(1-i*0.05),d);
}
function bassN(t,n,v,d,bright){
  if(!v||v<=0.0008) return;
  var f=hz(n); d=Math.max(d||0.3,0.1);
  var g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v,t+0.008);
  g.gain.setValueAtTime(v,t+d*0.55);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=1.1;
  lp.frequency.setValueAtTime(bright||620,t);
  lp.frequency.exponentialRampToValueAtTime(Math.max(180,(bright||620)*0.4),t+Math.min(0.25,d));
  var o1=ctx.createOscillator(); o1.type='sine';
  o1.frequency.setValueAtTime(f*1.02,t);
  o1.frequency.exponentialRampToValueAtTime(f,t+0.05);
  var o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=f;
  var g2=ctx.createGain(); g2.gain.value=0.55;
  var eq=ctx.createBiquadFilter(); eq.type='peaking';
  eq.frequency.value=250; eq.Q.value=0.9; eq.gain.value=-4.5;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=34;
  o1.connect(lp); o2.connect(g2); g2.connect(lp);
  lp.connect(eq); eq.connect(hp); hp.connect(g);
  toOut(g,0,0.05);
  var th=ctx.createBufferSource(); th.buffer=noiseBuf;
  var tf=ctx.createBiquadFilter(); tf.type='lowpass'; tf.frequency.value=420;
  var tg=ctx.createGain(); tg.gain.setValueAtTime(v*0.45,t);
  tg.gain.exponentialRampToValueAtTime(0.0001,t+0.02);
  th.connect(tf); tf.connect(tg); tg.connect(B.out);
  o1.start(t); o2.start(t); th.start(t);
  o1.stop(t+d+0.05); o2.stop(t+d+0.05); th.stop(t+0.03);
}
function ride(t,v,open){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true; s.playbackRate.value=1.2;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6800;
  var g=ctx.createGain(); var d=open?1.1:0.42;
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  s.connect(hp); hp.connect(g); toOut(g,0.22,0.08);
  var o=ctx.createOscillator(); o.type='square'; o.frequency.value=4180;
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=5200; bp.Q.value=2.2;
  var g2=ctx.createGain(); g2.gain.setValueAtTime(v*0.7,t);
  g2.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
  o.connect(bp); bp.connect(g2); g2.connect(B.out);
  s.start(t); s.stop(t+d+0.03); o.start(t); o.stop(t+0.1);
}
function hatF(t,v){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true; s.playbackRate.value=1.3;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8600;
  var g=ctx.createGain();
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
  s.connect(hp); hp.connect(g); toOut(g,0.18,0);
  s.start(t); s.stop(t+0.07);
}
function kickJ(t,v){
  if(!v||v<=0.0008) return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(110,t);
  o.frequency.exponentialRampToValueAtTime(48,t+0.07);
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g); g.connect(B.out); o.start(t); o.stop(t+0.18);
}
function snareJ(t,v){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1900; bp.Q.value=0.7;
  var g=ctx.createGain(); g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
  s.connect(bp); bp.connect(g); toOut(g,-0.06,0.12);
  var o=ctx.createOscillator(),og=ctx.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(205,t);
  o.frequency.exponentialRampToValueAtTime(160,t+0.06);
  og.gain.setValueAtTime(v*0.6,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
  o.connect(og); og.connect(B.out);
  s.start(t); s.stop(t+0.16); o.start(t); o.stop(t+0.09);
}
function stickX(t,v){
  if(!v||v<=0.0008) return;
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='square'; o.frequency.value=1720;
  g.gain.setValueAtTime(v*0.5,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.028);
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2400; bp.Q.value=2;
  o.connect(bp); bp.connect(g); toOut(g,0.1,0.1);
  o.start(t); o.stop(t+0.04);
}
function brushS(t,dur,v,up){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=0.6;
  bp.frequency.setValueAtTime(up?900:2400,t);
  bp.frequency.linearRampToValueAtTime(up?2600:1000,t+dur);
  var g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v,t+dur*0.55);
  g.gain.linearRampToValueAtTime(0.0001,t+dur+0.05);
  s.connect(bp); bp.connect(g); toOut(g,-0.08,0.12);
  s.start(t); s.stop(t+dur+0.1);
}
function shakerJ(t,v){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;

/* ---------------- 和声系统 ---------------- */
var PCS={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
var QUAL={
  'maj7':[0,4,7,11],'maj9':[0,4,7,11,14],'6':[0,4,7,9],'69':[0,4,7,9,14],
  'm7':[0,3,7,10],'m9':[0,3,7,10,14],'m6':[0,3,7,9],'m69':[0,3,7,9,14],
  'm7b5':[0,3,6,10],'dim7':[0,3,6,9],
  '7':[0,4,7,10],'9':[0,4,7,10,14],'13':[0,4,7,10,14,21],
  '7b9':[0,4,7,10,13],'7#9':[0,4,7,10,15],'7#5':[0,4,8,10],'7sus':[0,5,7,10]
};
var CHMEMO={};
function chord(sym){
  if(CHMEMO[sym]) return CHMEMO[sym];
  var m=sym.match(/^([A-G])([b#]?)(.*)$/);
  var r=PCS[m[1]]+(m[2]==='b'?-1:(m[2]==='#'?1:0));
  r=((r%12)+12)%12;
  var q=m[3]||'maj7';
  var ints=QUAL[q]||QUAL['7'];
  var has=function(x){ return ints.indexOf(x)>=0; };
  var c={sym:sym,r:r,q:q,i:ints,
    dom:has(4)&&has(10),
    min:has(3),
    maj:has(4)&&(has(11)||q==='6'||q==='69')};
  CHMEMO[sym]=c;
  return c;
}
function below(n,c){
  for(var k=n-1;k>n-13;k--){
    var pc=((k%12)+12)%12;
    for(var i=0;i<c.i.length;i++)
      if(((c.r+c.i[i])%12)===pc) return k;
  }
  return n-12;
}
function harmBelow(n,c){
  for(var k=n-3;k>n-15;k--){
    var pc=((k%12)+12)%12;
    for(var i=0;i<c.i.length;i++)
      if(((c.r+c.i[i])%12)===pc) return k;
  }
  return n-12;
}
function tone(c,deg,near){
  var n=c.r+deg;
  while(n<near-6) n+=12;
  while(n>near+6) n-=12;
  return n;
}
function voice(c,st,lo,hi){
  var has=function(x){ return c.i.indexOf(x)>=0; };
  var third=has(4)?4:(has(3)?3:(has(5)?5:4));
  var sev=has(10)?10:(has(11)?11:9);
  var col=14;
  for(var i=0;i<c.i.length;i++) if(c.i[i]>=13) col=c.i[i];
  if(c.q==='m7b5'||c.q==='dim7') col=12;
  if(c.q==='7#5') col=20;
  var shapes=[[third,sev,col],[sev,third+12,col]];
  var ref=st.top||((lo+hi)>>1);
  var best=null;
  for(var s=0;s<shapes.length;s++){
    var rel=[],last=-99;
    for(var j=0;j<shapes[s].length;j++){
      var y=shapes[s][j];
      while(y<=last) y+=12;
      rel.push(y); last=y;
    }
    if(rel[rel.length-1]-rel[0]>15){
      rel[rel.length-1]-=12;
      rel.sort(function(a,b){return a-b;});
    }
    var bottom0=48+c.r+rel[0];
    var k0=Math.round((lo+3-bottom0)/12);
    for(var dk=-1;dk<=1;dk++){
      var off=(k0+dk)*12;
      var notes=[],ok=true;
      for(var j2=0;j2<rel.length;j2++) notes.push(48+c.r+rel[j2]+off);
      var top=notes[notes.length-1];
      var pen=0;
      if(notes[0]<lo) pen+=(lo-notes[0])*2;
      if(top>hi) pen+=(top-hi)*2;
      var scr=Math.abs(top-ref)+pen;
      if(!best||scr<best.scr) best={notes:notes,top:top,scr:scr};
    }
  }
  st.top=best.top;
  return best.notes;
}
function bnote(pc,prev){
  var n=36+pc;
  var p=prev||40;
  while(n>p+6) n-=12;
  while(n<p-6) n+=12;
  return clamp(n,28,50);
}
function parseBarEntry(x,tsig){
  var arr=(typeof x==='string')?[x]:x;
  var k=arr.length, base=Math.floor(tsig/k), rem=tsig-base*k, out=[], beat=0;
  for(var i=0;i<k;i++){
    var bt=base+(i<rem?1:0);
    out.push({c:chord(arr[i]),beat:beat,beats:bt});
    beat+=bt;
  }
  return out;
}
function chAt(chords,beat){
  for(var i=chords.length-1;i>=0;i--)
    if(beat>=chords[i].beat) return chords[i].c;
  return chords[0].c;

function swQ(T,tick){
  var m=((tick%12)+12)%12;

/* ================================================================
   编曲编译器 + 播放调度
================================================================ */
var DR={swing:drumSwing,bossa:drumBossa,brush:drumBrush,waltz:drumWaltz,shuffle:drumShuffle};
var BS={
  walk:function(bc,o){ walkBass(bc,o,4); },
  two:function(bc,o){ walkBass(bc,o,2); },
  bossa:bossaBass, ballad:balladBass, waltz:waltzBass, riff:riffBass
};
var CP={piano:compSwing,gtr:compBossa,ballad:compBallad,waltz:compWaltz,organ:compOrgan};

function buildScore(T){
  EVQ=[];
  var spb=60/T.bpm, tsig=T.tsig||4;
  var st={};
  var t=0, gi=0, secsMeta=[];
  var allBars=T.sections.map(function(S2){
    var ch2=S2.chart;
    if(S2.reps){
      var cc2=[];
      for(var r2=0;r2<S2.reps;r2++) cc2=cc2.concat(ch2);
      ch2=cc2;
    }
    var out2=[];
    for(var b3=0;b3<ch2.length;b3++) out2.push(parseBarEntry(ch2[b3],tsig));
    return out2;
  });
  for(var si=0;si<T.sections.length;si++){
    var S=T.sections[si];
    var bars=allBars[si];
    var n=bars.length, times=[], tks=[];
    for(var b=0;b<n;b++){
      var f=S.stretch?(S.stretch(b,n)||1):1;
      times.push(t);
      var bd=spb*tsig*f;
      tks.push(bd/(tsig*12));
      t+=bd;
    }
    var meta={times:times,tks:tks,bars:bars,n:n,T:T,sec:S};
    var A=S.arr||{};
    for(var b2=0;b2<n;b2++){
      var nextC=(b2+1<n)?bars[b2+1][0].c:
        ((si+1<T.sections.length)?allBars[si+1][0][0].c:bars[b2][0].c);
      var bc=(function(bi,nx){
        var t0b=times[bi], tkb=tks[bi];
        return {
          t:t0b, tk:tkb, bd:tsig*12*tkb, bi:bi, n:n, gi:gi+bi, T:T, st:st,
          chords:bars[bi],
          next:nx,
          at:function(tick){ return t0b+swQ(T,tick)*tkb; }
        };
      })(b2,nextC);
      var dyn=A.dyn||0.7;
      if(A.dr&&DR[A.dr]) DR[A.dr](bc,{
        dyn:dyn, light:A.light, ride:A.ride,
        fill:(b2===n-1)&&S.fill!==false,
        crash:(b2===0)&&!!S.crash,
        stop:A.stopBars?(b2<A.stopBars):false
      });
      if(A.bass&&BS[A.bass]) BS[A.bass](bc,{dyn:dyn,vol:A.bassVol});
      if(A.comp&&CP[A.comp]) CP[A.comp](bc,{
        dyn:dyn, sparse:A.sparse,
        pad:(A.padFrom!=null)&&(b2>=A.padFrom),
        stop:A.stopBars?(b2<A.stopBars):false
      });
      if(S.extra) S.extra(bc,meta);
    }
    if(S.mel) melPlay(S.mel.data,meta,S.mel);
    if(S.solo){
      if(S.solo.gen==='vibes') vibeSoloGen(meta,S.solo);
      else lickSolo(meta,S.solo);
    }
    secsMeta.push({name:S.name,t0:times[0],t1:t});
    gi+=n;
  }
  EVQ.sort(function(a,b){ return a.t-b.t; });
  var out={ev:EVQ,dur:t+2.5,secs:secsMeta,bars:gi};
  EVQ=null;
  return out;
}

var SCORES=[];
function scoreOf(i){
  if(!SCORES[i]) SCORES[i]=buildScore(TRACKS[i]);
  return SCORES[i];
}

var cur=-1, playing=false, pausedAt=0;
function schedule(){
  if(!P||!ctx) return;
  var ahead=ctx.currentTime+0.3;
  var sc=P.sc, k=0;
  while(P.idx<sc.ev.length&&P.t0+sc.ev[P.idx].t<ahead&&k<500){
    var x=sc.ev[P.idx];
    var at=P.t0+x.t;
    if(at>=ctx.currentTime-0.03){
      try{ x.fn.apply(null,[at].concat(x.a)); }catch(err){}
    }
    P.idx++; k++;
  }
  if(P.idx>=sc.ev.length) P.done=true;
}
function stopPlay(){
  if(!P) return;
  var old=P; P=null;
  var tt=ctx.currentTime;
  [old.bus.out,old.bus.vb].forEach(function(g){
    try{
      g.gain.cancelScheduledValues(tt);
      g.gain.setValueAtTime(g.gain.value,tt);
      g.gain.linearRampToValueAtTime(0.0001,tt+0.15);
    }catch(err){}
  });
  setTimeout(function(){
    try{ old.bus.out.disconnect(); old.bus.vb.disconnect(); }catch(err){}
  },500);
}
function playTrack(i,off){
  initAudio();
  stopPlay();
  cur=i;
  B=makeBuses();
  var sc=scoreOf(i);
  off=Math.max(0,Math.min(off||0,sc.dur-0.5));
  P={sc:sc,bus:B,idx:0,t0:ctx.currentTime+0.15-off,done:false};
  while(P.idx<sc.ev.length&&sc.ev[P.idx].t<off) P.idx++;
  playing=true;
  updateUI();
  schedule();
}
function togglePlay(){
  if(!ctx||cur<0){ playTrack(0,0); return; }
  if(playing&&P){
    pausedAt=ctx.currentTime-P.t0;
    stopPlay(); playing=false;
  } else {
    playTrack(cur,Math.max(0,Math.min(pausedAt,scoreOf(cur).dur-1)));
  }
  updateUI();
}
function nextTrack(d){
  var i=cur<0?0:(cur+d+TRACKS.length)%TRACKS.length;
  pausedAt=0;
  playTrack(i,0);
}

/* ---------------- UI ---------------- */
var listEl=document.getElementById('list');
var chipNow=document.getElementById('chipNow');
var chipSec=document.getElementById('chipSec');
var chipBpm=document.getElementById('chipBpm');
var mName=document.getElementById('mName');
var mTime=document.getElementById('mTime');
var fillEl=document.getElementById('fill');
var dotEl=document.getElementById('dot');
var seekEl=document.getElementById('seek');
var bPlay=document.getElementById('bPlay');
var iPlay=document.getElementById('iPlay');
var iPause=document.getElementById('iPause');

function fmt(s){
  s=Math.max(0,Math.floor(s));
  return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2);
}
TRACKS.forEach(function(T,i){
  var sc=scoreOf(i);
  var li=document.createElement('li');
  li.className='trk'; li.tabIndex=0;
  li.setAttribute('role','button');
  li.setAttribute('aria-label','演奏 '+T.name);
  li.style.setProperty('--acc',T.color);
  li.style.setProperty('--glow',T.glow);
  li.innerHTML=
    '<div class="no">'+(i+1)+'</div>'+
    '<div><div class="t-name">'+T.name+'</div>'+
    '<div class="t-info"><b>'+T.genre+'</b> · '+T.bpm+' BPM · '+T.key+' · '+
    (T.tsig||4)+'/4 · '+T.sections.length+' 段 · '+sc.bars+' 小节</div></div>'+
    '<div class="t-dur"><span class="eq"><i></i><i></i><i></i></span><span>'+fmt(sc.dur)+'</span></div>';
  li.addEventListener('click',function(){ pausedAt=0; playTrack(i,0); });
  li.addEventListener('keydown',function(ev){
    if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); pausedAt=0; playTrack(i,0); }
  });
  listEl.appendChild(li);
});
var rows=listEl.querySelectorAll('.trk');

function updateUI(){
  rows.forEach(function(r,i){
    r.classList.toggle('on',i===cur);
    r.classList.toggle('playing',i===cur&&playing);
  });
  if(cur>=0){
    var T=TRACKS[cur];
    var barIn=document.querySelector('.bar-in');
    barIn.style.setProperty('--acc',T.color);
    barIn.style.setProperty('--glow',T.glow);
    chipNow.textContent=T.name;
    chipBpm.textContent=T.bpm+' BPM · '+T.key+' · '+(T.tsig||4)+'/4';
    chipBpm.style.display='';
    chipSec.style.background=T.color;
    mName.textContent=T.name;
    mName.style.color=T.color;
  }
  iPlay.style.display=playing?'none':'block';
  iPause.style.display=playing?'block':'none';
  bPlay.setAttribute('aria-label',playing?'暂停':'播放');
}
bPlay.addEventListener('click',togglePlay);
document.getElementById('bPrev').addEventListener('click',function(){ nextTrack(-1); });
document.getElementById('bNext').addEventListener('click',function(){ nextTrack(1); });
document.getElementById('vol').addEventListener('input',function(){
  if(master) master.gain.value=this.value/100;
});
seekEl.addEventListener('pointerdown',function(ev){
  if(cur<0) return;
  var r=seekEl.getBoundingClientRect();
  var frac=clamp((ev.clientX-r.left)/r.width,0,1);
  pausedAt=frac*scoreOf(cur).dur;
  if(playing||!ctx) playTrack(cur,pausedAt);
  else updateUI();
});
document.addEventListener('keydown',function(ev){
  if(ev.repeat) return;
  if(ev.code==='Space'){ ev.preventDefault(); togglePlay(); }
  else if(ev.code==='ArrowRight') nextTrack(1);
  else if(ev.code==='ArrowLeft') nextTrack(-1);
});

/* ---------------- 可视化 ---------------- */
var cv=document.getElementById('viz'), cc=cv.getContext('2d');
var freqData=null, waveData=null;
function resizeViz(){
  var r=cv.parentElement.getBoundingClientRect();
  cv.width=Math.floor(r.width*(window.devicePixelRatio||1));
  cv.height=Math.floor(r.height*(window.devicePixelRatio||1));
}
window.addEventListener('resize',resizeViz);
resizeViz();
function hexA(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function sectionAt(sc,el){
  for(var i=sc.secs.length-1;i>=0;i--)
    if(el>=sc.secs[i].t0) return sc.secs[i];
  return sc.secs[0];
}
function draw(){
  requestAnimationFrame(draw);
  var w=cv.width,h=cv.height;
  cc.clearRect(0,0,w,h);
  var color=cur>=0?TRACKS[cur].color:'#5A4A33';
  if(analyser){
    if(!freqData) freqData=new Uint8Array(analyser.frequencyBinCount);
    if(!waveData) waveData=new Uint8Array(analyser.fftSize);
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(waveData);
    var N=56, gap=Math.max(1,Math.floor(w*0.004));
    var bw=(w-gap*(N-1))/N;
    for(var i=0;i<N;i++){
      var idx=Math.floor(Math.pow(i/N,1.6)*freqData.length*0.6);
      var v=freqData[idx]/255;
      var bh=Math.max(h*0.02,v*v*h*0.75);
      cc.fillStyle=hexA(color,0.28);
      cc.globalAlpha=playing?0.75:0.2;
      cc.fillRect(i*(bw+gap),h-bh,bw,bh);
    }
    cc.globalAlpha=playing?0.95:0.3;
    cc.strokeStyle=hexA(color,0.9);
    cc.lineWidth=Math.max(1.5,h*0.012);
    cc.beginPath();
    var step=Math.max(1,Math.floor(waveData.length/w));
    for(var x=0;x<w;x++){
      var s=waveData[Math.min(waveData.length-1,x*step)]/128-1;
      var y=h*0.5+s*h*0.36;
      if(x===0) cc.moveTo(x,y); else cc.lineTo(x,y);
    }
    cc.stroke();
    cc.globalAlpha=1;
  }
  if(P&&ctx&&cur>=0){
    var sc=scoreOf(cur);
    var el=clamp(ctx.currentTime-P.t0,0,sc.dur);
    var frac=el/sc.dur;
    fillEl.style.width=(frac*100)+'%';
    dotEl.style.left=(frac*100)+'%';
    mTime.textContent=fmt(el)+' / '+fmt(sc.dur);
    seekEl.setAttribute('aria-valuenow',Math.round(frac*100));
    var x=sectionAt(sc,el);
    chipSec.textContent=x.name;
    chipSec.style.display='';
    if(P.done&&ctx.currentTime>P.t0+sc.dur+0.8) nextTrack(1);
  } else if(cur>=0){
    mTime.textContent=fmt(pausedAt)+' / '+fmt(scoreOf(cur).dur);
  }
}
draw();
['pointerdown','touchstart','keydown'].forEach(function(evName){
  document.addEventListener(evName,function(){ if(ctx&&ctx.state==='suspended') ctx.resume(); },{passive:true});
});
