<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b1c33">
<title>地铁跑酷 · 网页版</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b1c33;
    font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0}
  .hud{position:fixed;z-index:10;pointer-events:none}
  #hudTop{top:calc(6px + env(safe-area-inset-top,0px));left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:6px 12px;gap:8px}
  .pill{background:rgba(8,22,45,.55);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:7px 15px;color:#fff;
    font-weight:800;font-size:17px;letter-spacing:.5px;text-shadow:0 2px 3px rgba(0,0,0,.5);backdrop-filter:blur(4px);white-space:nowrap}
  .icoBtn{pointer-events:auto;width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
    background:rgba(8,22,45,.6);color:#fff;font-size:20px;line-height:1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .icoBtn:active{transform:scale(.92)}
  #x2badge{display:none;margin-left:8px;color:#ffd23f}
  #powerbars{left:12px;bottom:calc(16px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:6px}
  .pbar{width:150px;height:22px;background:rgba(8,22,45,.55);border:1px solid rgba(255,255,255,.18);border-radius:12px;overflow:hidden;position:relative;display:none}
  .pbar .fill{position:absolute;inset:0;border-radius:12px;transform-origin:left;transition:transform .1s linear}
  .pbar .lab{position:absolute;inset:0;display:flex;align-items:center;padding-left:8px;font-size:13px;font-weight:800;color:#fff;text-shadow:0 1px 2px #000}
  #btnBoard{position:fixed;z-index:10;right:16px;bottom:calc(22px + env(safe-area-inset-bottom,0px));width:76px;height:76px;border-radius:50%;
    border:3px solid rgba(255,255,255,.35);background:radial-gradient(circle at 30% 30%, #2fd8e8, #0e6fa8 70%);
    color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.45);cursor:pointer}
  #btnBoard:active{transform:scale(.93)}
  #btnBoard .cd{position:absolute;inset:0;border-radius:50%;background:rgba(3,12,25,.72);display:none;align-items:center;justify-content:center;font-size:26px;font-weight:900}
  #hint{left:0;right:0;bottom:calc(112px + env(safe-area-inset-bottom,0px));text-align:center;color:#fff;font-weight:700;font-size:15px;
    text-shadow:0 2px 4px #000;opacity:0;transition:opacity .6s}
  #toast{left:0;right:0;top:22%;text-align:center;color:#ffd23f;font-size:22px;font-weight:900;text-shadow:0 3px 6px rgba(0,0,0,.6);opacity:0;transition:opacity .25s}
  #flash{position:fixed;inset:0;z-index:15;pointer-events:none;background:radial-gradient(circle,transparent 40%,rgba(200,20,20,.55));opacity:0;transition:opacity .15s}
  .ov{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:linear-gradient(180deg,rgba(10,32,66,.82),rgba(5,15,32,.94))}
  .panel{display:flex;flex-direction:column;align-items:center;gap:14px;padding:26px 34px;max-width:92vw;
    background:rgba(10,28,58,.72);border:1px solid rgba(120,190,255,.25);border-radius:26px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
  .title{font-size:min(14vw,68px);font-weight:900;line-height:1.05;
    background:linear-gradient(180deg,#ffe259,#ff9a3d 60%,#ff7b2e);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 0 rgba(122,62,0,.9)) drop-shadow(0 8px 16px rgba(0,0,0,.45))}
  .sub{color:#9fd4ff;font-size:14px;font-weight:600;margin-top:-6px}
  .stats{color:#fff;font-size:18px;font-weight:800;line-height:1.7}
  .stats b{color:#ffd23f}
  .btn{pointer-events:auto;min-width:220px;padding:15px 30px;border:none;border-radius:999px;font-size:21px;font-weight:900;color:#5a2d00;cursor:pointer;
    background:linear-gradient(180deg,#ffe259,#ffa751);box-shadow:0 5px 0 #c96f12,0 12px 24px rgba(0,0,0,.4);letter-spacing:2px}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c96f12}
  .btn.sec{background:linear-gradient(180deg,#7cc4ff,#3a7bd5);color:#06254d;box-shadow:0 5px 0 #1e4f96,0 12px 24px rgba(0,0,0,.4)}
  .ctl{color:#cfe8ff;font-size:14px;line-height:1.9;font-weight:600}
  .ctl b{color:#ffd23f}
  .tiny{color:#7fa8cc;font-size:11px}
  .newrec{display:none;color:#7bff9e;font-size:20px;font-weight:900;animation:pop 1s infinite alternate}
  @keyframes pop{from{transform:scale(1)}to{transform:scale(1.12)}}
  .hidden{display:none !important}
  #err{z-index:40}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hudTop" class="hud">
  <div style="display:flex;gap:8px;pointer-events:auto">
    <button id="btnPause" class="icoBtn">⏸</button>
    <button id="btnMute" class="icoBtn">🔊</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
    <div class="pill" id="scoreEl">🏆 0<span id="x2badge">×2</span></div>
    <div class="pill" id="coinEl">🪙 0</div>
  </div>
</div>

<div id="powerbars" class="hud"></div>
<button id="btnBoard" class="hidden">🛹<span class="cd" id="boardCd"></span></button>
<div id="hint" class="hud"></div>
<div id="toast" class="hud"></div>
<div id="flash"></div>

<div id="menu" class="ov">
  <div class="panel">
    <div class="title">地铁跑酷</div>
    <div class="sub">网页复刻版 · 原创代码与美术 · 仅供学习</div>
    <div class="stats">最高分 <b id="bestMenu">0</b></div>
    <button class="btn" id="btnStart">开 始 跑 酷</button>
    <div class="ctl" id="ctlText"></div>
    <div class="tiny">躲避列车与路障 · 吃金币 · 拾取道具 · 别被督察抓到！</div>
  </div>
</div>

<div id="pauseOv" class="ov hidden">
  <div class="panel">
    <div class="title" style="font-size:44px">暂停</div>
    <button class="btn" id="btnResume">继 续</button>
    <button class="btn sec" id="btnRestart1">重新开始</button>
    <button class="btn sec" id="btnHome1">主菜单</button>
  </div>
</div>

<div id="overOv" class="ov hidden">
  <div class="panel">
    <div class="title" style="font-size:46px">被抓住啦！</div>
    <div class="newrec" id="newRec">🎉 新纪录！</div>
    <div class="stats">
      得分 <b id="finalScore">0</b><br>
      金币 <b id="finalCoins">0</b> · 距离 <b id="finalDist">0m</b><br>
      最高分 <b id="finalBest">0</b>
    </div>
    <button class="btn" id="btnRestart2">再 来 一 局</button>
    <button class="btn sec" id="btnHome2">主菜单</button>
  </div>
</div>

<div id="err" class="ov hidden">
  <div class="panel">
    <div class="title" style="font-size:36px">加载失败</div>
    <div class="ctl">需要联网加载 3D 渲染库 (three.js)。<br>请检查网络后刷新重试。</div>
  </div>
</div>

<script type="module">
const $ = s => document.querySelector(s);
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const rnd = (a=1,b) => b===undefined ? Math.random()*a : a+Math.random()*(b-a);
const irnd = (a,b) => Math.floor(rnd(a,b+1));
const lerp = (a,b,t) => a+(b-a)*t;

let THREE = null;
const CDNS = [
  './three.module.js',
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js',
  'https://fastly.jsdelivr.net/npm/three@0.160.0/build/three.module.js',
  'https://unpkg.com/three@0.160.0/build/three.module.js',
  'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js'
];

main();

async function main(){
  for(const u of CDNS){ try{ THREE = await import(u); if(THREE && THREE.WebGLRenderer) break; }catch(e){} }
  if(!THREE || !THREE.WebGLRenderer){ $('#err').classList.remove('hidden'); return; }
  try{ init(); }catch(e){ console.error(e); $('#err').classList.remove('hidden'); }
}

function init(){

/* ============ 基础常量 ============ */
const LX = [-2.3, 0, 2.3];
const SPAWN = -175, KILLZ = 20;
const GRAV = -28, JUMP_V = 9.6, SHOE_JUMP_V = 13.2;
const TRAIN_H = 2.55, RAMP_LEN = 4.5;
const DUR = { magnet:10, shoes:10, x2:12, jet:6, board:20 };
const BOARD_CD = 15;
const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

/* ============ 渲染器 / 场景 ============ */
const canvas = $('#c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color('#7cc4ef');
scene.fog = new THREE.Fog(0x9cd4f0, 55, 150);
const camera = new THREE.PerspectiveCamera(66, 1, .1, 400);

scene.add(new THREE.HemisphereLight(0xdff2ff, 0x6a7a8c, 1.05));
const sun = new THREE.DirectionalLight(0xfff2d8, 1.15);
sun.position.set(6, 12, 5);
scene.add(sun);

/* ============ 纹理工具 ============ */
function tex(w, h, fn, rx=1, ry=1){
  const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
  fn(cv.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(rx, ry);
  t.anisotropy = 4;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const lamb = o => new THREE.MeshLambertMaterial(o);
const boxGeoCache = {};
function box(w, h, d, mat, x=0, y=0, z=0, parent=null){
  const k = w+'_'+h+'_'+d;
  const g = boxGeoCache[k] || (boxGeoCache[k] = new THREE.BoxGeometry(w, h, d));
  const m = new THREE.Mesh(g, mat);
  m.position.set(x, y, z);
  if(parent) parent.add(m);
  return m;
}

/* ---- 地面（枕木+道砟，纹理滚动） ---- */
const groundTex = tex(256, 64, (g,w,h)=>{
  g.fillStyle = '#83878f'; g.fillRect(0,0,w,h);
  for(let i=0;i<700;i++){
    const c = 60+Math.random()*70|0;
    g.fillStyle = `rgba(${c},${c},${c+6},.4)`;
    g.fillRect(Math.random()*w, Math.random()*h, 1.7, 1.3);
  }
  const cx = LX.map(x => (x+10)/20*w);
  for(const c of cx){
    g.fillStyle = '#6d7076'; g.fillRect(c-20, 0, 40, h);
    for(let y=1; y<h; y+=13){
      g.fillStyle = '#5a4632'; g.fillRect(c-17, y, 34, 5);
      g.fillStyle = '#41332a'; g.fillRect(c-17, y+4, 34, 1.5);
    }
    g.fillStyle = '#3b3e44'; g.fillRect(c-10, 0, 3, h); g.fillRect(c+7, 0, 3, h);
  }
  g.fillStyle = 'rgba(80,120,60,.55)';
  for(let i=0;i<26;i++){
    const x = Math.random()<.5 ? Math.random()*16 : w-Math.random()*16;
    g.fillRect(x, Math.random()*h, 2, 3);
  }
}, 1, 65);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 260), lamb({ map: groundTex }));
ground.rotation.x = -Math.PI/2;
ground.position.set(0, 0, -100);
scene.add(ground);

/* ---- 钢轨（沿 z 均匀，无需移动） ---- */
{
  const railMat = lamb({ color: 0xb9c2cc });
  for(const x of LX){ for(const o of [-0.74, 0.74]){
    const r = box(0.09, 0.16, 300, railMat, x+o, 0.08, -105);
    scene.add(r);
  } }
  const wireMat = lamb({ color: 0x222831 });
  for(const x of LX){ const wr = box(0.03, 0.03, 300, wireMat, x, 5.15, -105); scene.add(wr); }
}

/* ---- 侧墙（涂鸦纹理滚动） ---- */
function wallCanvas(g, w, h){
  g.fillStyle = '#cfc6b4'; g.fillRect(0,0,w,h);
  g.strokeStyle = 'rgba(120,110,95,.35)'; g.lineWidth = 1;
  for(let y=0;y<h;y+=14){ g.beginPath(); g.moveTo(0,y); g.lineTo(w,y); g.stroke(); }
  for(let x=0;x<w;x+=26){ g.beginPath(); g.moveTo(x,0); g.lineTo(x,h); g.stroke(); }
  const hues = [4, 28, 200, 260, 320, 140, 50];
  for(let i=0;i<10;i++){
    const hu = hues[irnd(0,hues.length-1)], x = Math.random()*w, y = h*0.18+Math.random()*h*0.5;
    const ww = rnd(40,110), hh = rnd(22,50);
    g.fillStyle = `hsla(${hu},85%,55%,.85)`;
    g.beginPath(); g.roundRect(x, y, ww, hh, 12); g.fill();
    g.fillStyle = `hsla(${(hu+40)%360},90%,70%,.9)`;
    g.beginPath(); g.roundRect(x+6, y+6, ww*0.55, hh*0.5, 8); g.fill();
    g.strokeStyle = 'rgba(20,20,20,.5)'; g.lineWidth = 3;
    g.beginPath(); g.moveTo(x+8, y+hh*0.7);
    g.bezierCurveTo(x+ww*0.3, y+hh*0.2, x+ww*0.6, y+hh, x+ww-6, y+hh*0.4);
    g.stroke();
  }
  for(let i=0;i<4;i++){
    const x = Math.random()*w, y = h*0.15+Math.random()*h*0.35;
    g.fillStyle = '#f4f0e6'; g.fillRect(x, y, 26, 34);
    g.fillStyle = '#7c9cc9'; g.fillRect(x+3, y+4, 20, 12);
    g.fillStyle = '#c9b27c'; g.fillRect(x+3, y+19, 20, 3);
    g.fillStyle = '#999'; g.fillRect(x+3, y+25, 14, 3);
  }
  g.fillStyle = '#8b8378'; g.fillRect(0, 0, w, 8);
  g.fillStyle = '#5c564d'; g.fillRect(0, h-10, w, 10);
}
const wallTexL = tex(512, 160, wallCanvas, 20, 1);
const wallTexR = tex(512, 160, wallCanvas, 20, 1);
{
  const mkWall = (t, x, ry) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(320, 5), lamb({ map: t }));
    m.rotation.y = ry; m.position.set(x, 2.5, -100); scene.add(m);
  };
  mkWall(wallTexL, -7.6,  Math.PI/2);
  mkWall(wallTexR,  7.6, -Math.PI/2);
}

/* ---- 远景楼群（透明剪影，慢速视差） ---- */
const bldTexL = tex(1024, 256, bldCanvas, 5, 1);
const bldTexR = tex(1024, 256, bldCanvas, 5, 1);
function bldCanvas(g, w, h){
  g.clearRect(0,0,w,h);
  const cols = ['#a8b7c8','#c7b9a4','#9fb3a2','#b7a4c0','#c4a7a0','#93a9c4'];
  let x = 0;
  while(x < w){
    const bw = rnd(60,140), bh = rnd(h*0.35, h*0.92), c = cols[irnd(0,cols.length-1)];
    g.fillStyle = c; g.fillRect(x, h-bh, bw, bh);
    g.fillStyle = 'rgba(0,0,0,.15)'; g.fillRect(x+bw-10, h-bh, 10, bh);
    g.fillStyle = 'rgba(30,40,60,.55)';
    for(let yy=h-bh+10; yy<h-12; yy+=18){
      for(let xx=x+8; xx<x+bw-14; xx+=16){
        if(Math.random()<.82) g.fillRect(xx, yy, 8, 10);
        if(Math.random()<.12){ g.fillStyle='rgba(255,240,160,.9)'; g.fillRect(xx, yy, 8, 10); g.fillStyle='rgba(30,40,60,.55)'; }
      }
    }
    g.fillStyle = 'rgba(0,0,0,.25)'; g.fillRect(x, h-bh, bw, 5);
    x += bw + rnd(4,26);
  }
}
{
  const mkB = (t, x, ry) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(360, 16), new THREE.MeshBasicMaterial({ map:t, transparent:true }));
    m.rotation.y = ry; m.position.set(x, 8.3, -110); scene.add(m);
  };
  mkB(bldTexL, -14,  Math.PI/2);
  mkB(bldTexR,  14, -Math.PI/2);
}

/* ---- 天空渐变 + 云 ---- */
{
  const skyT = tex(64, 256, (g,w,h)=>{
    const gr = g.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,'#3fa9f5'); gr.addColorStop(.6,'#8ed2f7'); gr.addColorStop(1,'#d8f0fb');
    g.fillStyle = gr; g.fillRect(0,0,w,h);
  });
  const sky = new THREE.Mesh(new THREE.PlaneGeometry(600, 220), new THREE.MeshBasicMaterial({ map:skyT, fog:false }));
  sky.position.set(0, 60, -190); scene.add(sky);
  const cloudT = tex(128, 64, (g,w,h)=>{
    g.clearRect(0,0,w,h);
    g.fillStyle = 'rgba(255,255,255,.95)';
    for(const [cx,cy,r] of [[34,40,18],[58,32,24],[86,40,18],[70,44,20],[46,44,16]]){
      g.beginPath(); g.arc(cx,cy,r,0,7); g.fill();
    }
  });
  window._clouds = [];
  for(let i=0;i<6;i++){
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:cloudT, transparent:true, fog:false, opacity:.9 }));
    sp.scale.set(rnd(14,26), rnd(7,12), 1);
    sp.position.set(rnd(-90,90), rnd(26,48), -170);
    scene.add(sp); window._clouds.push(sp);
  }
}

/* ---- 沿线装饰（立柱 / 电杆，循环利用） ---- */
const decos = [];
{
  const colMat = lamb({ color: 0x8b8378 }), darkMat = lamb({ color: 0x38404c });
  for(let i=0;i<20;i++){
    const g = new THREE.Group();
    box(0.8, 4.6, 0.7, colMat, 0, 2.3, 0, g);
    box(1.1, 0.35, 0.95, darkMat, 0, 4.7, 0, g);
    const side = i%2 ? -7.2 : 7.2;
    g.position.set(side, 0, 20 - i*13.25);
    scene.add(g); decos.push({ g, span: 265 });
  }
  for(let i=0;i<11;i++){
    const g = new THREE.Group();
    box(0.16, 6, 0.16, darkMat, -7, 3, 0, g);
    box(0.16, 6, 0.16, darkMat,  7, 3, 0, g);
    box(14.2, 0.14, 0.14, darkMat, 0, 5.6, 0, g);
    for(const x of LX) box(0.1, 0.35, 0.1, darkMat, x, 5.35, 0, g);
    g.position.set(0, 0, 15 - i*24.2);
    scene.add(g); decos.push({ g, span: 266.2 });
  }
}

/* ============ 列车材质 ============ */
const TRAIN_COLORS = ['#ff8c1a','#2e77ff','#2ecc57','#e74c3c','#9b59b6','#f1c40f','#12b5c9'];
const trainMatCache = {};
function trainMats(color){
  if(trainMatCache[color]) return trainMatCache[color];
  const side = tex(200, 128, (g,w,h)=>{
    g.fillStyle = color; g.fillRect(0,0,w,h);
    g.fillStyle = 'rgba(0,0,0,.22)'; g.fillRect(0,0,w,12);
    g.fillStyle = 'rgba(255,255,255,.16)'; g.fillRect(0,12,w,6);
    for(const wx of [16,116]){
      g.fillStyle = '#eef6ff'; g.beginPath(); g.roundRect(wx, 26, 68, 34, 6); g.fill();
      const gr = g.createLinearGradient(0,26,0,60);
      gr.addColorStop(0,'#cfe8ff'); gr.addColorStop(1,'#7fb4e8');
      g.fillStyle = gr; g.beginPath(); g.roundRect(wx+3, 29, 62, 28, 4); g.fill();
    }
    g.fillStyle = '#ffffff'; g.fillRect(0, 66, w, 7);
    g.fillStyle = 'rgba(0,0,0,.28)'; g.fillRect(0, 96, w, 32);
    g.fillStyle = '#1c1f26'; g.fillRect(8, 104, 40, 22); g.fillRect(w-48, 104, 40, 22);
    g.fillStyle = '#3a4048'; g.beginPath(); g.arc(28,116,9,0,7); g.arc(w-28,116,9,0,7); g.fill();
  }, 2, 1);
  const top = tex(128, 128, (g,w,h)=>{
    g.fillStyle = '#9aa0a6'; g.fillRect(0,0,w,h);
    g.strokeStyle = 'rgba(0,0,0,.25)'; g.lineWidth = 3;
    for(let y=8;y<h;y+=16){ g.beginPath(); g.moveTo(0,y); g.lineTo(w,y); g.stroke(); }
    g.fillStyle = '#7e858c'; g.fillRect(w/2-14, 10, 28, 20);
  }, 1, 2);
  const front = tex(128, 128, (g,w,h)=>{
    g.fillStyle = color; g.fillRect(0,0,w,h);
    g.fillStyle = 'rgba(255,255,255,.14)'; g.fillRect(0,0,w,10);
    g.fillStyle = '#18202c'; g.beginPath(); g.roundRect(16, 16, 96, 40, 8); g.fill();

}

    o = pget('T'+w+'_'+r, ()=>makeTrain(w, !!r));
    const col = TRAIN_COLORS[irnd(0, TRAIN_COLORS.length-1)];
    const mats = trainMats(col);
    for(const m of o.wagonMeshes) m.material = mats;
    const lit = !!opt.extra;
    for(const l of o.lights) l.visible = lit;
  } else if(kind==='hurdle') o = pget('H', makeHurdle);
  else if(kind==='over') o = pget('O', makeOver);

  o.head = spawnBase - off - (opt.farther||0);

  o.extra = opt.extra || 0;
  o.horned = false;
  o.g.position.set(o.x, 0, o.head);
  obs.push(o);

}

let partIdx = 0;
function emit(x, y, z, color, n=6, spread=2.4, up=3){
  for(let i=0;i<n;i++){
    const p = parts[partIdx++ % parts.length];
    p.m.visible = true;
    p.m.material.color.set(color); p.m.material.opacity = 1;
    p.m.position.set(x+rnd(-.2,.2), y+rnd(-.1,.2), z+rnd(-.2,.2));
    p.vx = rnd(-spread, spread); p.vy = rnd(up*0.3, up); p.vz = rnd(-spread, spread);
    p.life = p.t = rnd(.3,.6);
    const s = rnd(.6,1.6); p.m.scale.set(s,s,s);
  }
}
function updateParts(dt){
  for(const p of parts){
    if(p.t<=0) continue;
    p.t -= dt;
    if(p.t<=0){ p.m.visible=false; continue; }
    p.vy -= 14*dt;
    p.m.position.x += p.vx*dt; p.m.position.y += p.vy*dt; p.m.position.z += p.vz*dt;
    p.m.material.opacity = p.t/p.life;
  }
}

function audioInit(){
  if(actx){ if(actx.state === 'suspended') actx.resume(); return; }
  try{
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterG = actx.createGain();
    masterG.gain.value = muted ? 0 : 0.5;
    masterG.connect(actx.destination);
  }catch(e){}
}
function osc(type, f0, f1, t0, dur, vol, dest){
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(f0, t0);
  if(f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g); g.connect(dest || masterG);
  o.start(t0); o.stop(t0+dur+0.02);
}
let noiseBuf = null;
function noise(t0, dur, vol, hp=0, lp=0){
  if(!noiseBuf){
    noiseBuf = actx.createBuffer(1, actx.sampleRate*0.5, actx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  }
  const s = actx.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  let node = s;
  if(hp){ const f = actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; node.connect(f); node = f; }
  if(lp){ const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp; node.connect(f); node = f; }
  node.connect(g); g.connect(masterG);
  s.start(t0); s.stop(t0+dur+0.02);
}
function sfx(name){
  if(!actx || muted) return;
  const t = actx.currentTime;
  switch(name){
    case 'coin': osc('square', 1250, 1900, t, .09, .1); break;
    case 'jump': osc('sine', 330, 660, t, .17, .16); break;
    case 'roll': noise(t, .2, .1, 0, 900); break;
    case 'land': osc('sine', 150, 70, t, .1, .16); break;
    case 'stumble': osc('sawtooth', 300, 110, t, .22, .2); noise(t, .15, .12, 0, 1200); break;
    case 'hit': noise(t, .3, .3, 0, 2500); osc('sine', 210, 45, t, .32, .4); break;
    case 'power': [523,659,784,1047].forEach((f,i)=>osc('square', f, f, t+i*.07, .1, .12)); break;
    case 'board': osc('triangle', 700, 1300, t, .25, .16); break;
    case 'horn': osc('square', 311, 311, t, .5, .12); osc('square', 370, 370, t, .5, .1); break;
    case 'bark': osc('square', 720, 320, t, .07, .14); osc('square', 700, 300, t+.12, .07, .14); break;
    case 'caught': [392,330,262,196].forEach((f,i)=>osc('sawtooth', f, f, t+i*.1, .14, .16)); break;
    case 'swipe': noise(t, .08, .05, 900, 0); break;
  }
}
const LEAD = [
  72,0,76,0,79,0,76,0,  74,0,71,0,74,0,79,0,
  69,0,72,0,76,0,79,0,  77,0,76,0,74,0,72,0,
  72,0,76,0,79,0,84,0,  83,0,79,0,74,0,79,0,
  81,0,76,0,72,0,76,0,  77,76,74,72,69,0,67,0
];
const BASSROOT = [36,43,33,41];
const ARP = [0,7,12,7];
const midiHz = m => 440*Math.pow(2,(m-69)/12);
let mNext = 0, mStep = 0;
function musicTick(){
  if(!actx || muted) return;
  if(mode !== 'play' && mode !== 'menu' && mode !== 'dead'){ mNext = actx.currentTime; return; }
  const hot = mode === 'play' ? clamp((speed-12)/14, 0, 1) : 0;
  const bpm = 156 + 24*hot;
  const step = 60/bpm/2;
  if(mNext < actx.currentTime) mNext = actx.currentTime + 0.05;
  while(mNext < actx.currentTime + 0.15){
    const s = mStep % 64, t = mNext, bar = (s>>3) % 4, half = step/2;
    if(s % 4 === 0){ osc('sine', 165, 40, t, .12, .5); noise(t, .02, .12, 0, 400); }
    if(s % 8 === 4){ noise(t, .09, .22, 1500, 0); osc('triangle', 190, 120, t, .07, .12); }
    noise(t, .025, s%2 ? .07 : .04, 6500, 0);
    noise(t+half, .02, .03, 8000, 0);
    if(s % 4 === 2) noise(t, .09, .05, 9000, 0);
    const b = BASSROOT[bar] + (s%2 ? 12 : 0);
    osc('sawtooth', midiHz(b), midiHz(b), t, .16, .09);
    osc('sine', midiHz(b-12), midiHz(b-12), t, .18, .12);
    const n = LEAD[s];
    if(n){
      osc('square', midiHz(n), midiHz(n), t, .15, .06);
      osc('sawtooth', midiHz(n)*1.007, midiHz(n)*1.007, t, .13, .035);
      osc('square', midiHz(n+12), midiHz(n+12), t+step*1.5, .1, .02);
    }
    if(hot > 0.35 && s%2 === 1){
      const a = BASSROOT[bar] + 24 + ARP[(s>>1)%4];
      osc('square', midiHz(a), midiHz(a), t, .07, .03*hot);
    }
    if(s >= 56){
      if(s%2 === 0) noise(t, .05, .1 + (s-56)*.015, 1800, 0);
      noise(t, step, .015 + (s-56)*.003, 3000 + (s-56)*600, 0);
    }
    mStep++; mNext += step;
  }
}

/* ============ 关卡生成 ============ */
function shuffledLanes(){
  const a = [0,1,2];
  for(let i=2;i>0;i--){ const j = irnd(0,i); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}
function coinLine(lane, off, n, y=0.75, gap=1.5){
  for(let i=0;i<n;i++) spawnCoin(lane, off + i*gap, y);
}
function coinArc(lane, off){
  for(let i=-2;i<=2;i++) spawnCoin(lane, off + i*1.1, 0.8 + 1.2*(1 - (i/2.4)*(i/2.4)));
}
function trainTopCoins(lane, off, o){
  const start = off + (o.rampLen ? 1 : 2);
  const n = Math.floor((o.len - (o.rampLen?5:4)) / 1.7);
  if(o.rampLen) for(let i=1;i<=2;i++) spawnCoin(lane, off + i*1.4, TRAIN_H*(i*1.4/RAMP_LEN)+0.7);
  for(let i=0;i<n;i++) spawnCoin(lane, start + (o.rampLen?RAMP_LEN:0) + i*1.7, TRAIN_H + 0.6);
}
function maybePickup(lane, off){
  powerPity += 1;
  if(Math.random() < 0.14 || powerPity > 7){
    powerPity = 0;
    const r = Math.random();
    const type = r < .3 ? 'magnet' : r < .55 ? 'shoes' : r < .85 ? 'x2' : 'jet';
    spawnPickup(type, lane, off);
  }
}
function movingLaneBlocked(){
  const s = new Set();
  for(const o of obs) if(o.extra) s.add(o.lane);
  return s;
}
function chunkTrains(d){
  const lanes = shuffledLanes();
  const nT = 1 + (Math.random() < .35 + .45*d ? 1 : 0);
  const blocked = movingLaneBlocked();
  let L = 30;
  const used = [];
  for(let i=0;i<nT;i++){
    const ln = lanes[i];
    if(blocked.has(ln)) continue;
    const wag = Math.random() < .5 ? 2 : 3;
    const ramp = Math.random() < .45;
    const off = rnd(0, 10);
    const o = spawnObs('train', ln, off, { wagons: wag, ramp });
    trainTopCoins(ln, off, o);
    used.push(ln);
    L = Math.max(L, off + o.len + 4);
  }
  for(const ln of lanes){
    if(used.includes(ln) || blocked.has(ln)) continue;
    if(Math.random() < .5 && d > .15){
      spawnObs(Math.random() < .6 ? 'hurdle' : 'over', ln, rnd(8, L-12));
    }
    coinLine(ln, rnd(2,6), irnd(4,7));
  }
  maybePickup(lanes[2], L + 2);
  return L + 4;
}
function chunkBarriers(d){
  const rows = 2 + (d > .25 ? 1 : 0) + (Math.random() < d ? 1 : 0);
  const sp = 9 + 5*d;                       // 行距随速度拉开，滞空不会直接撞进下一行
  const blocked = movingLaneBlocked();
  let golden = irnd(0,2);
  let prevKinds = null;
  for(let r=0;r<rows;r++){
    const off = r*sp;
    golden = clamp(golden + irnd(-1,1), 0, 2);
    const kinds = [];
    for(let ln=0;ln<3;ln++){
      if(blocked.has(ln)){ kinds.push('none'); continue; }
      const q = Math.random();
      kinds.push(q < .3 ? 'none' : q < .58 ? 'hurdle' : q < .8 ? 'over' : 'block');
    }
    if(kinds[golden] === 'block') kinds[golden] = Math.random() < .5 ? 'hurdle' : 'over';
    if(!kinds.some(k => k !== 'block')) kinds[1] = 'hurdle';
    for(let ln=0;ln<3;ln++){
      // 跳过栏架后仍在空中时，同车道紧接的下一行不允许出现须下滑/无法通过的障碍
      if(prevKinds && prevKinds[ln] === 'hurdle' && (kinds[ln] === 'over' || kinds[ln] === 'block'))
        kinds[ln] = Math.random() < .5 ? 'hurdle' : 'none';
    }
    for(let ln=0;ln<3;ln++){
      const k = kinds[ln];
      if(k === 'none'){ if(Math.random() < .6) coinLine(ln, off-1.5, 3); continue; }
      spawnObs(k, ln, off);
      if(k === 'hurdle' && Math.random() < .6) coinArc(ln, off);
    }
    prevKinds = kinds;
  }
  const L = rows*sp + 4;
  maybePickup(irnd(0,2), L + 1);
  return L + 3;
}
function chunkMixed(d){
  const lanes = shuffledLanes();
  const blocked = movingLaneBlocked();
  let L = 28;
  if(!blocked.has(lanes[0])){
    const off = rnd(0, 5);
    const o = spawnObs('train', lanes[0], off, { wagons: 2, ramp: Math.random() < .6 });
    trainTopCoins(lanes[0], off, o);
    L = Math.max(L, off + o.len + 4);
  }
  let flip = Math.random() < .5;
  const lastK = {};
  let maxOff = 0;
  for(const off0 of [5, 13, 21]){
    const off = 5 + (off0 - 5) * (1 + 0.7*d);   // 高速时拉开间距
    const ln = flip ? lanes[1] : lanes[2]; flip = !flip;
    if(blocked.has(ln)) continue;
    let k = Math.random() < .55 ? 'hurdle' : 'over';
    if(lastK[ln] === 'hurdle' && k === 'over') k = 'hurdle';   // 防滞空撞牌
    lastK[ln] = k;
    spawnObs(k, ln, off);
    maxOff = Math.max(maxOff, off);
    if(k === 'hurdle' && Math.random() < .5) coinArc(ln, off);
    else coinLine(ln, off + 2.5, 3);
  }
  return Math.max(L, maxOff + 7) + 3;
}
function chunkCoins(d){
  let ln = irnd(0,2), off = 0;
  const segs = irnd(4,6);
  const blocked = movingLaneBlocked();
  for(let s=0;s<segs;s++){
    coinLine(ln, off, 5, 0.75, 1.4);
    off += 5*1.4 + 1.5;
    let nl = clamp(ln + (Math.random() < .5 ? -1 : 1), 0, 2);
    if(blocked.has(nl)) nl = ln;
    ln = nl;
  }
  if(Math.random() < .5){
    const r = Math.random();
    spawnPickup(r < .3 ? 'jet' : r < .6 ? 'magnet' : r < .85 ? 'x2' : 'shoes', ln, off + 2);
  }
  return off + 6;
}
function chunkMoving(d){
  const blocked = movingLaneBlocked();
  const free = [0,1,2].filter(l => !blocked.has(l));
  if(!free.length) return chunkBarriers(d);
  const ln = free[irnd(0, free.length-1)];
  spawnObs('train', ln, 0, { wagons: 3, extra: 13 + 10*d, farther: 55 });
  const others = [0,1,2].filter(l => l !== ln && !blocked.has(l));
  const lastK = {};
  for(const off0 of [6, 16]){
    if(others.length && Math.random() < .75){
      const off = off0 === 6 ? 6 : 16 + 8*d;
      const l2 = others[irnd(0, others.length-1)];
      let k = Math.random() < .6 ? 'hurdle' : 'over';
      if(lastK[l2] === 'hurdle' && k === 'over') k = 'hurdle';
      lastK[l2] = k;
      spawnObs(k, l2, off);
    }
  }
  if(others.length) coinLine(others[0], 3, 6);
  return 26 + 8*d;
}
function spawnChunk(){
  const d = Math.min(1, dist/2400);
  const r = Math.random();
  let L;
  if(r < .3) L = chunkTrains(d);
  else if(r < .58) L = chunkBarriers(d);
  else if(r < .72) L = chunkMixed(d);
  else if(r < .84) L = chunkCoins(d);
  else L = chunkMoving(d);
  return L + rnd(6, 15 - 8*d);
}

/* ============ 物理 / 碰撞 ============ */
function groundAt(x, yRef){
  let g = 0;
  for(const o of obs){
    if(!o.walk) continue;
    if(Math.abs(x - o.x) > o.halfW + 0.13) continue;   // 支撑区加宽：相邻车顶间无真空带
    if(o.head < -0.35 || o.head - o.len > 0.4) continue;
    let h = o.h;
    if(o.rampLen && o.head < o.rampLen) h = o.h * (o.head / o.rampLen);
    if(h > g && (yRef === undefined || h <= yRef + 0.9)) g = h;   // 只认脚下容差内的面，防止在车体内"悬空"
  }
  return g;
}
function collide(){
  if(hero.dead || invulnT > 0 || timers.jet > 0) return;
  const px = hero.x, py = hero.y;
  for(const o of obs){
    const dx = Math.abs(px - o.x);
    if(dx > o.halfW + 0.34) continue;
    // 扫掠窗口：本帧扫过 [-0.1, len+0.15] 才判定（贴近可见接触，且防高速穿透）
    const pv = (o.prev === undefined ? o.head : o.prev);
    if(o.head < -0.1 || pv - o.len > 0.15) continue;
    if(o.walk){
      let top = o.h;
      if(o.rampLen && o.head < o.rampLen) top = o.h * (o.head / o.rampLen);
      if(py < top - 0.48){
        hitSolid(o, o.head < 1.2 + speed*0.02, dx);
        return;
      }
    } else if(o.kind === 'hurdle'){
      if(py < 0.72){ hitSolid(o, true, dx); return; }
    } else if(o.kind === 'over'){
      if(!hero.rolling && py < 2.25 && py + 1.75 > 1.2){ hitSolid(o, true, dx); return; }
    } else if(o.kind === 'block'){
      if(py < 2.3){ hitSolid(o, true, dx); return; }
    }
  }
}
function overlappingSolid(){
  const px = hero.x, py = hero.y;
  for(const o of obs){
    if(Math.abs(px - o.x) > o.halfW + 0.3) continue;
    if(o.head < -0.35 || o.head - o.len > 0.35) continue;
    if(o.walk){
      let top = o.h;
      if(o.rampLen && o.head < o.rampLen) top = o.h * (o.head / o.rampLen);
      if(py < top - 0.5) return true;
    }
    else if(o.kind === 'block' && py < 2.3) return true;
    else if(o.kind === 'hurdle' && py < 0.7) return true;
    else if(o.kind === 'over' && !hero.rolling && py < 2.2) return true;
  }
  return false;
}
function hitSolid(o, frontal, dx){
  if(timers.board > 0){ boardCrash(o); return; }
  const grazing = dx > o.halfW - 0.22;
  if(o.rampLen && o.head < o.rampLen + 0.8) frontal = false;   // 坡道区域不算正面撞击
  if(o.extra){
    if(!frontal && grazing){ stumble(o); return; }             // 移动列车：侧面轻擦→踉跄
    die('train'); return;
  }
  if(frontal && !grazing){ die('hit'); return; }
  if(guardCloseT > 0 && !grazing){ die('caught'); return; }    // 蹭边不再被直接抓住
  stumble(o);
}
function laneSafeFor(ln, ignore){
  for(const q of obs){
    if(q === ignore) continue;
    if(Math.abs(LX[ln] - q.x) > q.halfW + 0.3) continue;
    if(q.head < -1.5 || q.head - q.len > 7) continue;          // 只看身前一小段
    if(q.walk && hero.y >= q.h - 0.45) continue;               // 已站在其顶上则安全
    return false;
  }
  return true;
}
function stumble(o){
  guardCloseT = 6; stumbleT = 0.6; speedDip = 0.4; shake = 0.35;
  invulnT = Math.max(invulnT, 0.8);                            // 踉跄保护帧：防止被弹进旁边障碍连环死
  sfx('stumble'); sfx('bark');
  flashScreen(0.5);
  emit(hero.x, hero.y + 1, 0, 0xcccccc, 6, 2, 3);
  const dir = Math.sign(hero.x - o.x) || (hero.lane === 0 ? 1 : -1);
  let ln = clamp(hero.lane + dir, 0, 2);
  const bad = l => Math.abs(LX[l] - o.x) < o.halfW + 0.3 || !laneSafeFor(l, o);
  if(bad(ln)){
    const alt = clamp(hero.lane - dir, 0, 2);
    if(!bad(alt)) ln = alt;
    else ln = hero.lane;                                       // 两侧都危险：原地踉跄，靠保护帧脱身
  }
  hero.lane = hero.targetLane = ln;
  hero.x = lerp(hero.x, LX[ln], 0.55);
  toast('小心！督察追上来了！');
}
function boardCrash(o){
  timers.board = 0; boardCd = BOARD_CD; invulnT = 1.6;
  guardCloseT = 0;
  sfx('hit'); shake = 0.5; flashScreen(0.6);
  emit(hero.x, hero.y + 0.4, 0, 0x40e0ff, 14, 4, 5);
  if(o && o.walk && hero.y < o.h - 0.4){
    // 撞进车体时滑板把人弹到相邻安全车道，而不是留在车厢里
    const dir = Math.sign(hero.x - o.x) || (hero.lane === 0 ? 1 : -1);
    let ln = clamp(hero.lane + dir, 0, 2);
    const bad = l => Math.abs(LX[l] - o.x) < o.halfW + 0.3 || !laneSafeFor(l, o);
    if(bad(ln)){
      const alt = clamp(hero.lane - dir, 0, 2);
      if(!bad(alt)) ln = alt;
    }
    hero.lane = hero.targetLane = ln;
    hero.x = lerp(hero.x, LX[ln], 0.6);
  }
  toast('滑板保护了你！');
}
function die(reason){
  hero.dead = true; mode = 'dead'; deathT = 0; overShown = false;
  timers.board = 0; timers.jet = 0;
  sfx('hit'); sfx('caught'); sfx('bark');
  shake = 0.6; flashScreen(1);
  emit(hero.x, hero.y + 1, 0, 0xffffff, 12, 3, 4);
  deathFling = reason === 'train' ? { vy: 6.5, vz: 10, rx: 0 } : null;
  if(navigator.vibrate) try{ navigator.vibrate(180); }catch(e){}
}
function flashScreen(a){
  const f = $('#flash');
  f.style.opacity = a;
  setTimeout(()=>f.style.opacity = 0, 160);
}

/* ============ 操作 ============ */
function doMove(d){
  if(mode !== 'play' || hero.dead) return;
  const nl = clamp(hero.targetLane + d, 0, 2);
  if(nl !== hero.targetLane){ hero.targetLane = nl; hero.lane = nl; sfx('swipe'); }
}
function doJump(){
  if(mode !== 'play' || hero.dead || timers.jet > 0) return;
  if(hero.rolling) endRoll();
  if(hero.grounded || hero.coyote > 0){
    hero.vy = timers.shoes > 0 ? SHOE_JUMP_V : JUMP_V;
    hero.grounded = false; hero.coyote = 0;
    sfx('jump');
    emit(hero.x, 0.1, 0, 0xd8d8d8, 4, 1.6, 2);
  } else hero.jumpQueued = 0.14;
}
function doRoll(){
  if(mode !== 'play' || hero.dead || timers.jet > 0) return;
  if(!hero.grounded){
    hero.vy = Math.min(hero.vy, -22);
    hero.rollQueued = true;
  } else startRoll();
}
function startRoll(){
  hero.rolling = true; hero.rollT = 0.72;
  sfx('roll');
}
function endRoll(){
  hero.rolling = false;
  heroRig.spin.rotation.x = 0;
  heroRig.spin.scale.set(1, 1, 1);
}
function useBoard(){
  if(mode !== 'play' || hero.dead || timers.board > 0 || boardCd > 0) return;
  timers.board = DUR.board;
  sfx('board');

let tS = null, tConsumed = false, lastTap = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); audioInit();
  if(e.touches.length === 1){
    tS = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: performance.now() };
    tConsumed = false;
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(!tS || tConsumed) return;
  const dx = e.touches[0].clientX - tS.x, dy = e.touches[0].clientY - tS.y;
  if(Math.abs(dx) < 26 && Math.abs(dy) < 26) return;
  tConsumed = true;
  if(Math.abs(dx) > Math.abs(dy)) doMove(dx > 0 ? 1 : -1);
  else dy < 0 ? doJump() : doRoll();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if(tS && !tConsumed && performance.now() - tS.t < 240){
    const now = performance.now();
    if(now - lastTap < 320) useBoard();
    lastTap = now;
  }
  tS = null;
}, { passive: false });

let mS = null;
canvas.addEventListener('mousedown', e => { audioInit(); mS = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', e => {

}
function reset(){
  clearActive();
  speed = 12; dist = 0; scoreF = 0; coins = 0;
  powerPity = 0;
  guardDist = 9.8; guardCloseT = 0; stumbleT = 0; speedDip = 0;
  invulnT = 0; boardCd = 0; deathT = 0; deathFling = null; shake = 0;
  for(const k in timers) timers[k] = 0;
  Object.assign(hero, {
    x: 0, y: 0, vy: 0, lane: 1, targetLane: 1,
    grounded: true, coyote: 0, rolling: false, rollT: 0,
    jumpQueued: 0, rollQueued: false, dead: false, runT: 0, transferT: 0
  });

heroRig.root.rotation.y = Math.PI;

/* ============ 逐帧更新 ============ */
function scrollWorld(ds){
  groundTex.offset.y = (groundTex.offset.y + ds/4) % 1;
  wallTexL.offset.x = (wallTexL.offset.x + ds/16) % 1;
  wallTexR.offset.x = (wallTexR.offset.x - ds/16) % 1;
  bldTexL.offset.x = (bldTexL.offset.x + ds/64*0.45) % 1;
  bldTexR.offset.x = (bldTexR.offset.x - ds/64*0.45) % 1;
  for(const d of decos){
    d.g.position.z += ds;
    if(d.g.position.z > 25) d.g.position.z -= d.span;
  }
  for(const c of window._clouds){
    c.position.x += ds*0.02;
    if(c.position.x > 100) c.position.x = -100;
  }
}
function runPose(rig, t, sp){
  const f = Math.sin(t), f2 = Math.cos(t);
  rig.legL.rotation.x = f * 0.95;
  rig.legR.rotation.x = -f * 0.95;
  rig.armL.rotation.x = -f * 0.85;
  rig.armR.rotation.x = f * 0.85;
  rig.armL.rotation.z = 0.12; rig.armR.rotation.z = -0.12;
  rig.torso.rotation.x = 0.16 + Math.abs(f2)*0.03;
  rig.torso.rotation.y = f * 0.07;
  rig.body.position.y = rig.base + Math.abs(f2) * 0.07;
}
function jumpPose(rig, vy){
  const up = clamp(vy/10, -1, 1);
  rig.legL.rotation.x = 0.9 - up*0.3;
  rig.legR.rotation.x = -0.7 + up*0.2;
  rig.armL.rotation.x = -1.2; rig.armR.rotation.x = -1.2;
  rig.armL.rotation.z = 0.5; rig.armR.rotation.z = -0.5;
  rig.torso.rotation.x = 0.1;
  rig.body.position.y = rig.base;
}
function surfPose(rig, t){
  const f = Math.sin(t*0.5);
  rig.legL.rotation.x = -0.35; rig.legR.rotation.x = 0.4;
  rig.armL.rotation.x = -0.4 + f*0.08; rig.armR.rotation.x = 0.3;
  rig.armL.rotation.z = 0.7; rig.armR.rotation.z = -0.7;
  rig.torso.rotation.x = 0.08;
  rig.torso.rotation.y = -0.3;
  rig.body.position.y = rig.base;
}
function tuckPose(rig){
  rig.legL.rotation.x = -1.9; rig.legR.rotation.x = -1.9;
  rig.armL.rotation.x = -1.5; rig.armR.rotation.x = -1.5;
  rig.armL.rotation.z = 0.2; rig.armR.rotation.z = -0.2;
  rig.torso.rotation.x = 0.5;
  rig.body.position.y = rig.base;
}

function update(dt){
  elapsed += dt;
  const isPlay = mode === 'play';
  if(mode === 'menu'){
    scrollWorld(2*dt);
    hero.runT += dt*3;
    runPose(heroRig, hero.runT*0.8, 4);
    heroRig.root.position.set(0, Math.abs(Math.sin(elapsed*2))*0.03, 0);
    heroShadow.position.set(0, 0.02, 0);
    guardRig.root.position.set(-20, 0, 30);
    dog.position.set(-20, 0, 30);
    guardShadow.position.set(-20, 0.02, 30);
    camera.position.lerp(new THREE.Vector3(Math.sin(elapsed*0.25)*2.6, 3, 6.4), Math.min(1, 2*dt));
    camera.lookAt(0, 1.3, 0);
    return;
  }
  if(mode === 'pause' || mode === 'over') return;

  if(isPlay){
    speed = 12 + 18*Math.min(1, dist/2600);
    if(speedDip > 0) speedDip -= dt;
    const eff = speed * (speedDip > 0 ? 0.55 : 1) * (timers.jet > 0 ? 1.15 : 1);
    const ds = eff * dt;
    dist += ds;
    scoreF += ds * 2 * (timers.x2 > 0 ? 2 : 1);
    scrollWorld(ds);

    distToNext -= ds;
    if(distToNext <= 0) distToNext += spawnChunk();

    for(let i=obs.length-1;i>=0;i--){
      const o = obs[i];
      o.prev = o.head;
      o.head += ds + (o.extra ? o.extra*dt : 0);
      o.g.position.z = o.head;
      if(o.extra && !o.horned && o.head > -75){ o.horned = true; sfx('horn'); }
      if(o.head - o.len > KILLZ){ pput(o); obs.splice(i,1); }
    }

    for(const k in timers){
      if(timers[k] > 0){
        timers[k] -= dt;
        if(timers[k] <= 0){
          timers[k] = 0;
          if(k === 'board') boardCd = BOARD_CD;
          if(k === 'jet') invulnT = Math.max(invulnT, 1.2);
        }
      }
    }
    if(boardCd > 0 && timers.board <= 0) boardCd -= dt;
    if(invulnT > 0){
      invulnT -= dt;
      if(invulnT <= 0.12 && invulnT > 0 && overlappingSolid()) invulnT = 0.25;
    }
    if(guardCloseT > 0) guardCloseT -= dt;
    if(stumbleT > 0) stumbleT -= dt;
    if(hero.jumpQueued > 0) hero.jumpQueued -= dt;

    const tx = LX[hero.targetLane];
    hero.x += (tx - hero.x) * Math.min(1, 12*dt);

    const g = groundAt(hero.x, hero.y);
    if(timers.jet > 0){
      hero.y += (7.6 - hero.y) * Math.min(1, 6*dt);
      hero.vy = 0; hero.grounded = false;
      jetCoinAcc += ds;
      if(jetCoinAcc > 1.1){
        jetCoinAcc = 0;
        if(Math.random() < .2) jetLane = clamp(jetLane + (Math.random() < .5 ? -1 : 1), 0, 2);
        spawnCoinAt(jetLane, -50, 7.6);
      }
      if(Math.random() < .8) emit(hero.x, hero.y + 0.9, 0.4, 0xffa030, 1, 1, -1);
    } else {
      if(hero.grounded){
        hero.transferT = 0.25;                      // 刚离开支撑面的横移宽限期
        if(g < hero.y - 0.02){
          hero.grounded = false; hero.coyote = 0.12; hero.vy = 0;
        } else if(g - hero.y <= 0.9){
          hero.y = g;
        }
      }
      if(!hero.grounded){
        hero.coyote -= dt;
        if(hero.transferT > 0) hero.transferT -= dt;
        hero.vy += GRAV * dt;
        const ny = hero.y + hero.vy * dt;
        // 落地：从上方落下，或横移宽限期内贴着新车顶（≤0.75）向上吸附
        if(hero.vy <= 0 && ny <= g && (hero.y >= g - 0.001 || (hero.transferT > 0 && g - hero.y <= 0.75))){
          const fallV = hero.vy;
          hero.y = g; hero.vy = 0; hero.grounded = true;
          if(fallV < -9){ sfx('land'); emit(hero.x, g + 0.05, 0, 0xd8d8d8, 5, 2, 2.5); }
          if(hero.rollQueued){ hero.rollQueued = false; startRoll(); }
          else if(hero.jumpQueued > 0){ hero.jumpQueued = 0; doJump(); }
        } else hero.y = ny;
      }
    }

    if(hero.rolling){
      hero.rollT -= dt;
      const rp = 1 - Math.max(0, hero.rollT)/0.72;
      heroRig.spin.rotation.x = -rp * Math.PI * 2;
      const rs = 1 - 0.3 * Math.sin(rp * Math.PI);
      heroRig.spin.scale.set(1, rs, rs);
      if(hero.rollT <= 0) endRoll();
    }

    collide();

    for(let i=coinsA.length-1;i>=0;i--){
      const c = coinsA[i];
      c.g.position.z += ds;
      c.g.rotation.y = elapsed * 5;
      if(timers.magnet > 0 && c.g.position.z > -9 && c.g.position.z < 3){
        const dx = hero.x - c.g.position.x, dy = hero.y + 0.8 - c.g.position.y, dz = 0 - c.g.position.z;
        const d2 = Math.hypot(dx, dy, dz);
        if(d2 < 5.5){
          const st = Math.min(d2, 19*dt);
          c.g.position.x += dx/d2*st; c.g.position.y += dy/d2*st; c.g.position.z += dz/d2*st;
        }
      }
      const cp = c.g.position;
      if(Math.abs(cp.z) < 0.95 && Math.abs(cp.x - hero.x) < 0.85 && Math.abs(cp.y - (hero.y + 0.8)) < 1.25){
        coins += 1; scoreF += (timers.x2 > 0 ? 2 : 1);
        sfx('coin');
        emit(cp.x, cp.y, cp.z, 0xffd23f, 3, 1.6, 2.4);
        pput(c); coinsA.splice(i,1);
        continue;
      }
      if(cp.z > 4){ pput(c); coinsA.splice(i,1); }
    }

    for(let i=pickA.length-1;i>=0;i--){
      const p = pickA[i];
      p.g.position.z += ds;
      p.inner.rotation.y = elapsed * 2.5;
      p.g.position.y = 1.15 + Math.sin(elapsed*3 + i)*0.12;
      const pp = p.g.position;
      if(Math.abs(pp.z) < 1 && Math.abs(pp.x - hero.x) < 1 && Math.abs(pp.y - (hero.y + 0.9)) < 1.7){
        timers[p.type] = DUR[p.type];
        if(p.type === 'jet'){ jetCoinAcc = 0; jetLane = hero.targetLane; }
        sfx('power');
        toast({ magnet:'🧲 金币磁铁！', shoes:'👟 超级弹跳！', x2:'✖2 双倍得分！', jet:'🚀 喷气飞行！' }[p.type]);
        emit(pp.x, pp.y, pp.z, 0xffffff, 8, 2.5, 3.5);
        pput(p); pickA.splice(i,1);
        continue;
      }
      if(pp.z > 4){ pput(p); pickA.splice(i,1); }
    }
    shoeM.emissive.setHex(timers.shoes > 0 && Math.sin(elapsed*10) > 0 ? 0xff3355 : 0x000000);
  }

  if(mode === 'dead'){
    deathT += dt;
    if(deathFling){
      deathFling.vy += GRAV * dt * 0.6;
      hero.y = Math.max(0, hero.y + deathFling.vy * dt);
      heroRig.root.position.z += deathFling.vz * dt;
      deathFling.vz *= (1 - 2*dt);
      heroRig.spin.rotation.x += 9 * dt;
    } else {
      heroRig.spin.rotation.x = Math.max(-1.45, heroRig.spin.rotation.x - 6*dt);
    }
    if(deathT > 1.15 && !overShown) showOver();
  }

  /* ---- 主角呈现 ---- */
  const onBoard = timers.board > 0;
  boardMesh.visible = onBoard;
  backBoard.visible = !onBoard;
  jetMeshes.visible = timers.jet > 0;
  if(!hero.dead){
    hero.runT += dt * (4 + speed * 0.55);
    if(timers.jet > 0){
      jumpPose(heroRig, 2);
      heroRig.torso.rotation.x = 0.35;
    } else if(hero.rolling){
      tuckPose(heroRig);
    } else if(!hero.grounded){
      jumpPose(heroRig, hero.vy);
    } else if(onBoard){
      surfPose(heroRig, hero.runT);
    } else {
      runPose(heroRig, hero.runT, speed);
    }
  }
  const bodyLift = (onBoard && hero.grounded && !hero.rolling) ? 0.22 : 0;
  heroRig.body.position.y += bodyLift;
  if(onBoard){
    boardMesh.position.set(0, hero.grounded ? 0.12 + Math.sin(elapsed*7)*0.03 + 0.06 : 0.04, 0);
    boardMesh.rotation.z = (LX[hero.targetLane] - hero.x) * -0.25;
  }
  heroRig.root.position.x = hero.x;
  heroRig.root.position.y = hero.y;
  if(mode !== 'dead' || !deathFling) heroRig.root.position.z = 0;
  const tilt = clamp((LX[hero.targetLane] - hero.x) * 0.22, -0.35, 0.35);
  heroRig.root.rotation.z = -tilt + (stumbleT > 0 ? Math.sin(stumbleT*40)*0.25*stumbleT : 0);
  heroRig.root.rotation.y = (mode === 'menu') ? Math.PI : (LX[hero.targetLane] - hero.x) * -0.1;
  if(invulnT > 0 && !hero.dead) heroRig.root.visible = Math.sin(elapsed*24) > -0.4;
  else heroRig.root.visible = true;
  heroShadow.position.set(hero.x, groundAt(hero.x, hero.y) + 0.02, 0);
  const shScale = clamp(1 - (hero.y - groundAt(hero.x, hero.y))/7, 0.25, 1);
  heroShadow.scale.set(shScale, 1, shScale);

  /* ---- 督察 & 狗 ---- */
  if(mode !== 'menu'){
    const gt = hero.dead ? 0.9 : (guardCloseT > 0 ? 2.3 : 9.8);
    guardDist += (gt - guardDist) * Math.min(1, (hero.dead ? 5 : 2.2) * dt);
    const gx = guardRig.root.position.x + (hero.x*0.92 - guardRig.root.position.x) * Math.min(1, 7*dt);
    const gy = lerp(guardRig.root.position.y, hero.dead ? hero.y : groundAt(gx), Math.min(1, 8*dt));
    guardRig.root.position.set(gx, gy, guardDist);
    guardRig.root.rotation.y = 0;
    if(hero.dead){
      guardRig.armL.rotation.x = -1.9; guardRig.armR.rotation.x = -1.9;
      guardRig.legL.rotation.x = 0.3; guardRig.legR.rotation.x = -0.3;
    } else {
      runPose(guardRig, hero.runT + 1.7, speed);
      guardRig.armR.rotation.x -= 0.9;
    }
    guardShadow.position.set(gx, gy + 0.02, guardDist);
    dog.position.set(gx + 0.75, gy, guardDist + 0.4);
    const dl = dog.userData.legs, df = Math.sin(hero.runT*1.6);
    dl[0].rotation.x = df; dl[1].rotation.x = -df; dl[2].rotation.x = -df; dl[3].rotation.x = df;
    dog.userData.tail.rotation.x = 0.6 + Math.sin(elapsed*14)*0.3;
    dog.userData.head.rotation.x = Math.sin(hero.runT*1.6)*0.1;
  }

  /* ---- 摄像机 ---- */
  if(shake > 0) shake -= dt;
  const portrait = innerHeight > innerWidth;
  const camY = (portrait ? 5.1 : 4.5) + hero.y*0.5;
  const camZ = portrait ? 8.6 : 7.4;
  const target = new THREE.Vector3(hero.x*0.5, camY, camZ);
  camera.position.lerp(target, Math.min(1, 7*dt));
  if(shake > 0){
    camera.position.x += rnd(-1,1)*shake*0.22;
    camera.position.y += rnd(-1,1)*shake*0.22;
  }
  camera.lookAt(hero.x*0.6, 1.8 + hero.y*0.5, -8);
}

/* ============ 主循环 ============ */
let last = performance.now(), fpsAcc = 0, fpsN = 0, fpsT = 0, prCut = false;
function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h;
  camera.fov = h > w ? 76 : 62;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();
camera.position.set(0, 3, 6.4);
camera.lookAt(0, 1.3, 0);

renderer.setAnimationLoop(now => {
  const dt = Math.min(0.04, (now - last)/1000 || 0.016);
  last = now;
  fpsAcc += dt; fpsN++; fpsT += dt;
  if(fpsT > 2 && !prCut){
    if(fpsN/fpsT < 45 && (devicePixelRatio||1) > 1){ renderer.setPixelRatio(1); prCut = true; }
    fpsT = 0; fpsN = 0;
  }
  update(dt);
  updateParts(dt);
  musicTick();
  updateHUD();
  renderer.render(scene, camera);
});

}
</script>
