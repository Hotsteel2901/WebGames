<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#05060E">
<title>DJ 电音台 · 5 Original Tracks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05060E; --panel:rgba(255,255,255,0.035); --line:rgba(255,255,255,0.09);
  --text:#EAF0FF; --muted:#8A93B0;
  --font-d:'Orbitron',system-ui,sans-serif; --font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{
  min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--text);
  font-family:var(--font-m);display:flex;justify-content:center;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(255,45,149,0.12), transparent 60%),
    radial-gradient(900px 500px at 85% 110%, rgba(0,229,255,0.10), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 48px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 48px);
}
.wrap{width:100%;max-width:900px;padding:28px 20px 130px;position:relative;z-index:1}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.h-title{
  font-family:var(--font-d);font-size:clamp(26px,6vw,40px);font-weight:900;letter-spacing:4px;
  background:linear-gradient(100deg,#FF2D95,#FF8C42,#00E5FF);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.h-sub{color:var(--muted);font-size:12px;letter-spacing:2px;margin-top:6px}
.back{color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--line);
  padding:8px 14px;border-radius:999px;transition:color .2s,border-color .2s}
.back:hover{color:#00E5FF;border-color:rgba(0,229,255,.4)}

.deck{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.viz-box{position:relative;height:150px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--line)}
canvas#viz{position:absolute;inset:0;width:100%;height:100%;display:block}
.now{
  position:absolute;left:14px;top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  font-size:11px;letter-spacing:1px;color:var(--muted);pointer-events:none
}
.chip{border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:rgba(5,6,14,.55)}
.chip.sec{color:#05060E;font-weight:700;border:none;background:var(--acc,#00E5FF)}
.chip.name{color:var(--text)}

.list{list-style:none}
.trk{
  display:grid;grid-template-columns:44px 1fr auto;gap:14px;align-items:center;
  padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;
  transition:background .15s;position:relative
}
.trk:last-child{border-bottom:none}
.trk:hover{background:rgba(255,255,255,.03)}
.trk:focus-visible{outline:2px solid #00E5FF;outline-offset:-2px}
.trk .no{
  font-family:var(--font-d);font-weight:700;font-size:15px;color:var(--muted);
  width:44px;height:44px;border:1px solid var(--line);border-radius:12px;
  display:flex;align-items:center;justify-content:center
}
.trk.on .no{color:#05060E;background:var(--acc);border-color:var(--acc);box-shadow:0 0 18px var(--glow)}
.trk .t-name{font-family:var(--font-d);font-size:15px;font-weight:700;letter-spacing:1.5px;color:var(--text)}
.trk.on .t-name{color:var(--acc)}
.trk .t-info{margin-top:5px;font-size:11px;color:var(--muted);letter-spacing:.5px;line-height:1.6}
.trk .t-info b{color:var(--acc);font-weight:500}
.trk .t-dur{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px}
.eq{display:none;align-items:flex-end;gap:2px;height:16px}
.trk.on.playing .eq{display:flex}
.eq i{width:3px;background:var(--acc);border-radius:2px;animation:eq .9s ease-in-out infinite}
.eq i:nth-child(2){animation-delay:.25s}.eq i:nth-child(3){animation-delay:.5s}
@keyframes eq{0%,100%{height:4px}50%{height:16px}}

.bar{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  width:100%;max-width:900px;z-index:5;padding:0 20px 16px
}
.bar-in{
  background:rgba(10,12,24,.88);backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:16px;padding:12px 16px;
  display:flex;flex-direction:column;gap:9px
}
.seek{position:relative;height:16px;cursor:pointer;display:flex;align-items:center}
.seek .rail{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.1);overflow:hidden}
.seek .fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--acc,#00E5FF),#FF2D95)}
.seek .dot{position:absolute;top:50%;left:0%;width:12px;height:12px;border-radius:50%;
  background:#fff;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--acc,#00E5FF);opacity:0;transition:opacity .15s}
.seek:hover .dot{opacity:1}
.row{display:flex;align-items:center;gap:14px}
.btn{
  background:none;border:1px solid var(--line);color:var(--text);border-radius:50%;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .1s;touch-action:manipulation;flex:none
}
.btn:hover{border-color:var(--acc,#00E5FF);box-shadow:0 0 14px var(--glow,rgba(0,229,255,.25))}
.btn:active{transform:scale(.93)}
.btn:focus-visible{outline:2px solid #00E5FF;outline-offset:3px}
.btn svg{width:16px;height:16px;fill:var(--text)}
.btn.main{width:52px;height:52px;border-width:2px;border-color:var(--acc,#00E5FF)}
.btn.main svg{width:20px;height:20px;fill:var(--acc,#00E5FF)}
.meta{flex:1;min-width:0}
.meta .m-name{font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:1px;color:var(--acc,#00E5FF);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .m-time{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.vol{display:flex;align-items:center;gap:8px;color:var(--muted)}
.vol svg{width:15px;height:15px;fill:var(--muted);flex:none}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:86px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.14);outline:none;cursor:pointer
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--acc,#00E5FF);box-shadow:0 0 8px var(--glow,rgba(0,229,255,.4))
}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;background:var(--acc,#00E5FF)}
.tip{color:var(--muted);font-size:11px;letter-spacing:1px;text-align:center;margin-top:14px}
@media (max-width:560px){
  .vol input{width:56px}
  .trk{grid-template-columns:36px 1fr auto;padding:14px 12px;gap:10px}
  .trk .no{width:36px;height:36px;font-size:13px}
}
@media (prefers-reduced-motion:reduce){ .eq i{animation:none;height:10px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="h-title">DJ STATION</div>
      <div class="h-sub">5 ORIGINAL FULL-LENGTH ELECTRONIC TRACKS · PURE WEB AUDIO SYNTHESIS</div>
    </div>
    <a class="back" href="index.html">&larr; 返回大厅</a>
  </div>

  <div class="deck">
    <div class="viz-box">
      <canvas id="viz"></canvas>
      <div class="now">
        <span class="chip sec" id="chipSec" style="display:none"></span>
        <span class="chip name" id="chipNow">待机 · 点击下方曲目开播</span>
        <span class="chip" id="chipBpm" style="display:none"></span>
      </div>
    </div>
    <ul class="list" id="list"></ul>
  </div>
  <div class="tip">SPACE 播放/暂停 · ←/→ 切歌 · 点击进度条跳转 · 一曲终了自动接下一首</div>
</div>

<div class="bar">
  <div class="bar-in">
    <div class="seek" id="seek" role="slider" aria-label="播放进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="rail"><div class="fill" id="fill"></div></div>
      <div class="dot" id="dot"></div>
    </div>
    <div class="row">
      <button class="btn" id="bPrev" aria-label="上一首"><svg viewBox="0 0 24 24"><path d="M6 5h2v14H6zM20 5v14L9.5 12z"/></svg></button>
      <button class="btn main" id="bPlay" aria-label="播放">
        <svg id="iPlay" viewBox="0 0 24 24"><polygon points="7,4 21,12 7,20"/></svg>
        <svg id="iPause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="5" height="16"/><rect x="14" y="4" width="5" height="16"/></svg>
      </button>
      <button class="btn" id="bNext" aria-label="下一首"><svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2zM4 5v14l10.5-7z"/></svg></button>
      <div class="meta">
        <div class="m-name" id="mName">DJ STATION</div>
        <div class="m-time" id="mTime">--:-- / --:--</div>
      </div>
      <div class="vol">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1a9 9 0 0 0 0-17.6z"/></svg>
        <input type="range" id="vol" min="0" max="100" value="80" aria-label="音量">
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
/* ================================================================
   引擎：AudioContext 前瞻调度器 + 合成器音色库 + 效果总线
   每首曲子 = 多个段落(section)的完整编曲，旋律/贝斯/鼓组按段落演进，
   并用确定性伪随机做鼓花与装饰音 —— 无整段死循环。
================================================================ */
var ctx=null, master=null, analyser=null, comp=null;
var delayIn=null, delayNode=null, delayFb=null, delayLp=null, convolver=null;
var noiseBuf=null, shaperCurve=null;
var B=null;            // 当前播放的总线组 {out,duck,dl,vb}
var P=null;            // 当前播放状态
var gen=0;

var hz=function(m){ return 440*Math.pow(2,(m-69)/12); };
var clamp=function(v,a,b){ return v<a?a:v>b?b:v; };
function rnd(i,salt){ var x=Math.sin(i*127.1+salt*311.7)*43758.5453; return x-Math.floor(x); }

function initAudio(){
  if(ctx){ if(ctx.state==='suspended') ctx.resume(); return; }
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  master=ctx.createGain(); master.gain.value=0.8;
  analyser=ctx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.82;
  comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-12; comp.knee.value=18; comp.ratio.value=5;
  comp.attack.value=0.004; comp.release.value=0.24;
  master.connect(analyser); analyser.connect(comp); comp.connect(ctx.destination);

  noiseBuf=ctx.createBuffer(1, ctx.sampleRate*1.2, ctx.sampleRate);
  var d=noiseBuf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=Math.random()*2-1;

  delayIn=ctx.createGain(); delayNode=ctx.createDelay(2.0);
  delayFb=ctx.createGain(); delayFb.gain.value=0.34;
  delayLp=ctx.createBiquadFilter(); delayLp.type='lowpass'; delayLp.frequency.value=3400;
  var dOut=ctx.createGain(); dOut.gain.value=0.55;
  delayIn.connect(delayNode); delayNode.connect(delayLp); delayLp.connect(delayFb);
  delayFb.connect(delayNode); delayLp.connect(dOut); dOut.connect(master);

  convolver=ctx.createConvolver();
  var len=Math.floor(ctx.sampleRate*2.6), ir=ctx.createBuffer(2,len,ctx.sampleRate);
  for(var c=0;c<2;c++){ var ch=ir.getChannelData(c);
    for(var j=0;j<len;j++) ch[j]=(Math.random()*2-1)*Math.pow(1-j/len,2.8); }
  convolver.buffer=ir;
  var vOut=ctx.createGain(); vOut.gain.value=0.7;
  convolver.connect(vOut); vOut.connect(master);

  shaperCurve=new Float32Array(1024);
  for(var k=0;k<1024;k++){ var x=k/511.5-1; shaperCurve[k]=Math.tanh(2.6*x); }

  setInterval(schedule,25);
}

function makeBuses(){
  var out=ctx.createGain(); out.connect(master);
  var duck=ctx.createGain(); duck.connect(out);
  var dl=ctx.createGain(); dl.connect(delayIn);
  var vb=ctx.createGain(); vb.connect(convolver);
  return {out:out,duck:duck,dl:dl,vb:vb};
}
function send(node,bus,amt){ var g=ctx.createGain(); g.gain.value=amt; node.connect(g); g.connect(bus); }
function pump(t,depth,rel){
  B.duck.gain.setValueAtTime(Math.max(0.05,1-depth),t);
  B.duck.gain.linearRampToValueAtTime(1,t+rel);
}

/* ---------------- 音色库 ---------------- */
function kick(t,v,pdepth,prel){
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(158,t);
  o.frequency.exponentialRampToValueAtTime(41,t+0.09);
  o.frequency.exponentialRampToValueAtTime(34,t+0.3);
  g.gain.setValueAtTime(0.55*v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
  o.connect(g); g.connect(B.out); o.start(t); o.stop(t+0.32);
  var s=ctx.createBufferSource(); s.buffer=noiseBuf;
  var f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=4200;
  var ng=ctx.createGain(); ng.gain.setValueAtTime(0.22*v,t);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+0.02);
  s.connect(f); f.connect(ng); ng.connect(B.out); s.start(t); s.stop(t+0.03);
  if(pdepth) pump(t,pdepth,prel||0.28);
}
function snare(t,v){
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1700;
  var g=ctx.createGain(); g.gain.setValueAtTime(0.32*v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
  s.connect(hp); hp.connect(g); g.connect(B.out);
  send(g,B.vb,0.25); s.start(t); s.stop(t+0.19);
  var o=ctx.createOscillator(),og=ctx.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(196,t);
  o.frequency.exponentialRampToValueAtTime(150,t+0.08);
  og.gain.setValueAtTime(0.2*v,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
  o.connect(og); og.connect(B.out); o.start(t); o.stop(t+0.1);
}
function clap(t,v,verb){
  for(var i=0;i<3;i++){
    var tt=t+i*0.013;
    var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
    s.playbackRate.value=0.9+i*0.1;
    var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1350; bp.Q.value=1.1;
    var g=ctx.createGain(); g.gain.setValueAtTime((i<2?0.14:0.3)*v,tt);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+(i<2?0.035:0.24));
    s.connect(bp); bp.connect(g); g.connect(B.out);
    if(i===2) send(g,B.vb,verb||0.3);
    s.start(tt); s.stop(tt+0.26);
  }
}
function hat(t,v,open){
  if(!v||v<=0.0008) return;
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  s.playbackRate.value=1.4;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8200;
  var g=ctx.createGain(); var d=open?0.3:0.045;
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  s.connect(hp); hp.connect(g); g.connect(B.out); s.start(t); s.stop(t+d+0.02);
}
function shaker(t,v){
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=5200; bp.Q.value=1.4;
  var g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
  s.connect(bp); bp.connect(g); g.connect(B.out); s.start(t); s.stop(t+0.1);
}
function ride(t,v){
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true; s.playbackRate.value=1.1;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6300;
  var g=ctx.createGain(); g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
  s.connect(hp); hp.connect(g); g.connect(B.out); s.start(t); s.stop(t+0.3);
}
function crash(t,v){
  var s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=5000;
  var g=ctx.createGain(); g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+1.7);
  s.connect(hp); hp.connect(g); g.connect(B.out);
  send(g,B.vb,0.4); s.start(t); s.stop(t+1.75);
}
function tomd(t,f,v){
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(f,t);
  o.frequency.exponentialRampToValueAtTime(f*0.55,t+0.22);
  g.gain.setValueAtTime(0.3*v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);
  o.connect(g); g.connect(B.out); send(g,B.vb,0.2);
  o.start(t); o.stop(t+0.26);
}
function sub(t,n,dur,v){
  var o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine'; o.frequency.value=hz(n);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v,t+0.02);
  g.gain.setValueAtTime(v,t+Math.max(0.03,dur-0.08));
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(B.duck); o.start(t); o.stop(t+dur+0.02);
}
function bass(t,n,dur,v,cut){
  var f=hz(n);
  var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=2;
  lp.frequency.setValueAtTime(cut||1900,t);
  lp.frequency.exponentialRampToValueAtTime(190,t+Math.min(0.3,dur));
  var g=ctx.createGain();
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  var o1=ctx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=f;
  var o2=ctx.createOscillator(); o2.type='square'; o2.frequency.value=f/2;
  var og=ctx.createGain(); og.gain.value=0.5;
  o1.connect(lp); o2.connect(og); og.connect(lp); lp.connect(g); g.connect(B.duck);
  o1.start(t); o2.start(t); o1.stop(t+dur+0.02); o2.stop(t+dur+0.02);
}
function reese(t,n,dur,v){
  var f=hz(n);
  var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=620; lp.Q.value=3;
  var lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.7;
  var lg=ctx.createGain(); lg.gain.value=240; lfo.connect(lg); lg.connect(lp.frequency);
  var sh=ctx.createWaveShaper(); sh.curve=shaperCurve;
  var g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(v,t+0.03);
  g.gain.setValueAtTime(v,t+Math.max(0.04,dur-0.1));
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  [ -14, 14 ].forEach(function(det){
    var o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.detune.value=det;
    o.connect(sh); o.start(t); o.stop(t+dur+0.05);
  });
  var so=ctx.createOscillator(); so.type='sine'; so.frequency.value=f/2;
  var sg=ctx.createGain(); sg.gain.value=0.8; so.connect(sg); sg.connect(g);
  so.start(t); so.stop(t+dur+0.05);
  sh.connect(lp); lp.connect(g); g.connect(B.duck);
  lfo.start(t); lfo.stop(t+dur+0.05);
}
function wob(t,n,dur,rate,v){
  var f=hz(n);

/* ---------------- 编曲工具 ---------------- */
function phr(e,mel,cb){
  var pos=(e.b%2)*16+e.s;
  for(var i=0;i<mel.length;i++) if(mel[i][0]===pos) cb(mel[i][1],mel[i][2]*e.sd,mel[i]);
}
function sec(name,bars,fn){ return {name:name,bars:bars,fn:fn}; }
function below(n,ch){
  var best=n-12;
  for(var i=0;i<ch.length;i++){
    var c=ch[i];
    while(c>=n) c-=12;
    while(c<n-12) c+=12;
    if(c>best) best=c;
  }
  return best;
}

var SONGS=[S1,S2,S3,S4,S5];
SONGS.forEach(function(S){
  var acc=0;
  S.sections.forEach(function(x){ x.start=acc; acc+=x.bars; });
  S.totalBars=acc;
  S.stepDur=60/S.bpm/4;
  S.duration=S.totalBars*16*S.stepDur;
});
function sectionAt(S,bar){
  for(var i=S.sections.length-1;i>=0;i--)
    if(bar>=S.sections[i].start) return S.sections[i];
  return S.sections[0];
}
function schedule(){
  if(!P||!ctx) return;
  var ahead=ctx.currentTime+0.22;
  var n=0;
  while(P.step<P.totalSteps&&P.t0+P.step*P.stepDur<ahead&&n<200){
    var st=P.step, S=P.song;
    var t=P.t0+st*P.stepDur+((st%2)?S.swing*P.stepDur:0);
    if(t>=ctx.currentTime-0.05){
      var bar=st>>4, x=sectionAt(S,bar);
      try{
        x.fn({t:t,s:st&15,b:bar-x.start,n:x.bars,bar:bar,sd:P.stepDur,mem:P.mem});
      }catch(err){}
    }
    P.step++; n++;
  }
  if(P.step>=P.totalSteps) P.done=true;
}
function stopPlay(){
  if(!P) return;
  var old=P; P=null;
  var tt=ctx.currentTime;
  [old.bus.out,old.bus.dl,old.bus.vb].forEach(function(g){
    try{
      g.gain.cancelScheduledValues(tt);
      g.gain.setValueAtTime(g.gain.value,tt);
      g.gain.linearRampToValueAtTime(0.0001,tt+0.12);
    }catch(err){}
  });
  setTimeout(function(){
    try{ old.bus.out.disconnect(); old.bus.dl.disconnect(); old.bus.vb.disconnect(); }catch(err){}
  },400);
}
function playTrack(i,offsetSec){
  initAudio();
  stopPlay();
  var S=SONGS[i];
  cur=i; gen++;
  B=makeBuses();
  delayNode.delayTime.setValueAtTime(60/S.bpm*S.dlBeat,ctx.currentTime);
  var startStep=Math.max(0,Math.floor((offsetSec||0)/S.stepDur));
  P={
    song:S, bus:B, mem:{}, step:startStep,
    stepDur:S.stepDur, totalSteps:S.totalBars*16,
    t0:ctx.currentTime+0.12-startStep*S.stepDur,
    done:false
  };
  playing=true;
  updateUI();
  schedule();
}
function togglePlay(){
  if(!ctx||cur<0){ playTrack(0,0); return; }
  if(playing&&P){
    pausedAt=ctx.currentTime-P.t0;
    stopPlay(); playing=false;
  } else {
    playTrack(cur,Math.max(0,Math.min(pausedAt,SONGS[cur].duration-1)));
  }
  updateUI();
}
function nextTrack(d){
  var i=cur<0?0:(cur+d+SONGS.length)%SONGS.length;
  pausedAt=0;
  playTrack(i,0);
}

      var idx=Math.floor(Math.pow(i/N,1.7)*freqData.length*0.72);
      var v=freqData[idx]/255;
      var bh=Math.max(h*0.02,v*v*h*0.92);
      var x=i*(bw+gap);
      var grd=cc.createLinearGradient(0,h,0,h-bh);
      grd.addColorStop(0,hexA(color,0.85));
      grd.addColorStop(1,'rgba(255,255,255,0.9)');
      cc.fillStyle=grd;
      cc.globalAlpha=playing?0.9:0.25;
      cc.fillRect(x,h-bh,bw,bh);
    }
    cc.globalAlpha=1;
  }
  if(P&&ctx&&cur>=0){
    var S=SONGS[cur];
    var el=clamp(ctx.currentTime-P.t0,0,S.duration);
    var frac=el/S.duration;
    fillEl.style.width=(frac*100)+'%';
    dotEl.style.left=(frac*100)+'%';
    mTime.textContent=fmt(el)+' / '+fmt(S.duration);
    seekEl.setAttribute('aria-valuenow',Math.round(frac*100));
    var bar=Math.floor(el/S.stepDur/16);
    var x=sectionAt(S,Math.min(bar,S.totalBars-1));
    chipSec.textContent=x.name;
    chipSec.style.display='';
    if(P.done&&ctx.currentTime>P.t0+S.duration+1.0){
      nextTrack(1);
    }
  } else if(cur>=0){
    mTime.textContent=fmt(pausedAt)+' / '+fmt(SONGS[cur].duration);
  }
}
draw();

['pointerdown','touchstart','keydown'].forEach(function(evName){
  document.addEventListener(evName,function(){ if(ctx&&ctx.state==='suspended') ctx.resume(); },{passive:true});
});
})();
</script>
